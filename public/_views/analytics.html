<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Analytics - BlinkSite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-200" x-data="analyticsApp()" x-init="init()" :class="darkMode ? 'dark' : ''">

    <div class="flex h-screen overflow-hidden" x-cloak>
        
        <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'" 
               class="fixed inset-y-0 left-0 z-30 w-64 bg-white dark:bg-gray-800 border-r dark:border-gray-700 transition-transform duration-300 ease-in-out md:relative md:flex md:flex-col shadow-xl md:shadow-none">
            
            <div class="h-16 flex items-center justify-center border-b dark:border-gray-700 shrink-0">
                <span class="text-xl font-black text-blue-600 tracking-tighter">BlinkSite</span>
            </div>

            <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
                <a href="/admin/dashboard" class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors group">
                    <i class="ph ph-squares-four text-xl shrink-0"></i>
                    <span class="font-medium whitespace-nowrap">Dashboard</span>
                </a>

                <a href="/admin/pages" class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors group">
                    <i class="ph ph-files text-xl shrink-0"></i>
                    <span class="font-medium whitespace-nowrap">Halaman</span>
                </a>

                <a href="/admin/analytics" class="flex items-center gap-3 px-3 py-3 rounded-lg bg-blue-600 text-white shadow-md group">
                    <i class="ph ph-trend-up text-xl shrink-0"></i>
                    <span class="font-medium whitespace-nowrap">Traffic</span>
                </a>

                <a href="/admin/messages" class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors group">
                    <i class="ph ph-envelope-simple text-xl shrink-0"></i>
                    <span class="font-medium whitespace-nowrap">Pesan Masuk</span>
                </a>

                <a href="/admin/settings" class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors group">
                    <i class="ph ph-gear text-xl shrink-0"></i>
                    <span class="font-medium whitespace-nowrap">Settings</span>
                </a>
            </nav>

            <div class="p-4 border-t dark:border-gray-700 shrink-0">
                <button @click="logout()" class="flex items-center gap-3 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 w-full p-2 rounded-lg transition-colors group">
                    <i class="ph ph-sign-out text-xl shrink-0"></i>
                    <span class="font-medium whitespace-nowrap">Keluar</span>
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <header class="h-16 bg-white dark:bg-gray-800 border-b dark:border-gray-700 flex justify-between items-center px-4 shadow-sm z-20 shrink-0">
                <div class="flex items-center gap-4">
                    <button @click="sidebarOpen = !sidebarOpen" class="md:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <i class="ph ph-list text-2xl dark:text-white"></i>
                    </button>
                    <h1 class="font-bold text-lg truncate dark:text-white">Traffic Analytics</h1>
                </div>
                <button @click="toggleTheme()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 border dark:border-gray-600 transition-colors">
                    <i x-show="!darkMode" class="ph ph-moon text-xl text-gray-600"></i>
                    <i x-show="darkMode" class="ph ph-sun text-xl text-yellow-400"></i>
                </button>
            </header>

            <main class="flex-1 overflow-y-auto p-4 md:p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm flex justify-between items-center">
                        <div>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Total Kunjungan</p>
                            <h3 class="text-3xl font-black text-gray-800 dark:text-white mt-1" x-text="stats.total_views.toLocaleString()">0</h3>
                        </div>
                        <div class="h-12 w-12 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center text-2xl">
                            <i class="ph ph-eye"></i>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm flex justify-between items-center">
                        <div>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Kunjungan Hari Ini</p>
                            <h3 class="text-3xl font-black text-blue-600 mt-1" x-text="stats.today_views.toLocaleString()">0</h3>
                        </div>
                        <div class="h-12 w-12 bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-full flex items-center justify-center text-2xl">
                            <i class="ph ph-clock-counter-clockwise"></i>
                        </div>
                    </div>
                </div>

                <div class="bg-white dark:bg-gray-800 p-6 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm mb-8">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-gray-800 dark:text-white uppercase text-xs tracking-widest">Top 10 Halaman Teramai</h3>
                        <span class="text-[10px] font-bold text-indigo-500 bg-indigo-50 dark:bg-indigo-900/30 px-2 py-1 rounded">Live Data</span>
                    </div>
                    <div class="h-80 w-full">
                        <canvas id="topPagesChart"></canvas>
                    </div>
                </div>

                <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm overflow-hidden">
                    <div class="p-5 border-b dark:border-gray-700">
                        <h3 class="font-bold text-gray-800 dark:text-white uppercase text-xs tracking-widest">Detail Performa</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 dark:bg-gray-900 text-gray-400 text-[10px] uppercase font-bold border-b dark:border-gray-700">
                                <tr>
                                    <th class="px-6 py-4">Judul Halaman</th>
                                    <th class="px-6 py-4">Path/Slug</th>
                                    <th class="px-6 py-4 text-right">Views</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y dark:divide-gray-700">
                                <template x-for="p in topPages" :key="p.slug">
                                    <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                                        <td class="px-6 py-4 font-bold text-gray-700 dark:text-gray-200" x-text="p.title"></td>
                                        <td class="px-6 py-4 font-mono text-xs text-blue-500">/<span x-text="p.slug"></span></td>
                                        <td class="px-6 py-4 text-right font-black text-gray-900 dark:text-white" x-text="p.views.toLocaleString()"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>

        <div x-show="sidebarOpen" @click="sidebarOpen = false" 
             class="fixed inset-0 bg-black/50 z-20 md:hidden" 
             x-transition.opacity></div>
    </div>

    <script>
    function analyticsApp() {
        return {
            sidebarOpen: window.innerWidth > 768,
            darkMode: localStorage.getItem('theme') === 'dark',
            stats: { total_views: 0, today_views: 0 },
            topPages: [],

            async init() {
                if (this.darkMode) document.documentElement.classList.add('dark');
                
                // Sinkronisasi Sidebar saat resize
                window.addEventListener('resize', () => {
                    this.sidebarOpen = window.innerWidth > 768;
                });

                await this.fetchData();
            },

            async fetchData() {
                try {
                    // Endpoint API Analytics Engine
                    const res = await fetch('/api/admin/analytics/data');
                    if (res.ok) {
                        const data = await res.json();
                        this.stats = data.stats;
                        this.topPages = data.top_pages;
                        this.renderCharts(data.top_pages);
                    } else if (res.status === 401) {
                        window.location.href = '/login';
                    }
                } catch (e) {
                    console.error("Gagal load data:", e);
                }
            },

            renderCharts(pages) {
                const ctx = document.getElementById('topPagesChart').getContext('2d');
                if (window.myChart) window.myChart.destroy();

                window.myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: pages.map(p => p.title),
                        datasets: [{
                            label: 'Views ',
                            data: pages.map(p => p.views),
                            backgroundColor: this.darkMode ? '#60a5fa' : '#3b82f6',
                            borderRadius: 6,
                            barThickness: 30
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: this.darkMode ? '#374151' : '#f3f4f6' },
                                ticks: { color: this.darkMode ? '#9ca3af' : '#6b7280', font: { size: 10 } }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: this.darkMode ? '#9ca3af' : '#6b7280', font: { size: 10 } }
                            }
                        }
                    }
                });
            },

            toggleTheme() {
                this.darkMode = !this.darkMode;
                localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
                document.documentElement.classList.toggle('dark');
                // Re-render chart agar warnanya menyesuaikan dark mode
                if (this.topPages.length) this.renderCharts(this.topPages);
            },

            async logout() {
                if (confirm('Keluar dari dashboard?')) {
                    await fetch('/api/logout');
                    window.location.href = '/login';
                }
            }
        }
    }
    </script>
</body>
</html>
