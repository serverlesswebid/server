<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Library - BlinkSite Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
        /* Code Editor Style */
        .code-input { font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; background: #1e1e1e; color: #d4d4d4; line-height: 1.5; }
        /* Preview Frame */
        iframe#previewFrame { background: white; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-200" x-data="widgetApp()" x-init="init()" :class="darkMode ? 'dark' : ''">

    <div class="flex h-screen overflow-hidden" x-cloak>
        
        <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'" 
               class="fixed inset-y-0 left-0 z-30 w-64 bg-white dark:bg-gray-800 border-r dark:border-gray-700 transition-transform duration-300 ease-in-out md:relative md:flex md:flex-col shadow-xl md:shadow-none">
            <div class="h-16 flex items-center justify-center border-b dark:border-gray-700 shrink-0">
                <span class="text-xl font-black text-blue-600 tracking-tighter">BlinkSite</span>
            </div>
            <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
                <a href="/admin/dashboard" class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors group">
                    <i class="ph ph-squares-four text-xl shrink-0"></i><span class="font-medium">Dashboard</span>
                </a>
                <a href="/admin/pages" class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors group">
                    <i class="ph ph-files text-xl shrink-0"></i><span class="font-medium">Halaman</span>
                </a>
                <a href="/admin/widgets" class="flex items-center gap-3 px-3 py-3 rounded-lg bg-blue-600 text-white shadow-md group">
                    <i class="ph ph-puzzle-piece text-xl shrink-0"></i><span class="font-medium">Widget Library</span>
                </a>
                <a href="/admin/settings" class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors group">
                    <i class="ph ph-gear text-xl shrink-0"></i><span class="font-medium">Settings</span>
                </a>
            </nav>
            <div class="p-4 border-t dark:border-gray-700 shrink-0">
                <button @click="logout()" class="flex items-center gap-3 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 w-full p-2 rounded-lg transition-colors group">
                    <i class="ph ph-sign-out text-xl shrink-0"></i><span class="font-medium">Keluar</span>
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <header class="h-16 bg-white dark:bg-gray-800 border-b dark:border-gray-700 flex justify-between items-center px-4 shadow-sm z-20 shrink-0">
                <div class="flex items-center gap-4">
                    <button @click="sidebarOpen = !sidebarOpen" class="md:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700"><i class="ph ph-list text-2xl dark:text-white"></i></button>
                    <h1 class="font-bold text-lg truncate dark:text-white">Database Widget</h1>
                </div>
                <button @click="toggleTheme()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 border dark:border-gray-600">
                    <i x-show="!darkMode" class="ph ph-moon text-xl text-gray-600"></i>
                    <i x-show="darkMode" class="ph ph-sun text-xl text-yellow-400"></i>
                </button>
            </header>

            <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-gray-50 dark:bg-gray-900">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <div class="relative w-full md:w-96">
                        <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" x-model="search" placeholder="Cari widget..." class="w-full pl-10 pr-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm dark:text-white shadow-sm">
                    </div>
                    <div class="flex gap-2">
                        <button @click="seedDB()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 font-bold rounded-lg text-sm hover:bg-gray-300 transition flex items-center gap-2">
                            <i class="ph ph-arrows-clockwise"></i> Reset Default
                        </button>
                        <button @click="openModal()" class="px-6 py-2 bg-blue-600 text-white font-bold rounded-lg text-sm shadow-lg hover:bg-blue-700 transition flex items-center gap-2">
                            <i class="ph ph-plus-bold"></i> Tambah Baru
                        </button>
                    </div>
                </div>

                <div x-show="loading" class="text-center py-20">
                    <i class="ph ph-spinner animate-spin text-4xl text-blue-600"></i>
                    <p class="text-gray-500 mt-2 text-sm">Sinkronisasi Database D1...</p>
                </div>

                <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <template x-for="widget in filteredWidgets" :key="widget.id">
                        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm hover:shadow-md transition flex flex-col overflow-hidden group">
                            <div class="p-4 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 flex justify-between items-start">
                                <div>
                                    <span class="text-[10px] font-bold uppercase tracking-wider text-blue-600 bg-blue-50 px-2 py-1 rounded border border-blue-100" x-text="widget.category"></span>
                                    <h3 class="font-bold text-gray-800 dark:text-white mt-2" x-text="widget.label"></h3>
                                    <p class="text-xs font-mono text-gray-400 mt-1" x-text="widget.id"></p>
                                </div>
                                <div class="text-gray-300"><i class="ph ph-cube text-2xl"></i></div>
                            </div>
                            <div class="p-4 flex-1">
                                <div class="text-xs text-gray-500 dark:text-gray-400 line-clamp-3 font-mono bg-gray-100 dark:bg-gray-900 p-2 rounded border dark:border-gray-700" x-text="widget.content"></div>
                                <div class="mt-2 flex gap-2">
                                    <span x-show="widget.script" class="text-[10px] flex items-center gap-1 text-yellow-600 bg-yellow-50 px-2 py-0.5 rounded font-bold"><i class="ph ph-lightning"></i> JS Logic</span>
                                </div>
                            </div>
                            <div class="p-3 bg-gray-50 dark:bg-gray-800 border-t dark:border-gray-700 flex gap-2">
                                <button @click="openModal(widget)" class="flex-1 py-2 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded text-xs font-bold text-gray-700 dark:text-gray-200 hover:text-blue-600 hover:border-blue-600 transition">EDIT & PREVIEW</button>
                                <button @click="deleteWidget(widget.id)" class="px-3 py-2 bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-900 rounded text-xs font-bold text-red-600 hover:bg-red-100 transition"><i class="ph ph-trash"></i></button>
                            </div>
                        </div>
                    </template>
                </div>
            </main>
        </div>

        <div x-show="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm" x-cloak>
            <div class="bg-white dark:bg-gray-800 w-full h-full md:h-[95vh] md:w-[95vw] md:rounded-2xl shadow-2xl flex flex-col overflow-hidden relative">
                
                <div class="p-4 border-b dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-900 shrink-0">
                    <div class="flex items-center gap-4">
                        <h3 class="font-bold text-lg dark:text-white" x-text="isEdit ? 'Edit Widget' : 'Buat Widget Baru'"></h3>
                        <div class="flex gap-2">
                            <input x-model="form.id" :disabled="isEdit" class="px-3 py-1 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded text-sm font-mono focus:border-blue-500 outline-none" placeholder="Widget ID">
                            <input x-model="form.label" class="px-3 py-1 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded text-sm focus:border-blue-500 outline-none" placeholder="Nama Label">
                            <select x-model="form.category" class="px-3 py-1 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded text-sm focus:border-blue-500 outline-none">
                                <option value="1. Header & Hero">1. Header & Hero</option>
                                <option value="2. Features">2. Features</option>
                                <option value="3. Content">3. Content</option>
                                <option value="4. Commerce">4. Commerce</option>
                                <option value="5. Footer">5. Footer</option>
                                <option value="Custom">Custom</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button @click="showModal = false" class="px-4 py-2 text-sm font-bold text-gray-500 hover:bg-gray-100 rounded">Tutup</button>
                        <button @click="saveWidget()" class="px-6 py-2 bg-blue-600 text-white text-sm font-bold rounded hover:bg-blue-700 transition flex items-center gap-2">
                            <i class="ph ph-floppy-disk"></i> <span x-text="isSaving ? 'Menyimpan...' : 'SIMPAN'"></span>
                        </button>
                    </div>
                </div>
                
                <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
                    
                    <div class="w-full md:w-1/2 flex flex-col border-r dark:border-gray-700 bg-[#1e1e1e]">
                        <div class="flex bg-[#252526] text-gray-400 text-xs font-bold border-b border-[#333]">
                            <button @click="codeTab='html'" class="px-4 py-2 hover:bg-[#3e3e42] transition" :class="codeTab==='html' ? 'bg-[#1e1e1e] text-white border-t-2 border-blue-500' : ''">HTML (Structure)</button>
                            <button @click="codeTab='js'" class="px-4 py-2 hover:bg-[#3e3e42] transition" :class="codeTab==='js' ? 'bg-[#1e1e1e] text-white border-t-2 border-yellow-500' : ''">Javascript (Action)</button>
                        </div>

                        <textarea x-show="codeTab==='html'" 
                                  x-model="form.content" 
                                  @input.debounce.500ms="renderPreview()"
                                  class="flex-1 w-full p-4 code-input outline-none resize-none" 
                                  spellcheck="false" 
                                  placeholder=""></textarea>

                        <div x-show="codeTab==='js'" class="flex-1 flex flex-col">
                            <div class="p-2 bg-yellow-900/20 text-yellow-200 text-[10px] border-b border-yellow-900/50 px-4">
                                <i class="ph ph-warning"></i> Gunakan <code>this</code> untuk merujuk ke elemen widget. Jangan gunakan <code>document.getElementById</code>.
                            </div>
                            <textarea x-model="form.script" 
                                      class="flex-1 w-full p-4 code-input outline-none resize-none" 
                                      spellcheck="false" 
                                      placeholder="// Contoh: const btn = this.querySelector('button'); btn.onclick = ..."></textarea>
                        </div>
                    </div>

                    <div class="w-full md:w-1/2 bg-gray-100 flex flex-col relative">
                        <div class="bg-white border-b px-4 py-2 flex justify-between items-center text-xs font-bold text-gray-500 shadow-sm z-10">
                            <span>LIVE PREVIEW (Tailwind Ready)</span>
                            <span class="bg-green-100 text-green-600 px-2 py-0.5 rounded">Iframe Isolated</span>
                        </div>
                        <div class="flex-1 relative overflow-hidden bg-[url('https://t3.ftcdn.net/jpg/05/11/95/62/360_F_511956272_K2j5x5z5x5z5x5z5x5z5x5z5x5z5x5z5.jpg')] bg-repeat opacity-100">
                            <iframe id="previewFrame" class="w-full h-full absolute inset-0"></iframe>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function widgetApp() {
            return {
                sidebarOpen: window.innerWidth > 768,
                darkMode: localStorage.getItem('theme') === 'dark',
                loading: true,
                isSaving: false,
                search: '',
                showModal: false,
                isEdit: false,
                codeTab: 'html', // html | js
                widgets: [],
                form: { id: '', label: '', category: 'Custom', content: '', script: '', attributes: {} },

                async init() {
                    const token = localStorage.getItem('auth_token');
                    if (this.darkMode) document.documentElement.classList.add('dark');
                    await this.fetchWidgets();
                    
                    // Watcher untuk Render Preview saat modal dibuka
                    this.$watch('showModal', (val) => {
                        if (val) setTimeout(() => this.renderPreview(), 100); 
                    });
                },

                get filteredWidgets() {
                    if (!this.search) return this.widgets;
                    const q = this.search.toLowerCase();
                    return this.widgets.filter(w => w.label.toLowerCase().includes(q) || w.category.toLowerCase().includes(q) || w.id.toLowerCase().includes(q));
                },

                async fetchWidgets() {
                    this.loading = true;
                    try {
                        const res = await fetch('/api/widgets');
                        if (res.ok) this.widgets = await res.json();
                    } catch (e) { console.error(e); }
                    this.loading = false;
                },

                // --- CORE: PREVIEW ENGINE (Sama seperti Widget Tester) ---
                renderPreview() {
                    const frame = document.getElementById('previewFrame');
                    if (!frame) return;
                    
                    const doc = frame.contentWindow.document;
                    const htmlCode = this.form.content || '<div class="flex items-center justify-center h-full text-gray-400">Mulai ketik HTML...</div>';
                    
                    // Template Head (Tailwind + Iconify + Fonts)
                    const fullHTML = `
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <meta charset="UTF-8">
                            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                            <script src="https://cdn.tailwindcss.com"><\/script>
                            <script>
                                tailwind.config = { theme: { extend: { colors: { theme: { 50:'#eef2ff', 600:'#4f46e5' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
                            <\/script>
                            <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"><\/script>
                            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
                            <style>body { font-family: 'Inter', sans-serif; padding: 20px; }</style>
                        </head>
                        <body>
                            ${htmlCode}
                        </body>
                        </html>
                    `;

                    doc.open();
                    doc.write(fullHTML);
                    doc.close();
                },

                openModal(widget = null) {
                    this.codeTab = 'html';
                    if (widget) {
                        this.isEdit = true;
                        this.form = JSON.parse(JSON.stringify(widget));
                    } else {
                        this.isEdit = false;
                        this.form = { id: 'widget-' + Date.now(), label: '', category: 'Custom', content: '<section class="p-10 text-center">\n  <h2 class="text-2xl font-bold">Judul Baru</h2>\n</section>', script: '', attributes: {} };
                    }
                    this.showModal = true;
                },

                async saveWidget() {
                    if (!this.form.id || !this.form.content) return Swal.fire('Error', 'ID dan Content wajib diisi!', 'warning');
                    this.isSaving = true;
                    try {
                        const token = localStorage.getItem('auth_token');
                        const res = await fetch('/api/admin/widgets', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify(this.form)
                        });
                        if (res.ok) {
                            this.showModal = false;
                            await this.fetchWidgets();
                            const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
                            Toast.fire({ icon: 'success', title: 'Widget berhasil disimpan' });
                        } else throw new Error('Gagal menyimpan');
                    } catch (e) { Swal.fire('Error', e.message, 'error'); }
                    this.isSaving = false;
                },

                async deleteWidget(id) {
                    const result = await Swal.fire({ title: 'Hapus Widget?', text: "Data di D1 & Cache KV akan dihapus.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Ya, Hapus!' });
                    if (result.isConfirmed) {
                        try {
                            const token = localStorage.getItem('auth_token');
                            await fetch(`/api/admin/widgets/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                            await this.fetchWidgets();
                        } catch (e) { Swal.fire('Error', 'Gagal menghapus', 'error'); }
                    }
                },

                async seedDB() {
                    const r = await Swal.fire({ title: 'Reset Default?', text: "Database akan diisi ulang dengan widget bawaan.", icon: 'warning', showCancelButton: true, confirmButtonText: 'Ya, Reset!' });
                    if (r.isConfirmed) {
                        const token = localStorage.getItem('auth_token');
                        await fetch('/api/admin/widgets/seed', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
                        await this.fetchWidgets();
                    }
                },

                toggleTheme() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
                    if (this.darkMode) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark');
                },

                logout() {
                    if (confirm('Keluar?')) { localStorage.removeItem('auth_token'); window.location.href = '/login'; }
                }
            }
        }
    </script>
</body>
</html>
