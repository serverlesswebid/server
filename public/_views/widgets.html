<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Library - BlinkSite Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
        /* Simple Code Editor Style */
        .code-input { font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; background: #1e1e1e; color: #d4d4d4; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-200" x-data="widgetApp()" x-init="init()" :class="darkMode ? 'dark' : ''">

    <div class="flex h-screen overflow-hidden" x-cloak>
        
        <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'" 
               class="fixed inset-y-0 left-0 z-30 w-64 bg-white dark:bg-gray-800 border-r dark:border-gray-700 transition-transform duration-300 ease-in-out md:relative md:flex md:flex-col shadow-xl md:shadow-none">
            
            <div class="h-16 flex items-center justify-center border-b dark:border-gray-700 shrink-0">
                <span class="text-xl font-black text-blue-600 tracking-tighter">BlinkSite</span>
            </div>

            <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
                <a href="/admin/dashboard" class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors group">
                    <i class="ph ph-squares-four text-xl shrink-0"></i>
                    <span class="font-medium whitespace-nowrap">Dashboard</span>
                </a>
                <a href="/admin/pages" class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors group">
                    <i class="ph ph-files text-xl shrink-0"></i>
                    <span class="font-medium whitespace-nowrap">Halaman</span>
                </a>
                <a href="/admin/widgets" class="flex items-center gap-3 px-3 py-3 rounded-lg bg-blue-600 text-white shadow-md group">
                    <i class="ph ph-puzzle-piece text-xl shrink-0"></i>
                    <span class="font-medium whitespace-nowrap">Widget Library</span>
                </a>
                <a href="/admin/settings" class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors group">
                    <i class="ph ph-gear text-xl shrink-0"></i>
                    <span class="font-medium whitespace-nowrap">Settings</span>
                </a>
            </nav>

            <div class="p-4 border-t dark:border-gray-700 shrink-0">
                <button @click="logout()" class="flex items-center gap-3 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 w-full p-2 rounded-lg transition-colors group">
                    <i class="ph ph-sign-out text-xl shrink-0"></i>
                    <span class="font-medium whitespace-nowrap">Keluar</span>
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <header class="h-16 bg-white dark:bg-gray-800 border-b dark:border-gray-700 flex justify-between items-center px-4 shadow-sm z-20 shrink-0">
                <div class="flex items-center gap-4">
                    <button @click="sidebarOpen = !sidebarOpen" class="md:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                        <i class="ph ph-list text-2xl dark:text-white"></i>
                    </button>
                    <h1 class="font-bold text-lg truncate dark:text-white">Manajemen Widget (Database)</h1>
                </div>
                <button @click="toggleTheme()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 border dark:border-gray-600">
                    <i x-show="!darkMode" class="ph ph-moon text-xl text-gray-600"></i>
                    <i x-show="darkMode" class="ph ph-sun text-xl text-yellow-400"></i>
                </button>
            </header>

            <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-gray-50 dark:bg-gray-900">
                
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <div class="relative w-full md:w-96">
                        <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" x-model="search" placeholder="Cari widget..." class="w-full pl-10 pr-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm dark:text-white shadow-sm">
                    </div>
                    <div class="flex gap-2">
                        <button @click="seedDB()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 font-bold rounded-lg text-sm hover:bg-gray-300 transition flex items-center gap-2">
                            <i class="ph ph-arrows-clockwise"></i> Reset Default
                        </button>
                        <button @click="openModal()" class="px-6 py-2 bg-blue-600 text-white font-bold rounded-lg text-sm shadow-lg hover:bg-blue-700 transition flex items-center gap-2">
                            <i class="ph ph-plus-bold"></i> Tambah Baru
                        </button>
                    </div>
                </div>

                <div x-show="loading" class="text-center py-20">
                    <i class="ph ph-spinner animate-spin text-4xl text-blue-600"></i>
                    <p class="text-gray-500 mt-2 text-sm">Memuat data dari D1 & KV...</p>
                </div>

                <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <template x-for="widget in filteredWidgets" :key="widget.id">
                        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm hover:shadow-md transition flex flex-col overflow-hidden group">
                            <div class="p-4 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 flex justify-between items-start">
                                <div>
                                    <span class="text-[10px] font-bold uppercase tracking-wider text-blue-600 bg-blue-50 px-2 py-1 rounded border border-blue-100" x-text="widget.category"></span>
                                    <h3 class="font-bold text-gray-800 dark:text-white mt-2" x-text="widget.label"></h3>
                                    <p class="text-xs font-mono text-gray-400 mt-1" x-text="widget.id"></p>
                                </div>
                                <div class="text-gray-300">
                                    <i class="ph ph-cube text-2xl"></i>
                                </div>
                            </div>
                            
                            <div class="p-4 flex-1">
                                <div class="text-xs text-gray-500 dark:text-gray-400 line-clamp-3 font-mono bg-gray-100 dark:bg-gray-900 p-2 rounded border dark:border-gray-700" x-text="widget.content"></div>
                                <div class="mt-2 flex gap-2">
                                    <span x-show="widget.script" class="text-[10px] flex items-center gap-1 text-yellow-600 bg-yellow-50 px-2 py-0.5 rounded font-bold"><i class="ph ph-lightning"></i> JS Logic</span>
                                    <span class="text-[10px] flex items-center gap-1 text-green-600 bg-green-50 px-2 py-0.5 rounded font-bold"><i class="ph ph-database"></i> D1</span>
                                </div>
                            </div>

                            <div class="p-3 bg-gray-50 dark:bg-gray-800 border-t dark:border-gray-700 flex gap-2">
                                <button @click="openModal(widget)" class="flex-1 py-2 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded text-xs font-bold text-gray-700 dark:text-gray-200 hover:text-blue-600 hover:border-blue-600 transition">EDIT</button>
                                <button @click="deleteWidget(widget.id)" class="px-3 py-2 bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-900 rounded text-xs font-bold text-red-600 hover:bg-red-100 transition"><i class="ph ph-trash"></i></button>
                            </div>
                        </div>
                    </template>
                </div>

                <div x-show="!loading && filteredWidgets.length === 0" class="text-center py-20 bg-white dark:bg-gray-800 rounded-xl border border-dashed border-gray-300 dark:border-gray-700">
                    <i class="ph ph-files text-4xl text-gray-300 mb-2"></i>
                    <p class="text-gray-500">Tidak ada widget ditemukan.</p>
                </div>

            </main>
        </div>

        <div x-show="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" x-cloak>
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
                <div class="p-5 border-b dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-900">
                    <h3 class="font-bold text-lg dark:text-white" x-text="isEdit ? 'Edit Widget' : 'Buat Widget Baru'"></h3>
                    <button @click="showModal = false" class="text-gray-400 hover:text-red-500"><i class="ph ph-x text-xl"></i></button>
                </div>
                
                <div class="p-6 overflow-y-auto space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">ID (Unik)</label>
                            <input x-model="form.id" :disabled="isEdit" class="w-full mt-1 p-3 bg-gray-50 dark:bg-gray-900 border dark:border-gray-700 rounded-lg text-sm outline-none focus:border-blue-500 dark:text-white font-mono" placeholder="ex: hero-new">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Label (Nama)</label>
                            <input x-model="form.label" class="w-full mt-1 p-3 bg-gray-50 dark:bg-gray-900 border dark:border-gray-700 rounded-lg text-sm outline-none focus:border-blue-500 dark:text-white" placeholder="ex: Hero Super">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Kategori</label>
                            <select x-model="form.category" class="w-full mt-1 p-3 bg-gray-50 dark:bg-gray-900 border dark:border-gray-700 rounded-lg text-sm outline-none focus:border-blue-500 dark:text-white">
                                <option value="1. Header & Hero">1. Header & Hero</option>
                                <option value="2. Features">2. Features</option>
                                <option value="3. Content">3. Content</option>
                                <option value="4. Commerce">4. Commerce</option>
                                <option value="5. Footer">5. Footer</option>
                                <option value="Custom">Custom</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase flex justify-between">
                            <span>HTML Content</span>
                            <span class="text-blue-500 cursor-pointer text-[10px]" @click="copyTemplate()">+ Insert Template</span>
                        </label>
                        <textarea x-model="form.content" class="w-full mt-1 h-48 p-4 code-input rounded-lg border dark:border-gray-700 outline-none focus:border-blue-500 resize-y" placeholder="<section>...</section>"></textarea>
                    </div>

                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">Javascript Logic (Optional)</label>
                        <p class="text-[10px] text-gray-400 mb-1">Gunakan `this` untuk merujuk ke elemen widget. Contoh: `this.querySelector('btn').onclick...`</p>
                        <textarea x-model="form.script" class="w-full mt-1 h-24 p-4 code-input rounded-lg border dark:border-gray-700 outline-none focus:border-blue-500 resize-y" placeholder="console.log('Widget loaded');"></textarea>
                    </div>
                </div>

                <div class="p-5 border-t dark:border-gray-700 bg-gray-50 dark:bg-gray-900 flex justify-end gap-3">
                    <button @click="showModal = false" class="px-5 py-2 text-sm font-bold text-gray-500">Batal</button>
                    <button @click="saveWidget()" class="px-8 py-2 bg-blue-600 text-white text-sm font-bold rounded-lg shadow-lg hover:bg-blue-700 transition">
                        <span x-text="isSaving ? 'Menyimpan...' : 'SIMPAN WIDGET'"></span>
                    </button>
                </div>
            </div>
        </div>

        <div x-show="sidebarOpen" @click="sidebarOpen = false" class="fixed inset-0 bg-black/50 z-20 md:hidden" x-transition.opacity></div>
    </div>

    <script>
        function widgetApp() {
            return {
                sidebarOpen: window.innerWidth > 768,
                darkMode: localStorage.getItem('theme') === 'dark',
                loading: true,
                isSaving: false,
                search: '',
                showModal: false,
                isEdit: false,
                widgets: [],
                form: { id: '', label: '', category: 'Custom', content: '', script: '', attributes: {} },

                async init() {
                    const token = localStorage.getItem('auth_token'); // Sesuaikan dengan sistem auth Anda
                    // if (!token) window.location.href = '/login'; 
                    if (this.darkMode) document.documentElement.classList.add('dark');
                    await this.fetchWidgets();
                },

                get filteredWidgets() {
                    if (!this.search) return this.widgets;
                    return this.widgets.filter(w => 
                        w.label.toLowerCase().includes(this.search.toLowerCase()) || 
                        w.category.toLowerCase().includes(this.search.toLowerCase()) ||
                        w.id.toLowerCase().includes(this.search.toLowerCase())
                    );
                },

                async fetchWidgets() {
                    this.loading = true;
                    try {
                        const res = await fetch('/api/widgets'); // Panggil API Public/Shared
                        if (res.ok) {
                            this.widgets = await res.json();
                        } else {
                            throw new Error('Gagal ambil data');
                        }
                    } catch (e) {
                        console.error(e);
                        Swal.fire('Error', 'Gagal memuat widgets', 'error');
                    }
                    this.loading = false;
                },

                openModal(widget = null) {
                    if (widget) {
                        this.isEdit = true;
                        // Clone object agar tidak reaktif langsung ke list sebelum disimpan
                        this.form = JSON.parse(JSON.stringify(widget));
                    } else {
                        this.isEdit = false;
                        this.form = { id: 'widget-' + Date.now(), label: '', category: 'Custom', content: '', script: '', attributes: {} };
                    }
                    this.showModal = true;
                },

                async saveWidget() {
                    if (!this.form.id || !this.form.content) return Swal.fire('Error', 'ID dan Content wajib diisi!', 'warning');
                    
                    this.isSaving = true;
                    try {
                        const token = localStorage.getItem('auth_token');
                        const res = await fetch('/api/admin/widgets', {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}` 
                            },
                            body: JSON.stringify(this.form)
                        });

                        if (res.ok) {
                            Swal.fire('Sukses', 'Widget berhasil disimpan & Cache diperbarui', 'success');
                            this.showModal = false;
                            await this.fetchWidgets(); // Refresh list
                        } else {
                            throw new Error('Gagal menyimpan');
                        }
                    } catch (e) {
                        Swal.fire('Error', e.message, 'error');
                    }
                    this.isSaving = false;
                },

                async deleteWidget(id) {
                    const result = await Swal.fire({
                        title: 'Hapus Widget?',
                        text: "Data akan dihapus permanen dari Database & Cache.",
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#ef4444',
                        confirmButtonText: 'Ya, Hapus!'
                    });

                    if (result.isConfirmed) {
                        try {
                            const token = localStorage.getItem('auth_token');
                            await fetch(`/api/admin/widgets/${id}`, {
                                method: 'DELETE',
                                headers: { 'Authorization': `Bearer ${token}` }
                            });
                            Swal.fire('Terhapus!', 'Widget telah dihapus.', 'success');
                            await this.fetchWidgets();
                        } catch (e) {
                            Swal.fire('Error', 'Gagal menghapus', 'error');
                        }
                    }
                },

                async seedDB() {
                    const result = await Swal.fire({
                        title: 'Reset ke Default?',
                        text: "Semua widget custom akan hilang! Database akan diisi ulang dengan widget bawaan.",
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#f59e0b',
                        confirmButtonText: 'Ya, Reset DB!'
                    });

                    if (result.isConfirmed) {
                        try {
                            const token = localStorage.getItem('auth_token');
                            const res = await fetch('/api/admin/widgets/seed', {
                                method: 'POST',
                                headers: { 'Authorization': `Bearer ${token}` }
                            });
                            if(res.ok) {
                                Swal.fire('Selesai', 'Database telah di-reset.', 'success');
                                await this.fetchWidgets();
                            }
                        } catch (e) { Swal.fire('Error', 'Gagal reset DB', 'error'); }
                    }
                },

                copyTemplate() {
                    this.form.content = `<div class="p-6 bg-white border rounded text-center">Hello World</div>`;
                },

                toggleTheme() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
                    if (this.darkMode) document.documentElement.classList.add('dark');
                    else document.documentElement.classList.remove('dark');
                },

                logout() {
                    if (confirm('Keluar dari dashboard?')) {
                        localStorage.removeItem('auth_token');
                        window.location.href = '/login';
                    }
                }
            }
        }
    </script>
</body>
</html>
