<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LandingBuilder - Pro Mobile</title>
    
    <script>
        (function() {
            const originalWarn = console.warn;
            console.warn = function(...args) {
                if (args[0] && typeof args[0] === 'string' && (args[0].includes('cdn.tailwindcss.com') || args[0].includes('production'))) return;
                originalWarn.apply(console, args);
            };
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/grapesjs@0.21.2/dist/css/grapes.min.css">
    <script src="https://unpkg.com/grapesjs@0.21.2/dist/grapes.min.js"></script>
    
    <script src="https://unpkg.com/grapesjs-blocks-basic@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-plugin-forms@2.0.5"></script> 
    <script src="https://unpkg.com/grapesjs-navbar@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-blocks-flexbox@0.1.1"></script>
    <script src="https://unpkg.com/grapesjs-style-bg@2.0.1"></script>
    <script src="https://unpkg.com/grapesjs-component-countdown@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-tabs@1.0.6"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #fff; }
        [x-cloak] { display: none !important; }

        /* HEADER */
        header { height: 60px; width: 100%; position: fixed; top: 0; left: 0; z-index: 40; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; }
        
        /* WORKSPACE */
        .workspace { position: absolute; top: 60px; bottom: 0; left: 0; right: 0; background: #f3f4f6; overflow: hidden; display: flex; z-index: 0; }
        #gjs { flex: 1; height: 100% !important; width: auto !important; min-width: 0; overflow: hidden; position: relative; }

        /* SIDEBAR (Panel Upload ada disini) */
        .sidebar-panel { width: 320px; height: 100%; background: white; border-left: 1px solid #e2e8f0; z-index: 50; display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 4px 0 24px rgba(0,0,0,0.1); }
        .mobile-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 45; backdrop-filter: blur(4px); }

        /* MOBILE FIX */
        @media (max-width: 768px) {
            .mobile-tools { display: flex !important; }
            .workspace { top: 110px; } 
            #gjs { right: 0 !important; bottom: 60px !important; }
            .sidebar-panel { position: fixed; right: 0; top: 110px; bottom: 60px; width: 100% !important; z-index: 9999 !important; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
            .sidebar-panel.open { transform: translateX(0); }
        }
        .mobile-tools { display: none; height: 50px; width: 100%; position: fixed; top: 60px; left: 0; z-index: 90; background: #f8fafc; border-bottom: 1px solid #e2e8f0; align-items: center; justify-content: center; gap: 15px; }

        /* UI COMPONENTS */
        .gjs-cv-canvas { width: 100% !important; height: 100% !important; top: 0 !important; left: 0 !important; }
        .gjs-pn-views-container, .gjs-pn-panels, .gjs-pn-views, .gjs-pn-commands { display: none !important; } 
        
        /* COLOR PICKER Z-INDEX FIX */
        .sp-container { z-index: 9999999 !important; background: white; border: 1px solid #cbd5e1; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2); border-radius: 8px; }
        .gjs-field-color-picker { border: 1px solid #e2e8f0; border-radius: 4px; padding: 2px; cursor: pointer; min-width: 25px; }

        /* UPLOAD BUTTON STYLE */
        .trait-btn-upload {
            width: 100%; background: #4f46e5; color: white; padding: 10px; border-radius: 6px; 
            font-size: 12px; font-weight: bold; cursor: pointer; border: none; 
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 5px;
        }
        .trait-btn-upload:hover { background: #4338ca; }
        .trait-btn-upload:disabled { opacity: 0.7; cursor: not-allowed; }
    </style>
</head>
<body x-data="editorApp()">

    <div class="fixed bottom-20 left-5 z-[9999] flex flex-col gap-2 pointer-events-none">
        <template x-for="n in notifications" :key="n.id">
            <div x-show="n.show" x-transition class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border-l-4 bg-white" :class="n.type==='success'?'border-green-500':'border-red-500'">
                <i class="ph text-xl" :class="n.type==='success'?'ph-check-circle text-green-500':'ph-warning-circle text-red-500'"></i>
                <div class="text-xs font-bold text-gray-800" x-text="n.title"></div>
            </div>
        </template>
    </div>

    <header>
        <div class="flex items-center gap-3 flex-1 min-w-0">
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden shrink-0 text-gray-600 bg-gray-100 hover:bg-gray-200 p-2 rounded-lg transition"><i class="ph ph-list text-2xl"></i></button>
            <a href="/admin/pages" class="hidden md:block text-gray-400 hover:text-indigo-600 p-1.5 hover:bg-gray-50 rounded"><i class="ph ph-arrow-left text-xl"></i></a>
            <div class="flex flex-col min-w-0 flex-1">
                <input x-model="page.title" class="bg-transparent font-bold text-sm text-gray-800 outline-none w-full truncate" placeholder="Nama Halaman">
                <span class="text-[10px] text-gray-400 truncate font-mono" x-text="page.slug ? '/'+page.slug : 'Draft Mode'"></span>
            </div>
        </div>
        <div class="hidden md:flex items-center bg-gray-100 rounded-lg p-1 border shadow-sm mx-4">
            <button @click="setDevice('desktop')" :class="device=='desktop'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded"><i class="ph ph-desktop"></i></button>
            <button @click="setDevice('mobile')" :class="device=='mobile'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded"><i class="ph ph-device-mobile"></i></button>
        </div>
        <div class="flex items-center gap-2 shrink-0">
            <button @click="showSettings=true" class="flex items-center gap-2 bg-white text-gray-600 px-3 py-2 rounded-lg text-xs font-bold border hover:bg-gray-50"><i class="ph ph-gear"></i> <span class="hidden md:inline">CONFIG</span></button>
            <button @click="savePage" :disabled="loading" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-md transition active:scale-95">
                <span x-text="loading ? 'SAVING...' : 'PUBLISH'"></span>
            </button>
        </div>
    </header>

    <div class="mobile-tools">
        <button @click="setDevice('desktop')" :class="device=='desktop'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded"><i class="ph ph-desktop text-lg"></i></button>
        <button @click="setDevice('mobile')" :class="device=='mobile'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded"><i class="ph ph-device-mobile text-lg"></i></button>
    </div>

    <div class="workspace">
        <div id="gjs"></div>
        <div x-show="mobileMenuOpen" class="mobile-backdrop" @click="mobileMenuOpen = false" x-transition.opacity></div>

        <div class="sidebar-panel fixed inset-y-0 left-0 md:static transform duration-300 ease-in-out" :class="mobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'">
            <div class="md:hidden flex items-center justify-between p-4 border-b bg-gray-50">
                <span class="font-bold text-gray-800 text-sm uppercase">Tools</span>
                <button @click="mobileMenuOpen = false"><i class="ph ph-x text-lg"></i></button>
            </div>
            <div class="flex border-b border-gray-200 bg-white shrink-0">
                <button @click="tab='blocks'" :class="tab=='blocks'?'text-indigo-600 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3"><i class="ph ph-squares-four text-xl"></i></button>
                <button @click="tab='traits'" :class="tab=='traits'?'text-indigo-600 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3"><i class="ph ph-gear text-xl"></i></button>
                <button @click="tab='styles'" :class="tab=='styles'?'text-indigo-600 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3"><i class="ph ph-paint-brush text-xl"></i></button>
            </div>
            
            <div class="flex-1 bg-white relative w-full overflow-y-auto">
                <div x-show="tab=='blocks'" class="h-full pb-20"><div id="blocks-container" class="p-2"></div></div>
                <div x-show="tab=='traits'" class="h-full pb-20">
                    <div id="traits-container" class="p-3"></div>
                    <div class="p-4 text-center text-xs text-gray-400 bg-gray-50 border-t">Klik elemen di canvas untuk melihat opsi.</div>
                </div>
                <div x-show="tab=='styles'" class="h-full pb-20"><div id="selectors-container" class="p-3 border-b bg-gray-50"></div><div id="styles-container" class="p-1"></div></div>
            </div>
        </div>
    </div>

    <div x-show="showSettings" x-cloak class="fixed inset-0 z-[400] bg-slate-900/50 backdrop-blur-sm flex justify-end" @click.self="showSettings = false">
        <div class="w-full md:w-[480px] h-full bg-white shadow-2xl flex flex-col border-l">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50">
                <h2 class="font-bold text-gray-800">Page Config</h2>
                <button @click="showSettings = false" class="text-gray-400 hover:text-red-500"><i class="ph ph-x text-xl"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div class="space-y-4">
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase">Harga Produk</label><input x-model="page.config.price" type="number" class="w-full mt-1 px-3 py-2 border rounded"></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase">Pixel ID</label><input x-model="page.config.settings.fb_pixel" class="w-full mt-1 px-3 py-2 border rounded"></div>
                </div>
            </div>
            <div class="p-4 border-t bg-gray-50 flex justify-end gap-3">
                <button @click="savePage(); showSettings=false" class="px-8 py-2 bg-indigo-600 text-white text-xs font-black rounded-xl shadow-lg">SIMPAN</button>
            </div>
        </div>
    </div>

    <script>
    function editorApp() {
        return {
            device: 'desktop', tab: 'blocks', mobileMenuOpen: false, showSettings: false, loading: false, notifications: [],
            page: { id: 0, slug: '', title: '', product_type: 'physical', config: { price: 0, settings: {} } },

            async init() {
                this.initGrapes();
                const params = new URLSearchParams(window.location.search);
                const slug = params.get('slug');
                if (slug) await this.loadPageData(slug);
            },

            async loadPageData(slug) {
                try {
                    const res = await fetch(`/api/admin/pages/${slug}`);
                    const data = await res.json();
                    this.page.id = data.id; this.page.slug = data.slug; this.page.title = data.title;
                    if(data.product_config_json) this.page.config = JSON.parse(data.product_config_json);
                    if(window.editor) {
                        window.editor.setComponents(data.html_content);
                        window.editor.setStyle(data.css_content);
                    }
                } catch(e) {}
            },

            async savePage() {
                this.loading = true;
                const html = window.editor.getHtml(); const css = window.editor.getCss();
                const payload = { id: this.page.id, slug: this.page.slug, title: this.page.title, html: html, css: css, product_config: this.page.config };
                const res = await fetch('/api/admin/pages', { method: 'POST', body: JSON.stringify(payload), headers: {'Content-Type': 'application/json'} });
                if(res.ok) this.notify('Berhasil Disimpan!');
                this.loading = false;
            },

            notify(title, msg, type = 'success') { const id = Date.now(); this.notifications.push({ id, title, type, show: true }); setTimeout(() => { this.notifications = this.notifications.filter(n => n.id !== id); }, 3000); },
            setDevice(d) { this.device = d; if(window.editor) window.editor.setDevice(d); },

            initGrapes() {
                window.editor = grapesjs.init({
                    container: '#gjs', height: '100%', fromElement: false, storageManager: false, panels: { defaults: [] },
                    // MATIKAN ASSET MANAGER BAWAAN
                    assetManager: { embedAsBase64: 0, openAssetsOnDrop: 0 },
                    deviceManager: { devices: [{name:'desktop',width:''},{name:'tablet',width:'768px',widthMedia:'992px'},{name:'mobile',width:'375px',widthMedia:'480px'}] },
                    canvas: {
                        scripts: ['https://cdn.tailwindcss.com', 'https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js'],
                        styles: ['https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css'],
                        content: `<style>body{padding:20px;}</style>`
                    },
                    plugins: ['gjs-blocks-basic', 'grapesjs-plugin-forms', 'grapesjs-navbar', 'grapesjs-tabs', 'grapesjs-blocks-flexbox', 'grapesjs-style-bg', 'grapesjs-component-countdown'],
                    selectorManager: { appendTo: '#selectors-container' },
                    traitManager: { appendTo: '#traits-container' },
                    styleManager: { appendTo: '#styles-container', sectors: [{name:'Typography', buildProps:['font-size','font-weight','color','text-align']},{name:'Decor', buildProps:['background-color','border-radius','padding','margin']}] },
                    blockManager: { appendTo: '#blocks-container' },
                    layerManager: { appendTo: '#layers-container' }
                });

                // ============================================================
                // 1. TRAIT TOMBOL UPLOAD (DI PANEL)
                // ============================================================
                window.editor.TraitManager.addType('file-upload', {
                    createInput({ trait }) {
                        const div = document.createElement('div'); div.className = 'w-full flex flex-col gap-2';
                        const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.style.display = 'none';
                        const btn = document.createElement('button'); btn.className = 'trait-btn-upload'; btn.innerHTML = '<i class="ph ph-upload-simple"></i> UPLOAD GAMBAR';
                        
                        btn.onclick = () => input.click();
                        input.onchange = async (e) => {
                            const file = e.target.files[0];
                            if(!file) return;
                            
                            // CONVERT KE BASE64 AGAR SINKRON DENGAN BACKEND CLOUDINARY (2).js
                            const reader = new FileReader();
                            reader.readAsDataURL(file);
                            reader.onloadend = async () => {
                                const base64String = reader.result;
                                const formData = new FormData();
                                formData.append('file', base64String); // Backend menerima key 'file'

                                try {
                                    btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> PROSES...'; btn.disabled = true;
                                    const res = await fetch('/api/admin/upload-image', { method: 'POST', body: formData });
                                    const data = await res.json();
                                    
                                    // Parse Response Cloudinary
                                    const url = data.data ? data.data[0].src : null;
                                    if(url) {
                                        trait.target.addAttributes({ src: url });
                                        window.editorApp.notify('Sukses', 'Gambar terupload');
                                    } else {
                                        throw new Error('Gagal parsing respon server');
                                    }
                                } catch(err) {
                                    console.error(err); window.editorApp.notify('Gagal', 'Error upload', 'error');
                                } finally {
                                    btn.innerHTML = '<i class="ph ph-upload-simple"></i> UPLOAD GAMBAR'; btn.disabled = false;
                                }
                            };
                        };
                        div.appendChild(btn); div.appendChild(input);
                        return div;
                    }
                });

                // ============================================================
                // 2. OVERRIDE IMAGE COMPONENT
                // Agar trait ini muncul saat image diklik
                // ============================================================
                window.editor.DomComponents.addType('image', {
                    model: {
                        defaults: {
                            traits: [
                                { type: 'text', name: 'src', label: 'URL Gambar' },
                                { type: 'file-upload', name: 'upload_trig', label: ' ' }, // Trait Custom
                                { type: 'text', name: 'alt', label: 'Alt Text' }
                            ]
                        }
                    }
                });

                // --- Register Blocks ---
                const bm = window.editor.BlockManager;
                bm.add('img-blk', { label: 'Image', category: 'Basic', content: { type: 'image', activeOnRender: 1 } });
                bm.add('text-blk', { label: 'Text', category: 'Basic', content: '<div class="p-2">Teks Contoh</div>' });
                bm.add('btn-blk', { label: 'Button', category: 'Basic', content: '<a class="btn btn-primary">Klik Saya</a>' });
            }
        };
    }
    </script>
</body>
</html>
