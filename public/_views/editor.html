<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Stacker Editor - Stabil & Ringan</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; overflow: hidden; height: 100vh; }
        [x-cloak] { display: none !important; }
        
        /* HEADER */
        header { height: 60px; background: white; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 50; position: fixed; top:0; left:0; right:0; }
        
        /* LAYOUT */
        .editor-layout { display: flex; height: calc(100vh - 60px); margin-top: 60px; }
        
        /* CANVAS AREA */
        .canvas-wrapper { flex: 1; overflow-y: auto; padding: 40px; display: flex; justify-content: center; background: #e5e7eb; }
        #canvas { 
            background: white; 
            min-height: 800px; 
            width: 100%; 
            max-width: 1200px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            padding-bottom: 50px; /* Space for drop */
        }
        
        /* CANVAS MODE DEVICE */
        #canvas.mobile { max-width: 375px; border-radius: 20px; border: 8px solid #333; }
        #canvas.tablet { max-width: 768px; }

        /* SIDEBAR WIDGETS */
        .sidebar { width: 300px; background: white; border-left: 1px solid #e5e7eb; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        /* WIDGET ITEM (DRAGGABLE) */
        .widget-item { 
            padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; cursor: grab; background: white; 
            display: flex; align-items: center; gap: 10px; transition: all 0.2s; user-select: none;
        }
        .widget-item:hover { border-color: #4f46e5; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.1); transform: translateY(-1px); }
        .widget-item:active { cursor: grabbing; }
        
        /* VISUAL SAAT DRAG */
        .sortable-ghost { opacity: 0.4; background: #eef2ff; border: 2px dashed #6366f1; }
        .sortable-drag { opacity: 1; background: white; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); transform: scale(1.02); }

        /* EDITABLE AREA HIGHLIGHT */
        #canvas *:hover { outline: 1px dashed #6366f1; cursor: text; }
        #canvas *:focus { outline: 2px solid #6366f1; background-color: rgba(99, 102, 241, 0.05); }
        
        /* DELETE BUTTON (Hover on block) */
        .block-wrapper { position: relative; }
        .block-wrapper:hover::after {
            content: "Klik Text untuk Edit | Drag untuk Pindah";
            position: absolute; top: -20px; left: 0; background: #4f46e5; color: white; 
            font-size: 10px; padding: 2px 6px; border-radius: 4px; pointer-events: none; z-index: 10;
        }
        .delete-btn {
            position: absolute; top: 5px; right: 5px; background: #ef4444; color: white; width: 24px; height: 24px;
            border-radius: 4px; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 20;
        }
        .block-wrapper:hover .delete-btn { display: flex; }
    </style>
</head>
<body x-data="stackerApp()">

    <header>
        <div class="flex items-center gap-4 w-full max-w-[400px]">
            <a href="/admin/pages" class="text-gray-400 hover:text-indigo-600"><i class="ph ph-arrow-left text-2xl"></i></a>
            <div class="flex-1">
                <input x-model="page.title" class="font-bold text-sm text-gray-800 outline-none w-full" placeholder="Judul Halaman">
                <div class="text-[10px] text-gray-400 font-mono">/<input x-model="page.slug" class="bg-transparent outline-none w-[100px]" placeholder="slug"></div>
            </div>
        </div>

        <div class="flex gap-2 bg-gray-100 p-1 rounded-lg">
            <button @click="device='desktop'" :class="device=='desktop'?'bg-white shadow text-indigo-600':''" class="p-2 rounded transition"><i class="ph ph-desktop"></i></button>
            <button @click="device='tablet'" :class="device=='tablet'?'bg-white shadow text-indigo-600':''" class="p-2 rounded transition"><i class="ph ph-device-tablet"></i></button>
            <button @click="device='mobile'" :class="device=='mobile'?'bg-white shadow text-indigo-600':''" class="p-2 rounded transition"><i class="ph ph-device-mobile"></i></button>
        </div>

        <div class="flex gap-2">
            <button @click="showSettings=true" class="px-4 py-2 border rounded-lg text-xs font-bold hover:bg-gray-50">CONFIG</button>
            <button @click="savePage" class="px-6 py-2 bg-indigo-600 text-white rounded-lg text-xs font-bold hover:bg-indigo-700 shadow-lg flex items-center gap-2">
                <span x-show="!saving">PUBLISH</span>
                <i x-show="saving" class="ph ph-spinner animate-spin"></i>
            </button>
        </div>
    </header>

    <div class="editor-layout">
        <div class="canvas-wrapper">
            <div id="canvas" :class="device" class="transition-all duration-300">
                <div class="p-10 text-center text-gray-400 border-2 border-dashed border-gray-300 m-10 rounded-xl pointer-events-none" id="empty-placeholder">
                    Drag Widget dari Kanan ke Sini
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Widget Library</div>
            <div id="widget-list" class="flex flex-col gap-2">
                <template x-for="w in widgets" :key="w.id">
                    <div class="widget-item" :data-html="w.content">
                        <div class="w-8 h-8 rounded bg-indigo-50 text-indigo-600 flex items-center justify-center shrink-0">
                            <i class="ph ph-cube text-lg"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="text-xs font-bold text-gray-700 truncate" x-text="w.label"></div>
                            <div class="text-[9px] text-gray-400 uppercase" x-text="w.category"></div>
                        </div>
                        <i class="ph ph-dots-six-vertical text-gray-300"></i>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <div x-show="showSettings" x-cloak class="fixed inset-0 z-[100] bg-black/50 flex justify-end" @click.self="showSettings=false">
        <div class="w-[400px] h-full bg-white shadow-2xl flex flex-col">
            <div class="p-5 border-b font-bold flex justify-between items-center">
                <span>Page Settings</span>
                <button @click="showSettings=false"><i class="ph ph-x text-xl"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Harga Produk (Rp)</label>
                    <input type="number" x-model="page.config.price" class="w-full mt-1 px-3 py-2 border rounded text-sm">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">SEO Title</label>
                    <input x-model="page.config.settings.seo_title" class="w-full mt-1 px-3 py-2 border rounded text-sm">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Pixel / Analytics ID</label>
                    <input x-model="page.config.settings.fb_pixel" class="w-full mt-1 px-3 py-2 border rounded text-sm mb-2" placeholder="FB Pixel ID">
                    <input x-model="page.config.settings.tiktok_pixel" class="w-full mt-1 px-3 py-2 border rounded text-sm" placeholder="TikTok Pixel ID">
                </div>
            </div>
            <div class="p-4 border-t bg-gray-50 text-right">
                <button @click="showSettings=false" class="px-4 py-2 bg-indigo-600 text-white rounded text-sm font-bold">Simpan Config</button>
            </div>
        </div>
    </div>

    <script>
        function stackerApp() {
            return {
                device: 'desktop',
                showSettings: false,
                saving: false,
                widgets: [],
                page: { id: 0, slug: '', title: '', config: { price: 0, settings: {} } },

                async init() {
                    // 1. Load Widget dari Database
                    await this.loadWidgets();
                    
                    // 2. Load Halaman jika ada slug
                    const slug = new URLSearchParams(window.location.search).get('slug');
                    if(slug) await this.loadPage(slug);

                    // 3. Inisialisasi Drag & Drop (SortableJS)
                    this.initSortable();
                },

                async loadWidgets() {
                    const res = await fetch('/api/widgets');
                    this.widgets = await res.json();
                },

                async loadPage(slug) {
                    const res = await fetch(`/api/admin/pages/${slug}`);
                    const data = await res.json();
                    this.page.id = data.id; this.page.slug = data.slug; this.page.title = data.title;
                    if(data.product_config_json) this.page.config = typeof data.product_config_json === 'string' ? JSON.parse(data.product_config_json) : data.product_config_json;
                    
                    // Load HTML ke Canvas
                    if(data.html_content) {
                        document.getElementById('canvas').innerHTML = data.html_content;
                        this.makeCanvasEditable(); // Bikin teks bisa diedit
                    }
                },

                initSortable() {
                    // A. Sidebar (Sumber)
                    new Sortable(document.getElementById('widget-list'), {
                        group: { name: 'shared', pull: 'clone', put: false }, // Clone saat ditarik
                        sort: false,
                        animation: 150
                    });

                    // B. Canvas (Tujuan)
                    new Sortable(document.getElementById('canvas'), {
                        group: 'shared',
                        animation: 150,
                        ghostClass: 'bg-indigo-50',
                        onAdd: (evt) => {
                            // SAAT DIDROP: Ubah kotak widget menjadi HTML aslinya!
                            const item = evt.item;
                            const rawHtml = item.getAttribute('data-html');
                            
                            // Bungkus HTML dalam wrapper agar bisa dihapus
                            const wrapper = document.createElement('div');
                            wrapper.className = 'block-wrapper relative group';
                            wrapper.innerHTML = `
                                <div class="delete-btn" onclick="this.closest('.block-wrapper').remove()"><i class="ph ph-trash"></i></div>
                                <div class="editable-content">${rawHtml}</div>
                            `;
                            
                            item.replaceWith(wrapper);
                            
                            // Hapus placeholder jika ada
                            const ph = document.getElementById('empty-placeholder');
                            if(ph) ph.remove();

                            this.makeCanvasEditable();
                        }
                    });
                },

                makeCanvasEditable() {
                    // Fitur "Click to Edit" Text
                    // Cari semua elemen teks dan bikin contenteditable
                    const canvas = document.getElementById('canvas');
                    canvas.querySelectorAll('h1, h2, h3, p, span, button, a').forEach(el => {
                        el.setAttribute('contenteditable', 'true');
                        // Mencegah enter bikin div baru (opsional, biar rapi)
                        el.addEventListener('keydown', e => {
                            if (e.key === 'Enter') {
                                document.execCommand('insertLineBreak');
                                e.preventDefault();
                            }
                        });
                    });
                },

                async savePage() {
                    this.saving = true;
                    
                    // 1. Bersihkan Canvas sebelum simpan
                    // Kita perlu clone canvas agar tampilan editor tidak berubah saat save
                    const canvasClone = document.getElementById('canvas').cloneNode(true);
                    
                    // Hapus tombol delete dan class editor
                    canvasClone.querySelectorAll('.delete-btn').forEach(el => el.remove());
                    canvasClone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
                    canvasClone.querySelectorAll('.block-wrapper').forEach(el => {
                        // Unwarp: Ambil isinya saja, buang wrapper editor
                        const content = el.querySelector('.editable-content').innerHTML;
                        el.outerHTML = content; 
                    });

                    const cleanHtml = canvasClone.innerHTML;

                    // 2. Kirim ke Server
                    // Inject Script Countdown Manual (Agar Live jalan)
                    const finalHtml = cleanHtml + '<script src="/js/countdown.js"><\/script><script src="/js/shortcodes.js"><\/script>';

                    try {
                        const payload = {
                            id: this.page.id, slug: this.page.slug, title: this.page.title,
                            html: finalHtml,
                            css: '', // CSS ikut Tailwind global
                            product_config: this.page.config
                        };
                        const res = await fetch('/api/admin/pages', { method: 'POST', body: JSON.stringify(payload), headers: {'Content-Type': 'application/json'} });
                        if(res.ok) alert('Berhasil Disimpan!');
                    } catch(e) { alert('Gagal Simpan'); }
                    
                    this.saving = false;
                }
            }
        }
    </script>
</body>
</html>
