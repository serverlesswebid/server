<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LandingBuilder Pro - DATABASE MODE</title>
    
    <script>
        (function() {
            const originalWarn = console.warn;
            console.warn = function(...args) {
                if (args[0] && typeof args[0] === 'string' && (args[0].includes('cdn.tailwindcss.com') || args[0].includes('production'))) return;
                originalWarn.apply(console, args);
            };
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/grapesjs@0.21.2/dist/css/grapes.min.css">
    <script src="https://unpkg.com/grapesjs@0.21.2/dist/grapes.min.js"></script>
    <script src="https://unpkg.com/grapesjs-blocks-basic@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-plugin-forms@2.0.5"></script> 
    <script src="https://unpkg.com/grapesjs-navbar@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-tabs@1.0.6"></script>
    <script src="https://unpkg.com/grapesjs-custom-code@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-tooltip@0.1.7"></script>
    <script src="https://unpkg.com/grapesjs-blocks-flexbox@0.1.1"></script>
    <script src="https://unpkg.com/grapesjs-plugin-export@1.0.11"></script>
    <script src="https://unpkg.com/grapesjs-typed@1.0.5"></script>
    <script src="https://unpkg.com/grapesjs-style-bg@2.0.1"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #fff; }
        [x-cloak] { display: none !important; }

        header {
            height: 60px; width: 100%; position: fixed; top: 0; left: 0; z-index: 100;
            background: white; border-bottom: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
        }

        .mobile-tools {
            display: none; height: 50px; width: 100%; position: fixed; top: 60px; left: 0; z-index: 90;
            background: #f8fafc; border-bottom: 1px solid #e2e8f0;
            align-items: center; justify-content: center; gap: 15px;
        }

        .workspace { position: absolute; top: 60px; bottom: 0; left: 0; right: 0; background: #f3f4f6; overflow: hidden; display: flex; }
        #gjs { position: relative !important; flex: 1; height: 100% !important; width: auto !important; min-width: 0; overflow: hidden; }

        .sidebar-panel {
            position: relative; width: 320px; height: 100%; background: white; border-left: 1px solid #e2e8f0;
            z-index: 50; display: flex; flex-direction: column; flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 768px) {
            .mobile-tools { display: flex; }
            .workspace { top: 110px; } 
            #gjs { right: 0 !important; bottom: 60px !important; }
            .sidebar-panel {
                position: fixed; right: 0; top: 110px; bottom: 60px; width: 85% !important; max-width: 320px;
                z-index: 9999 !important; transform: translateX(100%);
                box-shadow: -5px 0 20px rgba(0,0,0,0.1);
            }
            .sidebar-panel.open { transform: translateX(0); }
            .mobile-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; top: 110px; bottom: 60px; display: none; }
            .mobile-overlay.show { display: block; }
        }

        .gjs-pn-views-container, .gjs-pn-panels, .gjs-pn-views, .gjs-pn-commands { display: none !important; width: 0 !important; }
        .gjs-cv-canvas { width: 100% !important; height: 100% !important; top: 0 !important; left: 0 !important; }

        /* BLOCKS */
        .gjs-blocks-c { display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 4px !important; padding: 6px !important; }
        .gjs-block { width: 100% !important; min-height: 45px !important; padding: 4px !important; background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; cursor: pointer; transition: 0.2s; }
        .gjs-block-label { font-size: 7px !important; font-weight: 800; text-transform: uppercase; color: #4b5563; text-align: center; }
        .gjs-block i, .gjs-block iconify-icon { font-size: 14px !important; color: #6366f1; }

        .custom-scroll { overflow-y: auto; height: 100%; -webkit-overflow-scrolling: touch; }
        .gjs-selected { outline: 2px solid #6366f1 !important; outline-offset: -2px; }

        /* TRAIT UPLOAD BUTTON STYLE */
        .trait-upload-btn {
            width: 100%; padding: 8px 12px; background-color: #4f46e5; color: white; border: none; border-radius: 4px;
            font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: background 0.2s;
        }
        .trait-upload-btn:hover { background-color: #4338ca; }
        .trait-upload-btn:disabled { background-color: #9ca3af; cursor: not-allowed; }

        /* TOOLBAR */
        .gjs-toolbar { background-color: #1f2937 !important; border-radius: 6px !important; border: 1px solid #ffffff33 !important; box-shadow: 0 4px 10px rgba(0,0,0,0.3) !important; display: flex !important; flex-direction: column !important; gap: 5px !important; padding: 6px 0 !important; position: absolute !important; top: 10px !important; left: auto !important; right: 10px !important; width: 36px !important; height: auto !important; z-index: 99999 !important; transform: none !important; }
        .gjs-toolbar-item { color: white !important; width: 100% !important; height: 26px !important; display: flex !important; align-items: center; justify-content: center !important; cursor: pointer !important; transition: 0.2s !important; }
        .gjs-toolbar-item:hover { color: #818cf8 !important; transform: scale(1.1); background: rgba(255,255,255,0.1); }
        
        /* COLOR PICKER */
        .gjs-field-color-picker { width: 25px !important; height: 25px !important; flex-shrink: 0 !important; border: 1px solid #ccc !important; border-radius: 4px !important; cursor: pointer !important; display: inline-block !important; }
        .gjs-field-color { display: flex !important; align-items: center !important; gap: 8px !important; overflow: visible !important; }
        .sp-container { z-index: 999999 !important; position: fixed !important; transform: translateX(-235px) !important; background: #ffffff !important; border: 1px solid #ddd !important; box-shadow: -5px 5px 20px rgba(0,0,0,0.3) !important; padding: 8px !important; }
        .gjs-field-color-input { flex-grow: 1 !important; height: 28px !important; }
    </style>
    </head>
    <body x-data="editorApp()">

    <header>
        <div class="flex items-center gap-3 overflow-hidden w-full max-w-[250px]">
            <a href="/admin/pages" class="text-gray-400 hover:text-indigo-600 transition p-1.5 rounded shrink-0"><i class="ph ph-arrow-left text-xl"></i></a>
            <div class="flex-1 min-w-0">
                <input x-model="page.title" class="bg-transparent font-bold text-xs text-gray-800 outline-none w-full truncate" placeholder="Nama Halaman">
                <div class="flex items-center gap-1">
                    <span class="text-[8px] font-black text-gray-300 uppercase shrink-0">Slug:</span>
                    <input x-model="page.slug" class="bg-transparent font-mono text-[9px] text-gray-400 outline-none w-full truncate">
                </div>
            </div>
        </div>

        <div class="hidden md:flex absolute left-1/2 transform -translate-x-1/2 items-center bg-gray-100 rounded-lg p-1 border shadow-sm">
            <button @click="setDevice('desktop')" :class="device=='desktop'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-desktop text-lg"></i></button>
            <button @click="setDevice('tablet')" :class="device=='tablet'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-tablet text-lg"></i></button>
            <button @click="setDevice('mobile')" :class="device=='mobile'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-mobile text-lg"></i></button>
        </div>

        <div class="flex items-center gap-2">
            <button @click="showSettings=true" class="bg-white text-gray-600 px-3 py-2 rounded-lg text-xs font-bold border border-gray-200 hover:bg-gray-50 transition">Config</button>
            <button @click="savePage" :disabled="loading" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg">
                <span x-text="loading ? 'SAVING...' : 'PUBLISH'"></span>
            </button>
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden p-2 rounded-lg border border-gray-200" :class="mobileMenuOpen ? 'bg-indigo-50 text-indigo-600' : 'bg-white'">
                <i class="ph" :class="mobileMenuOpen ? 'ph-x' : 'ph-list'" style="font-size: 24px;"></i>
            </button>
        </div>
    </header>

    <div class="mobile-tools">
        <button @click="setDevice('desktop')" :class="device=='desktop'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-desktop text-lg"></i></button>
        <button @click="setDevice('tablet')" :class="device=='tablet'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-tablet text-lg"></i></button>
        <button @click="setDevice('mobile')" :class="device=='mobile'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-mobile text-lg"></i></button>
        <div class="w-px h-4 bg-gray-300"></div>
        <button @click="cmd('core:undo')" class="text-gray-500"><i class="ph ph-arrow-u-up-left text-lg"></i></button>
        <button @click="cmd('core:redo')" class="text-gray-500"><i class="ph ph-arrow-u-up-right text-lg"></i></button>
    </div>

    <div class="workspace">
        <div id="gjs"></div>
        <div class="mobile-overlay md:hidden" :class="mobileMenuOpen ? 'show' : ''" @click="mobileMenuOpen = false"></div>
        <div class="sidebar-panel" :class="mobileMenuOpen ? 'open' : ''">
            <div class="flex border-b border-gray-200 bg-white shrink-0">
                <button @click="tab='blocks'" :class="tab=='blocks'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-squares-four text-xl"></i></button>
                <button @click="tab='styles'" :class="tab=='styles'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-paint-brush text-xl"></i></button>
                <button @click="tab='traits'" :class="tab=='traits'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-sliders text-xl"></i></button>
                <button @click="tab='layers'" :class="tab=='layers'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-stack text-xl"></i></button>
            </div>
            <div class="flex-1 bg-white custom-scroll relative w-full">
                <div x-show="tab=='blocks'" class="h-full pb-20"><div id="blocks-container" class="p-2"></div></div>
                <div x-show="tab=='styles'" class="h-full pb-20"><div id="selectors-container" class="p-3 bg-gray-50 border-b"></div><div id="styles-container" class="p-1"></div></div>
                <div x-show="tab=='traits'" class="h-full pb-20"><div id="traits-container" class="p-4"></div></div>
                <div x-show="tab=='layers'" class="h-full pb-20"><div id="layers-container"></div></div>
            </div>
        </div>
    </div>

    <div x-show="showSettings" x-cloak class="fixed inset-0 z-[400] bg-slate-900/50 backdrop-blur-sm flex justify-end" @click.self="showSettings = false">
        <div class="w-full md:w-[480px] h-full bg-white shadow-2xl flex flex-col border-l border-gray-200">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50">
                <h2 class="font-bold text-gray-800 flex items-center gap-2"><i class="ph ph-faders text-indigo-600 text-xl"></i> Page Settings</h2>
                <button @click="showSettings = false" class="text-gray-400 hover:text-red-500"><i class="ph ph-x text-xl"></i></button>
            </div>
            <div class="flex border-b text-[11px] font-black uppercase bg-white">
                <button @click="settingsTab='commerce'" :class="settingsTab==='commerce'?'border-b-2 border-indigo-600 text-indigo-600 bg-indigo-50':'text-gray-400'" class="flex-1 py-4">Commerce</button>
                <button @click="settingsTab='seo'" :class="settingsTab==='seo'?'border-b-2 border-indigo-600 text-indigo-600 bg-indigo-50':'text-gray-400'" class="flex-1 py-4">SEO</button>
                <button @click="settingsTab='advanced'" :class="settingsTab==='advanced'?'border-b-2 border-indigo-600 text-indigo-600 bg-indigo-50':'text-gray-400'" class="flex-1 py-4">Scripts</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div x-show="settingsTab === 'commerce'" class="space-y-4">
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Judul Halaman</label><input x-model="page.title" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm outline-none"></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Slug</label><input x-model="page.slug" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm outline-none"></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Harga (Rp)</label><input type="number" x-model="page.config.price" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm outline-none"></div>
                </div>
                <div x-show="settingsTab === 'seo'" class="space-y-4">
                     <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">SEO Title</label><input x-model="page.config.settings.seo_title" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm outline-none"></div>
                     <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">SEO Description</label><textarea x-model="page.config.settings.seo_desc" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm outline-none h-24 resize-none"></textarea></div>
                </div>
                <div x-show="settingsTab === 'advanced'" class="space-y-4">
                     <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Custom Head Script</label><textarea x-model="page.config.settings.custom_head" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl font-mono text-xs outline-none h-32 resize-none" placeholder="<script>..."></textarea></div>
                </div>
            </div>
            <div class="p-4 border-t bg-gray-50 flex justify-end gap-3">
                <button @click="showSettings=false" class="px-5 py-2 text-xs font-bold text-gray-500">CANCEL</button>
                <button @click="savePage(); showSettings=false" class="px-8 py-2 bg-indigo-600 text-white text-xs font-black rounded-xl shadow-lg transition-all">SIMPAN</button>
            </div>
        </div>
    </div>

    <div id="iconify-picker-modal" class="fixed inset-0 hidden z-[99999] bg-black/40 flex items-start justify-center p-6 backdrop-blur-sm">
        <div class="bg-white rounded-xl w-full max-w-xl shadow-2xl mt-10 overflow-hidden">
            <div class="flex items-center justify-between p-4 border-b bg-gray-50">
                <input id="iconify-picker-search" placeholder="Cari icon..." class="w-full bg-transparent outline-none text-sm" />
                <button id="iconify-picker-close"><i class="ph ph-x text-lg"></i></button>
            </div>
            <div id="iconify-picker-results" class="p-4 grid grid-cols-6 gap-3 max-h-[300px] overflow-y-auto"></div>
        </div>
    </div>

    <div class="fixed bottom-5 left-5 z-[100000] flex flex-col gap-2 pointer-events-none">
    <template x-for="n in notifications" :key="n.id">
        <div x-show="n.show" x-transition class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg shadow-xl border-l-4 bg-white min-w-[280px] transform transition-all" :class="n.type==='success'?'border-green-500':'border-red-500'">
            <i class="ph text-2xl" :class="n.type==='success'?'ph-check-circle text-green-500':'ph-warning-circle text-red-500'"></i>
            <div><h4 class="text-xs font-bold text-gray-800 uppercase" x-text="n.title"></h4><p class="text-[10px] text-gray-500 font-medium" x-text="n.msg"></p></div>
        </div>
    </template>
    </div>

    <script>
    let appBuilderCache = {};

    // --- 1. ICONIFY PICKER LOGIC ---
    (function(){
        let activeModel = null; const modal = document.getElementById('iconify-picker-modal'); const input = document.getElementById('iconify-picker-search'); const results = document.getElementById('iconify-picker-results');
        window.openIconifyPicker = function(model) { activeModel = model; modal.classList.remove('hidden'); input.value = ''; input.focus(); searchIcons('star'); };
        document.getElementById('iconify-picker-close').onclick = () => modal.classList.add('hidden'); 
        input.oninput = (e) => searchIcons(e.target.value);
        async function searchIcons(q) { 
            if(!q) return; 
            try { const res = await fetch(`https://api.iconify.design/search?query=${q}&limit=30`); const data = await res.json(); results.innerHTML = ''; 
                if(data.icons) data.icons.forEach(icon => { const btn = document.createElement('button'); btn.className = 'p-2 hover:bg-indigo-50 rounded flex flex-col items-center gap-1 transition'; btn.innerHTML = `<iconify-icon icon="${icon}" width="24"></iconify-icon><span class="text-[9px] text-gray-400 truncate w-full text-center">${icon.split(':')[1]}</span>`; btn.onclick = () => { if(activeModel) activeModel.setAttributes({ icon: icon }); modal.classList.add('hidden'); }; results.appendChild(btn); }); 
            } catch(e) {} 
        }
    })();

    // --- 2. MAIN EDITOR APP ---
    function editorApp() {
        return {
            device: 'desktop', tab: 'blocks', settingsTab: 'commerce', mobileMenuOpen: false, showSettings: false, loading: false, notifications: [],
            page: { id: 0, slug: '', title: '', product_type: 'physical', config: { price: 0, settings: {} } },

            async init() {
                this.initGrapes();
                const slug = new URLSearchParams(window.location.search).get('slug');
                if (slug) await this.loadPageData(slug);
            },

            notify(title, msg, type = 'success') { const id = Date.now(); this.notifications.push({ id, title, msg, type, show: true }); setTimeout(() => { this.notifications = this.notifications.filter(n => n.id !== id); }, 3000); },
            setDevice(d) { this.device = d; if (window.editor) window.editor.setDevice(d); },
            cmd(c) { window.editor.runCommand(c); },

            async loadPageData(slug) {
                this.loading = true;
                try {
                    const res = await fetch(`/api/admin/pages/${slug}`);
                    const data = await res.json();
                    this.page.id = data.id; this.page.slug = data.slug; this.page.title = data.title || '';
                    if (data.product_config_json) { const conf = typeof data.product_config_json === 'string' ? JSON.parse(data.product_config_json) : data.product_config_json; this.page.config = { ...this.page.config, ...conf }; }
                    if (window.editor) {
                        let safeHtml = data.html_content || ''; 
                        
                        window.editor.setComponents(safeHtml); 
                        window.editor.setStyle(data.css_content || '');
                        
                        // HYDRATION DI EDITOR (Agar widget interaktif saat diedit)
                        setTimeout(() => {
                            window.editor.getWrapper().find('[data-widget-type]').forEach(comp => {
                                const wid = comp.getAttributes()['data-widget-type']; const wData = appBuilderCache[wid];
                                if(wData && wData.script) { try { (new Function(wData.script)).call(comp.getEl()); } catch(e) { console.error(e); } }
                            });
                        }, 800);
                    }
                } catch (e) { this.notify('Error', e.message, 'error'); }
                this.loading = false;
            },

            async savePage() {
                this.loading = true;
                try {
                    const html = window.editor.getHtml(); const css = window.editor.getCss(); 
                    const payload = { id: this.page.id, slug: this.page.slug, title: this.page.title, html: html, css: css, product_config: this.page.config };
                    const res = await fetch('/api/admin/pages', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                    if(res.ok) this.notify('Sukses', 'Saved!'); else throw new Error('Save failed');
                } catch (e) { this.notify('Gagal', e.message, 'error'); }
                this.loading = false;
            },

            initGrapes() {
                const bridgeCSS = `body { font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100vh; background-color: #ffffff; margin: 0; padding-top: 65px !important; } img { max-width: 100% !important; height: auto !important; display: block; }`; 

                window.editor = grapesjs.init({
                    container: '#gjs', height: '100%', width: 'auto', storageManager: false, panels: { defaults: [] }, allowScripts: 1, 
                    
                    // --- ASSET MANAGER (BULK UPLOAD) ---
                    assetManager: { 
                        uploadText: 'Drop gambar di sini',
                        autoAdd: 1,
                        uploadFile: async (e) => {
                            const files = e.dataTransfer ? e.dataTransfer.files : e.target.files;
                            for (let i = 0; i < files.length; i++) {
                                const file = files[i];
                                const reader = new FileReader(); reader.readAsDataURL(file);
                                reader.onloadend = async () => {
                                    const fd = new FormData(); fd.append('file', reader.result); fd.append('filename', file.name);
                                    try {
                                        const res = await fetch('/api/admin/upload-image', { method: 'POST', body: fd });
                                        const json = await res.json();
                                        if(json.data) window.editor.AssetManager.add(json.data);
                                    } catch(err) { console.error(err); }
                                };
                            }
                        }
                    },

                    canvas: {
                        scripts: ['https://cdn.tailwindcss.com', 'https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js'],
                        styles: ['https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css'],
                        content: `<style>${bridgeCSS}</style>`
                    },
                    plugins: ['gjs-blocks-basic', 'grapesjs-plugin-forms', 'grapesjs-navbar', 'grapesjs-blocks-flexbox', 'grapesjs-style-bg'],
                    deviceManager: { devices: [{ id: 'desktop', width: '' }, { id: 'tablet', width: '768px' }, { id: 'mobile', width: '375px' }] },
                    blockManager: { appendTo: '#blocks-container' },
                    styleManager: { appendTo: '#styles-container' },
                    traitManager: { appendTo: '#traits-container' },
                    layerManager: { appendTo: '#layers-container' },
                    selectorManager: { appendTo: '#selectors-container' }
                });

                const domc = window.editor.DomComponents;
                const bm = window.editor.BlockManager;
                const cmds = window.editor.Commands;

                // --- 1. CUSTOM TRAIT UNTUK UPLOAD GAMBAR (PERBAIKAN) ---
                window.editor.TraitManager.addType('file-upload', {
                    createInput({ trait }) {
                        const div = document.createElement('div'); div.style.width = '100%';
                        const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.style.display = 'none';
                        const btn = document.createElement('button'); btn.className = 'trait-upload-btn'; btn.innerHTML = '<iconify-icon icon="ph:upload-simple-bold" style="vertical-align:middle;margin-right:4px;"></iconify-icon> UPLOAD GAMBAR';
                        
                        btn.onclick = () => input.click();
                        input.onchange = () => {
                            const file = input.files[0]; if(!file) return;
                            const reader = new FileReader(); reader.readAsDataURL(file);
                            reader.onloadend = async () => {
                                const originalText = btn.innerHTML; btn.innerHTML = 'UPLOADING...'; btn.disabled = true;
                                const formData = new FormData(); formData.append('file', reader.result); formData.append('filename', file.name);
                                try {
                                    const res = await fetch('/api/admin/upload-image', { method: 'POST', body: formData });
                                    const json = await res.json();
                                    const url = json.data ? json.data[0].src : (json.url || json.secure_url);
                                    if(url) {
                                        trait.target.addAttributes({ src: url });
                                        const imgEl = trait.target.view.el; if(imgEl.tagName === 'IMG') imgEl.src = url;
                                    } else { alert('Gagal mendapatkan URL gambar'); }
                                } catch(err) { alert('Upload Gagal: ' + err.message); } finally { btn.innerHTML = originalText; btn.disabled = false; }
                            };
                        };
                        div.appendChild(btn); div.appendChild(input); return div;
                    }
                });

                // Override Component Image bawaan
                window.editor.DomComponents.addType('image', { 
                    model: { defaults: { traits: [ { type: 'text', name: 'src', label: 'URL Sumber' }, { type: 'file-upload', name: 'up', label: ' ' }, { type: 'text', name: 'alt', label: 'Alt Text' } ] } } 
                });

                cmds.add('open-icon-picker', { run(editor) { const s = editor.getSelected(); if (s && window.openIconifyPicker) window.openIconifyPicker(s); else alert('Pilih icon dulu'); } });
                
                // --- 2. LOAD WIDGETS (PERBAIKAN LOGIC SCRIPT) ---
                fetch('/api/widgets').then(res => res.json()).then(widgets => {
                    widgets.forEach(w => {
                        appBuilderCache[w.id] = w;
                        if (w.id === 'iconify-icon') return; 

                        // Ambil Attributes & Defaults
                        let compDefaults = {};
                        if (w.attributes) { try { compDefaults = JSON.parse(w.attributes); } catch(e) {} }
                        
                        // PASTIKAN data-widget-type ADA
                        if (!compDefaults.attributes) compDefaults.attributes = {};
                        compDefaults.attributes['data-widget-type'] = w.id;
                        
                        // Masukkan script ke Model Component (agar jalan di editor saat drag)
                        if (w.script) { compDefaults.script = new Function(w.script); }

                        domc.addType(w.id, { model: { defaults: compDefaults } });
                        
                        if (w.category !== 'System') { 
                            if (!bm.get(w.id)) { bm.add(w.id, { label: w.label, category: w.category, content: w.content }); }
                        }
                    });
                }).catch(err => { console.error("Gagal memuat widgets:", err); this.notify('Warning', 'Gagal memuat widget library', 'error'); });

                // Event Listeners UI
                window.editor.on('component:selected', () => { this.mobileMenuOpen = false; });
                window.editor.on('canvas:click', () => { this.mobileMenuOpen = false; });
                window.editor.on('block:drag:stop', () => { this.mobileMenuOpen = false; });
                window.editor.on('component:selected', (c) => { 
                    c.set('toolbar', [
                        { attributes: { class: 'fa fa-arrows', title: 'Geser' }, command: 'tlb-move', label: '<iconify-icon icon="ph:arrows-out-cardinal-bold" style="font-size:20px;"></iconify-icon>' },
                        { attributes: { class: 'fa fa-arrow-up', title: 'Parent' }, command: (e) => e.runCommand('core:component-exit'), label: '<iconify-icon icon="ph:arrow-fat-up-bold" style="font-size:20px;"></iconify-icon>' },
                        { attributes: { class: 'fa fa-scissors', title: 'Cut' }, command: (e) => { e.runCommand('core:copy'); e.getSelected().remove(); }, label: '<iconify-icon icon="ph:scissors-bold" style="font-size:18px; color:#fbbf24;"></iconify-icon>' },
                        { attributes: { class: 'fa fa-copy', title: 'Copy' }, command: (e) => e.runCommand('core:copy'), label: '<iconify-icon icon="ph:copy-bold" style="font-size:18px; color:#38bdf8;"></iconify-icon>' },
                        { attributes: { class: 'fa fa-paste', title: 'Paste' }, command: (e) => e.runCommand('core:paste'), label: '<iconify-icon icon="ph:clipboard-text-bold" style="font-size:18px; color:#4ade80;"></iconify-icon>' },
                        { attributes: { class: 'fa fa-paste-inside', title: 'Paste Inside' }, command: (e) => { const s = e.getSelected(); const cl = e.Models.Clipboard && e.Models.Clipboard.get ? e.Models.Clipboard.get() : null; if(cl) s.append(cl); }, label: '<iconify-icon icon="ph:arrow-elbow-down-right-bold" style="font-size:18px; color:#c084fc;"></iconify-icon>' },
                        { attributes: { class: 'fa fa-trash', title: 'Delete' }, command: 'tlb-delete', label: '<iconify-icon icon="ph:trash-bold" style="font-size:18px; color:#ef4444;"></iconify-icon>' }
                    ]);
                });
            }
        };
    }
    </script>
</body>
</html>
