<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LandingBuilder Pro - VvvebJS Edition</title>
    
    <script>
        (function() {
            const originalWarn = console.warn;
            console.warn = function(...args) {
                if (args[0] && typeof args[0] === 'string' && (args[0].includes('cdn.tailwindcss.com') || args[0].includes('production'))) return;
                originalWarn.apply(console, args);
            };
        })();
    </script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link href="https://unpkg.com/vvvebjs@1.0.0/libs/builder/builder.css" rel="stylesheet">
    <script src="https://unpkg.com/vvvebjs@1.0.0/libs/builder/builder.js"></script>
    <script src="https://unpkg.com/vvvebjs@1.0.0/libs/builder/undo.js"></script>
    <script src="https://unpkg.com/vvvebjs@1.0.0/libs/builder/inputs.js"></script>
    <script src="https://unpkg.com/vvvebjs@1.0.0/libs/builder/components-common.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #fff; }
        [x-cloak] { display: none !important; }

        header { height: 60px; width: 100%; position: fixed; top: 0; left: 0; z-index: 100; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .workspace { position: absolute; top: 60px; bottom: 0; left: 0; right: 0; background: #f3f4f6; overflow: hidden; display: flex; }
        
        /* VvvebJS Canvas Container */
        #vvveb-builder { flex: 1; height: 100%; position: relative; overflow: hidden; }
        #iframe-wrapper { height: 100%; width: 100%; border: none; }
        
        .sidebar-panel { width: 320px; height: 100%; background: white; border-left: 1px solid #e2e8f0; z-index: 50; display: flex; flex-direction: column; flex-shrink: 0; }
        
        .block-card { cursor: pointer; background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: all 0.2s; user-select: none; }
        .block-card:hover { border-color: #6366f1; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15); transform: translateY(-2px); }
        .block-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #4b5563; text-align: center; }
        
        /* Layer & Style Vvveb Tweaks */
        #vvveb-properties { padding: 10px; }
        .vvveb-input { margin-bottom: 10px; width: 100%; }
        
        [data-vvveb-component] { outline: 1px dashed #6366f1; }
    </style>
</head>
<body x-data="editorApp()">

    <header>
        <div class="flex items-center gap-3 overflow-hidden w-full max-w-[250px]">
            <a href="/admin/pages" class="text-gray-400 hover:text-indigo-600 transition p-1.5 rounded shrink-0"><i class="ph ph-arrow-left text-xl"></i></a>
            <div class="flex-1 min-w-0">
                <input x-model="page.title" class="bg-transparent font-bold text-xs text-gray-800 outline-none w-full truncate" placeholder="Nama Halaman">
                <div class="flex items-center gap-1"><span class="text-[8px] font-black text-gray-300 uppercase shrink-0">Slug:</span><input x-model="page.slug" class="bg-transparent font-mono text-[9px] text-gray-400 outline-none w-full truncate"></div>
            </div>
        </div>
        <div class="hidden md:flex absolute left-1/2 transform -translate-x-1/2 items-center bg-gray-100 rounded-lg p-1 border shadow-sm">
            <button @click="setDevice('desktop')" :class="device=='desktop'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-desktop text-lg"></i></button>
            <button @click="setDevice('tablet')" :class="device=='tablet'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-tablet text-lg"></i></button>
            <button @click="setDevice('mobile')" :class="device=='mobile'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-mobile text-lg"></i></button>
        </div>
        <div class="flex items-center gap-2">
            <button @click="showSettings=true" class="bg-white text-gray-600 px-3 py-2 rounded-lg text-xs font-bold border border-gray-200 hover:bg-gray-50 transition">Config</button>
            <button @click="savePage" :disabled="loading" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg"><span x-text="loading ? 'SAVING...' : 'PUBLISH'"></span></button>
        </div>
    </header>

    <div class="workspace">
        <div id="vvveb-builder">
            <div id="iframe-wrapper">
                <iframe id="iframe1" src="about:blank" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>

        <div class="sidebar-panel">
            <div class="flex border-b border-gray-200 bg-white shrink-0">
                <button @click="tab='blocks'" :class="tab=='blocks'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-squares-four text-xl"></i></button>
                <button @click="tab='styles'" :class="tab=='styles'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-paint-brush text-xl"></i></button>
                <button @click="tab='layers'" :class="tab=='layers'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-stack text-xl"></i></button>
            </div>
            <div class="flex-1 bg-white relative w-full overflow-y-auto custom-scroll">
                <div x-show="tab=='blocks'" class="h-full pb-20 p-2">
                    <div id="blocks-custom-renderer" class="space-y-2">
                        <div class="text-center py-10 text-gray-400 text-xs animate-pulse">Memuat Widget...</div>
                    </div>
                </div>
                <div x-show="tab=='styles'" class="h-full pb-20">
                    <div id="vvveb-properties">
                        <div class="text-center py-10 text-gray-400 text-xs">Pilih elemen di kanvas untuk mengedit style</div>
                    </div>
                </div>
                <div x-show="tab=='layers'" class="h-full pb-20">
                    <div id="vvveb-layers" class="p-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div x-show="showSettings" x-cloak class="fixed inset-0 z-[400] bg-slate-900/50 backdrop-blur-sm flex justify-end" @click.self="showSettings = false">
        <div class="w-full md:w-[480px] h-full bg-white shadow-2xl flex flex-col border-l border-gray-200">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50">
                <h2 class="font-bold text-gray-800 flex items-center gap-2"><i class="ph ph-faders text-indigo-600 text-xl"></i> Page Settings</h2>
                <button @click="showSettings = false" class="text-gray-400 hover:text-red-500"><i class="ph ph-x text-xl"></i></button>
            </div>
            <div class="flex border-b text-[11px] font-black uppercase bg-white">
                <button @click="settingsTab='commerce'" :class="settingsTab==='commerce'?'border-b-2 border-indigo-600 text-indigo-600 bg-indigo-50':'text-gray-400'" class="flex-1 py-4">Commerce</button>
                <button @click="settingsTab='seo'" :class="settingsTab==='seo'?'border-b-2 border-indigo-600 text-indigo-600 bg-indigo-50':'text-gray-400'" class="flex-1 py-4">SEO</button>
                <button @click="settingsTab='advanced'" :class="settingsTab==='advanced'?'border-b-2 border-indigo-600 text-indigo-600 bg-indigo-50':'text-gray-400'" class="flex-1 py-4">Scripts</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div x-show="settingsTab === 'commerce'" class="space-y-4">
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Judul Halaman</label><input x-model="page.title" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm outline-none focus:border-indigo-500 transition"></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">URL Slug</label><input x-model="page.slug" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm outline-none"></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Tipe Produk</label><select x-model="page.product_type" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm"><option value="physical">Physical Product</option><option value="digital">Digital Product</option></select></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Harga Dasar (Rp)</label><input type="number" x-model="page.config.price" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm outline-none"></div>
                    <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Metode Pembayaran</label>
                        <div class="grid grid-cols-2 gap-2 mt-3">
                            <label class="flex items-center gap-2 p-2 bg-white border rounded-lg cursor-pointer"><input type="checkbox" value="whatsapp" x-model="page.config.active_payments" class="w-4 h-4 rounded text-indigo-600"><span class="text-[11px] font-medium text-gray-700">WhatsApp</span></label>
                            <template x-for="p in paymentProviders" :key="p.slug">
                                <label class="flex items-center gap-2 p-2 bg-white border rounded-lg cursor-pointer"><input type="checkbox" :value="p.slug" x-model="page.config.active_payments" class="w-4 h-4 rounded text-indigo-600"><span class="text-[11px] font-medium text-gray-700" x-text="p.name"></span></label>
                            </template>
                        </div>
                    </div>
                </div>
                <div x-show="settingsTab === 'seo'" class="space-y-4">
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">SEO Title</label><input x-model="page.config.settings.seo_title" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm outline-none"></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Meta Description</label><textarea x-model="page.config.settings.seo_description" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm h-24 outline-none resize-none"></textarea></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Favicon URL</label><input x-model="page.config.settings.favicon" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm outline-none"></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Social Image</label><input x-model="page.config.settings.og_image" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm outline-none"></div>
                </div>
                <div x-show="settingsTab === 'advanced'" class="space-y-6">
                    <div class="p-4 bg-indigo-50 rounded-2xl border border-indigo-100 space-y-4">
                        <h4 class="text-[10px] font-black text-indigo-600 uppercase tracking-widest">Pixels & Analytics</h4>
                        <div><label class="text-[9px] font-bold text-indigo-400 uppercase">FB Pixel ID</label><input x-model="page.config.settings.fb_pixel" class="w-full mt-1 px-4 py-2 bg-white border border-indigo-200 rounded-lg text-sm outline-none"></div>
                        <div><label class="text-[9px] font-bold text-indigo-400 uppercase">TikTok Pixel ID</label><input x-model="page.config.settings.tiktok_pixel" class="w-full mt-1 px-4 py-2 bg-white border border-indigo-200 rounded-lg text-sm outline-none"></div>
                        <div><label class="text-[9px] font-bold text-indigo-400 uppercase">GA4 ID</label><input x-model="page.config.settings.ga_id" class="w-full mt-1 px-4 py-2 bg-white border border-indigo-200 rounded-lg text-sm outline-none"></div>
                    </div>
                    <div class="space-y-4">
                        <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Header Script</label><textarea x-model="page.config.settings.scripts_header" class="w-full mt-1 px-4 py-3 bg-gray-900 text-indigo-300 font-mono text-[10px] h-28 rounded-xl outline-none" placeholder="<script>...</script>"></textarea></div>
                        <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Footer Script</label><textarea x-model="page.config.settings.scripts_footer" class="w-full mt-1 px-4 py-3 bg-gray-900 text-indigo-300 font-mono text-[10px] h-28 rounded-xl outline-none" placeholder="Sebelum </body>"></textarea></div>
                    </div>
                </div>
            </div>
            <div class="p-4 border-t bg-gray-50 flex justify-end gap-3">
                <button @click="showSettings=false" class="px-5 py-2 text-xs font-bold text-gray-500">BATAL</button>
                <button @click="savePage(); showSettings=false" class="px-8 py-2 bg-indigo-600 text-white text-xs font-black rounded-xl shadow-lg active:scale-95 transition-all">SIMPAN</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-5 left-5 z-[100000] flex flex-col gap-2 pointer-events-none">
        <template x-for="n in notifications" :key="n.id">
            <div x-show="n.show" x-transition class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg shadow-xl border-l-4 bg-white min-w-[280px]" :class="n.type==='success'?'border-green-500':'border-red-500'">
                <i class="ph text-2xl" :class="n.type==='success'?'ph-check-circle text-green-500':'ph-warning-circle text-red-500'"></i>
                <div><h4 class="text-xs font-bold text-gray-800 uppercase" x-text="n.title"></h4><p class="text-[10px] text-gray-500 font-medium" x-text="n.msg"></p></div>
            </div>
        </template>
    </div>

    <script>
    let appBuilderCache = {};

    function editorApp() {
        return {
            device: 'desktop', tab: 'blocks', settingsTab: 'commerce', showSettings: false, loading: false, notifications: [],
            paymentProviders: [{ slug: 'paspay', name: 'Paspay QRIS' }, { slug: 'paspay-va', name: 'Paspay VA' }, { slug: 'midtrans', name: 'Midtrans' }],
            page: { id: 0, slug: '', title: '', product_type: 'physical', config: { price: 0, active_payments: [], settings: { seo_title:'', seo_description:'', favicon:'', og_image:'', fb_pixel:'', tiktok_pixel:'', ga_id:'', scripts_header:'', scripts_footer:'' } } },

            async init() {
                this.initVvveb();
                const slug = new URLSearchParams(window.location.search).get('slug');
                if (slug) await this.loadPageData(slug);
            },

            notify(title, msg, type = 'success') { 
                const id = Date.now(); this.notifications.push({ id, title, msg, type, show: true }); 
                setTimeout(() => { this.notifications = this.notifications.filter(n => n.id !== id); }, 3000); 
            },

            initVvveb() {
                // Initialize Vvveb Builder on blank page
                Vvveb.Builder.init('about:blank', () => {
                    this.loadWidgets();
                });

                // Style Management Mapping
                Vvveb.Gui.init();
            },

            async loadWidgets() {
                try {
                    const res = await fetch('/api/widgets');
                    const widgets = await res.json();
                    const renderer = document.getElementById('blocks-custom-renderer');
                    renderer.innerHTML = '';
                    const groups = {};

                    widgets.forEach(w => {
                        appBuilderCache[w.id] = w;
                        
                        // Register to VvvebJS Components
                        Vvveb.Components.add(w.id, {
                            name: w.label,
                            image: "icons/widgets.svg",
                            html: w.content,
                            properties: [] // Dynamic properties mapping from DB attributes could go here
                        });

                        if (w.category !== 'System') {
                            if (!groups[w.category]) groups[w.category] = [];
                            groups[w.category].push(w);
                        }
                    });

                    // Render to Sidebar
                    Object.keys(groups).sort().forEach(catName => {
                        const details = document.createElement('details');
                        details.className = 'group border border-gray-200 rounded-lg bg-white mb-2';
                        details.open = true;
                        
                        const summary = document.createElement('summary');
                        summary.className = 'p-3 bg-gray-50 text-xs font-bold cursor-pointer flex justify-between items-center hover:bg-gray-100';
                        summary.innerHTML = `<span>${catName}</span> <i class="ph ph-caret-down group-open:rotate-180 transition"></i>`;
                        
                        const contentDiv = document.createElement('div');
                        contentDiv.className = 'grid grid-cols-3 gap-2 p-2';
                        
                        groups[catName].forEach(w => {
                            const btn = document.createElement('div');
                            btn.className = 'block-card';
                            btn.onclick = () => Vvveb.Builder.addComponent(w.id);
                            btn.innerHTML = `<div class="text-indigo-600 mb-1"><i class="ph ph-cube text-xl"></i></div><div class="block-label">${w.label}</div>`; 
                            contentDiv.appendChild(btn);
                        });
                        
                        details.appendChild(summary);
                        details.appendChild(contentDiv);
                        renderer.appendChild(details);
                    });

                } catch (e) { console.error('Widget Load Error', e); }
            },

            async loadPageData(slug) {
                this.loading = true;
                try {
                    const res = await fetch(`/api/admin/pages/${slug}`);
                    const data = await res.json();
                    this.page.id = data.id; 
                    this.page.slug = data.slug; 
                    this.page.title = data.title || '';
                    
                    if (data.product_config_json) { 
                        const conf = typeof data.product_config_json === 'string' ? JSON.parse(data.product_config_json) : data.product_config_json;
                        this.page.config = { ...this.page.config, ...conf }; 
                    }
                    
                    // Set VvvebJS Content
                    const combinedHtml = `<style>${data.css_content || ''}</style>${data.html_content || ''}`;
                    Vvveb.Builder.setHtml(combinedHtml);

                } catch (e) { this.notify('Error', e.message, 'error'); }
                this.loading = false;
            },

            async savePage() {
                this.loading = true;
                try {
                    // Extract HTML and CSS from VvvebJS
                    const html = Vvveb.Builder.getHtml();
                    const css = ""; // Vvveb usually embeds CSS or keeps it in global styles

                    // Live Hydration Script Injection (Preserved Logic)
                    const hydrationScript = `
                    <script>
                    document.addEventListener("DOMContentLoaded", function() {
                        document.querySelectorAll('.js-countdown').forEach(function(el) {
                            if(el.dataset.init === "true") return;
                            el.dataset.init = "true";
                            var display = el.querySelector(".js-display");
                            var expiredBox = el.querySelector(".js-expired-msg");
                            var expireStr = el.getAttribute("data-expire");
                            var msgStr = el.getAttribute("data-msg") || "WAKTU HABIS";
                            if (!expireStr) return;
                            var update = function() {
                                var now = new Date().getTime();
                                var target = new Date(expireStr).getTime();
                                var distance = target - now;
                                if (distance < 0) {
                                    if(display) display.style.display = "none";
                                    if(expiredBox) { expiredBox.style.display = "block"; expiredBox.classList.remove("hidden"); expiredBox.innerHTML = msgStr; }
                                    clearInterval(interval); return;
                                }
                                var d = Math.floor(distance / (1000 * 60 * 60 * 24));
                                var h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                                var m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                                var s = Math.floor((distance % (1000 * 60)) / 1000);
                                var setTxt = function(sel, val) {
                                    var node = el.querySelector(sel);
                                    if (node) node.innerText = val < 10 ? "0" + val : val;
                                };
                                setTxt(".days", d); setTxt(".hours", h); setTxt(".minutes", m); setTxt(".seconds", s);
                            };
                            var interval = setInterval(update, 1000);
                            update();
                        });
                    });
                    <\/script>`;

                    const payload = {
                        id: this.page.id, slug: this.page.slug, title: this.page.title,
                        html: html + hydrationScript, 
                        css: css, product_config: this.page.config
                    };
                    
                    const res = await fetch('/api/admin/pages', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify(payload) 
                    });
                    
                    if(res.ok) this.notify('Sukses', 'Halaman berhasil dipublish!'); 
                    else throw new Error('Simpan gagal');
                } catch (e) { this.notify('Gagal', e.message, 'error'); }
                this.loading = false;
            },

            setDevice(d) { 
                this.device = d; 
                const iframe = document.getElementById('iframe1');
                if (d === 'mobile') iframe.style.width = '375px';
                else if (d === 'tablet') iframe.style.width = '768px';
                else iframe.style.width = '100%';
            }
        };
    }
    </script>
</body>
</html>
