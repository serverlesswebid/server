<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronBuilder - Robust Core</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; overflow: hidden; height: 100vh; }
        [x-cloak] { display: none !important; }
        
        /* HEADER */
        header { height: 60px; background: white; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 50; position: fixed; top:0; left:0; right:0; }
        
        /* LAYOUT */
        .main-layout { display: flex; height: calc(100vh - 60px); margin-top: 60px; }
        
        /* CANVAS WRAPPER */
        .canvas-area { flex: 1; overflow-y: auto; padding: 40px; background-color: #e5e7eb; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; display: flex; justify-content: center; }
        
        /* THE CANVAS */
        #editor-canvas { 
            background: white; min-height: 800px; width: 100%; max-width: 1200px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: width 0.3s; 
            padding-bottom: 100px; /* Area drop bawah */
        }
        #editor-canvas.mobile { max-width: 375px; border: 8px solid #333; border-radius: 20px; }
        #editor-canvas.tablet { max-width: 768px; }

        /* SIDEBAR */
        .sidebar { width: 320px; background: white; border-left: 1px solid #e5e7eb; display: flex; flex-direction: column; z-index: 40; }
        .widget-list { overflow-y: auto; padding: 15px; flex: 1; display: flex; flex-direction: column; gap: 10px; }

        /* WIDGET ITEM (Vanilla JS Rendered) */
        .widget-item { 
            padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; background: white; 
            display: flex; align-items: center; gap: 10px; cursor: grab; user-select: none;
            transition: all 0.2s;
        }
        .widget-item:hover { border-color: #6366f1; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .widget-item:active { cursor: grabbing; }
        .widget-icon { width: 32px; height: 32px; background: #eef2ff; color: #4f46e5; border-radius: 6px; display: flex; align-items: center; justify-content: center; }

        /* SORTABLE GHOSTS */
        .sortable-ghost { opacity: 0.4; background: #e0e7ff; border: 2px dashed #6366f1; height: 60px; overflow: hidden; }
        .sortable-drag { opacity: 1; background: white; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); transform: scale(1.02); }

        /* CANVAS EDITING EXPERIENCE */
        /* Sorot elemen saat hover */
        #editor-canvas *:hover { outline: 1px dashed #6366f1; cursor: text; }
        /* Tampilan saat teks diedit */
        [contenteditable="true"]:focus { outline: 2px solid #6366f1; background: rgba(255,255,255,0.8); }
        
        /* HOVER TOOLS (Hapus/Move) */
        .comp-wrapper { position: relative; }
        .comp-wrapper:hover::before {
            content: ""; position: absolute; inset: 0; border: 2px solid #6366f1; pointer-events: none; z-index: 10;
        }
        .comp-tools {
            position: absolute; top: -30px; right: 0; background: #6366f1; display: none; 
            border-radius: 4px; padding: 2px; z-index: 20; gap: 2px;
        }
        .comp-wrapper:hover .comp-tools { display: flex; }
        .tool-btn { color: white; padding: 4px 8px; cursor: pointer; font-size: 12px; display: flex; align-items: center; }
        .tool-btn:hover { background: rgba(0,0,0,0.2); }
    </style>
</head>
<body x-data="ironApp()">

    <header>
        <div class="flex items-center gap-4 w-1/3">
            <a href="/admin/pages" class="text-gray-400 hover:text-indigo-600"><i class="ph ph-arrow-left text-2xl"></i></a>
            <div>
                <input x-model="page.title" class="font-bold text-gray-800 outline-none w-full" placeholder="Judul Halaman">
                <div class="flex text-xs text-gray-400 font-mono">/<input x-model="page.slug" class="bg-transparent outline-none" placeholder="slug"></div>
            </div>
        </div>

        <div class="flex bg-gray-100 p-1 rounded-lg">
            <button @click="device='desktop'" :class="device=='desktop'?'bg-white shadow text-indigo-600':''" class="p-2 rounded transition"><i class="ph ph-desktop"></i></button>
            <button @click="device='mobile'" :class="device=='mobile'?'bg-white shadow text-indigo-600':''" class="p-2 rounded transition"><i class="ph ph-device-mobile"></i></button>
        </div>

        <div class="flex justify-end gap-2 w-1/3">
            <button @click="showConfig=true" class="px-4 py-2 border rounded text-xs font-bold hover:bg-gray-50">CONFIG</button>
            <button @click="savePage" :disabled="saving" class="px-6 py-2 bg-indigo-600 text-white rounded text-xs font-bold hover:bg-indigo-700 shadow-lg flex items-center gap-2">
                <span x-text="saving ? 'SAVING...' : 'PUBLISH'"></span>
                <i x-show="saving" class="ph ph-spinner animate-spin"></i>
            </button>
        </div>
    </header>

    <div class="main-layout">
        <div class="canvas-area">
            <div id="editor-canvas" :class="device">
                <div id="empty-msg" class="h-full flex flex-col items-center justify-center text-gray-400 pointer-events-none p-20 border-2 border-dashed border-gray-300 rounded-xl m-10">
                    <i class="ph ph-plus-circle text-4xl mb-2"></i>
                    <span>Drop Widget Disini</span>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="p-4 border-b font-bold text-xs text-gray-500 uppercase">Widget Library</div>
            <div id="widget-container" class="widget-list">
                <div class="text-center py-10 text-gray-400 text-xs animate-pulse">Memuat...</div>
            </div>
        </div>
    </div>

    <div x-show="showConfig" x-cloak class="fixed inset-0 z-[100] bg-black/50 flex justify-end" @click.self="showConfig=false">
        <div class="w-96 bg-white h-full shadow-2xl p-6 flex flex-col">
            <h2 class="font-bold text-lg mb-4">Pengaturan</h2>
            <div class="space-y-4 flex-1">
                <div><label class="text-[10px] font-bold uppercase text-gray-400">Harga (Rp)</label><input type="number" x-model="page.config.price" class="w-full border p-2 rounded text-sm"></div>
                <div><label class="text-[10px] font-bold uppercase text-gray-400">SEO Title</label><input x-model="page.config.settings.seo_title" class="w-full border p-2 rounded text-sm"></div>
                <div><label class="text-[10px] font-bold uppercase text-gray-400">Pixel ID</label><input x-model="page.config.settings.fb_pixel" class="w-full border p-2 rounded text-sm"></div>
            </div>
            <button @click="savePage(); showConfig=false" class="w-full bg-indigo-600 text-white py-3 rounded font-bold">Simpan</button>
        </div>
    </div>

    <script>
    function ironApp() {
        return {
            device: 'desktop',
            showConfig: false,
            saving: false,
            page: { id: 0, slug: '', title: '', config: { price: 0, settings: {} } },

            async init() {
                // 1. Load Widget & Page
                await this.initWidgets(); 
                const slug = new URLSearchParams(window.location.search).get('slug');
                if(slug) await this.loadPage(slug);

                // 2. Init Drag & Drop
                this.initSortable();
            },

            // --- BAGIAN INI MENGGUNAKAN VANILLA JS UNTUK RENDER SIDEBAR ---
            // Ini untuk menghindari error "w is not defined" dari Alpine saat cloning
            async initWidgets() {
                const container = document.getElementById('widget-container');
                try {
                    const res = await fetch('/api/widgets');
                    const widgets = await res.json();
                    
                    container.innerHTML = ''; // Clear loading
                    
                    widgets.forEach(w => {
                        // Kita simpan HTML asli di atribut data-html (Encoded untuk keamanan)
                        const el = document.createElement('div');
                        el.className = 'widget-item';
                        // Simpan HTML string mentah-mentah
                        el.dataset.html = w.content; 
                        el.dataset.id = w.id;
                        
                        el.innerHTML = `
                            <div class="widget-icon"><i class="ph ph-cube text-lg"></i></div>
                            <div class="flex-1 min-w-0">
                                <div class="text-xs font-bold text-gray-700 truncate">${w.label}</div>
                                <div class="text-[9px] text-gray-400 uppercase">${w.category}</div>
                            </div>
                        `;
                        container.appendChild(el);
                    });
                } catch(e) { container.innerHTML = '<div class="text-red-500 text-xs p-4">Gagal memuat widget</div>'; }
            },

            async loadPage(slug) {
                const res = await fetch(`/api/admin/pages/${slug}`);
                const data = await res.json();
                this.page.id = data.id; this.page.slug = data.slug; this.page.title = data.title;
                if(data.product_config_json) this.page.config = typeof data.product_config_json === 'string' ? JSON.parse(data.product_config_json) : data.product_config_json;
                
                // Render HTML ke Canvas
                const canvas = document.getElementById('editor-canvas');
                if(data.html_content) {
                    // Bersihkan script lama
                    let cleanContent = data.html_content.replace(/<script\b[^>]*>([\s\S]*?)<\/script>/gm, "");
                    canvas.innerHTML = cleanContent;
                    this.hydrateCanvas(); // Pasang fitur edit
                }
            },

            initSortable() {
                const sidebar = document.getElementById('widget-container');
                const canvas = document.getElementById('editor-canvas');

                // Sidebar Source
                new Sortable(sidebar, {
                    group: { name: 'shared', pull: 'clone', put: false },
                    sort: false,
                    animation: 150
                });

                // Canvas Target
                new Sortable(canvas, {
                    group: 'shared',
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    onAdd: (evt) => {
                        const item = evt.item;
                        const rawHtml = item.dataset.html; // Ambil HTML dari dataset
                        
                        // Buat elemen pembungkus editor
                        const wrapper = document.createElement('div');
                        wrapper.className = 'comp-wrapper group relative';
                        wrapper.innerHTML = `
                            <div class="comp-tools">
                                <div class="tool-btn bg-red-500" onclick="this.closest('.comp-wrapper').remove()"><i class="ph ph-trash"></i></div>
                                <div class="tool-btn cursor-move handle"><i class="ph ph-arrows-out-cardinal"></i></div>
                            </div>
                            <div class="comp-content">${rawHtml}</div>
                        `;

                        item.replaceWith(wrapper);
                        
                        // Hapus empty state
                        const empty = document.getElementById('empty-msg');
                        if(empty) empty.remove();

                        this.hydrateCanvas(); // Aktifkan edit teks
                    }
                });
            },

            // Fungsi membuat teks bisa diedit
            hydrateCanvas() {
                const canvas = document.getElementById('editor-canvas');
                
                // 1. Bungkus elemen liar jika ada (dari load data lama)
                // (Opsional, tapi bagus untuk konsistensi)
                
                // 2. Aktifkan ContentEditable
                canvas.querySelectorAll('h1, h2, h3, p, span, a, button, li, div').forEach(el => {
                    // Hanya elemen yang punya teks langsung (daun)
                    if(el.children.length === 0 && el.textContent.trim() !== '') {
                        el.setAttribute('contenteditable', 'true');
                        // Prevent Enter bikin div baru
                        el.addEventListener('keydown', e => {
                            if(e.key === 'Enter') {
                                document.execCommand('insertLineBreak');
                                e.preventDefault();
                            }
                        });
                    }
                });
            },

            async savePage() {
                this.saving = true;
                const canvas = document.getElementById('editor-canvas');
                
                // 1. Clone untuk pembersihan
                const clone = canvas.cloneNode(true);
                
                // 2. Bersihkan alat-alat editor
                clone.querySelectorAll('.comp-tools').forEach(el => el.remove());
                clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
                
                // Unwrap (Buang wrapper .comp-wrapper, sisakan isinya)
                // Atau biarkan wrapper untuk layout? Lebih aman unwrap jika ingin bersih.
                // Tapi untuk Sortable biar bisa re-edit nanti, kita PERTAHANKAN strukturnya, 
                // Cuma bersihkan class editor.
                
                const cleanHtml = clone.innerHTML;

                // 3. INJECT SCRIPT LIVE (Countdown & Accordion)
                // Script ini disuntikkan inline agar tidak 404
                const liveScript = `
                <script>
                document.addEventListener("DOMContentLoaded", function() {
                    // COUNTDOWN LOGIC
                    document.querySelectorAll('.js-countdown').forEach(el => {
                        if(el.dataset.init) return; el.dataset.init="true";
                        const expire = el.getAttribute("data-expire"); if(!expire) return;
                        const update = () => {
                            const now = new Date().getTime(); const dist = new Date(expire).getTime() - now;
                            if(dist < 0) { el.innerHTML = "EXPIRED"; return; }
                            const d = Math.floor(dist / (1000*60*60*24));
                            const h = Math.floor((dist % (1000*60*60*24)) / (1000*60*60));
                            const m = Math.floor((dist % (1000*60*60)) / (1000*60));
                            const s = Math.floor((dist % (1000*60)) / 1000);
                            if(el.querySelector(".days")) el.querySelector(".days").innerText = d;
                            if(el.querySelector(".hours")) el.querySelector(".hours").innerText = h;
                            if(el.querySelector(".minutes")) el.querySelector(".minutes").innerText = m;
                            if(el.querySelector(".seconds")) el.querySelector(".seconds").innerText = s;
                        };
                        setInterval(update, 1000); update();
                    });
                    // ACCORDION LOGIC
                    document.querySelectorAll("details").forEach(target => {
                        target.addEventListener("click", () => {
                            if (!target.open) {
                                document.querySelectorAll("details").forEach(other => {
                                    if (other !== target) other.removeAttribute("open");
                                });
                            }
                        });
                    });
                });
                <\/script>`;

                try {
                    const payload = {
                        id: this.page.id, slug: this.page.slug, title: this.page.title,
                        html: cleanHtml + liveScript,
                        css: '', 
                        product_config: this.page.config
                    };
                    const res = await fetch('/api/admin/pages', { method: 'POST', body: JSON.stringify(payload), headers: {'Content-Type': 'application/json'} });
                    if(res.ok) alert('Berhasil Publish!'); else throw new Error('Gagal');
                } catch(e) { alert(e.message); }
                
                this.saving = false;
            }
        };
    }
    </script>
</body>
</html>
