<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LandingBuilder Pro</title>
    
    <script>
        (function() {
            const originalWarn = console.warn;
            console.warn = function(...args) {
                if (args[0] && typeof args[0] === 'string' && (args[0].includes('cdn.tailwindcss.com') || args[0].includes('production'))) return;
                originalWarn.apply(console, args);
            };
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/grapesjs@0.21.2/dist/css/grapes.min.css">
    <script src="https://unpkg.com/grapesjs@0.21.2/dist/grapes.min.js"></script>
    <script src="https://unpkg.com/grapesjs-blocks-basic@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-plugin-forms@2.0.5"></script> 
    <script src="https://unpkg.com/grapesjs-navbar@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-blocks-flexbox@0.1.1"></script>
    <script src="https://unpkg.com/grapesjs-style-bg@2.0.1"></script>
    <script src="https://unpkg.com/grapesjs-component-countdown@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-tabs@1.0.6"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #fff; }
        [x-cloak] { display: none !important; }

        /* LAYOUT & Z-INDEX */
        header { height: 60px; width: 100%; position: fixed; top: 0; left: 0; z-index: 40; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; }
        .workspace { position: absolute; top: 60px; bottom: 0; left: 0; right: 0; background: #f3f4f6; overflow: hidden; display: flex; z-index: 0; }
        .sidebar-panel { width: 320px; height: 100%; background: white; border-left: 1px solid #e2e8f0; z-index: 50; display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 4px 0 24px rgba(0,0,0,0.1); }
        .mobile-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 45; backdrop-filter: blur(4px); }
        
        /* FIX COLOR PICKER PALETTE (PALING ATAS) */
        .sp-container { z-index: 9999999 !important; background: white; border: 1px solid #cbd5e1; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2); border-radius: 8px; }
        .gjs-field-color-picker { border: 1px solid #cbd5e1; margin-right: 5px; cursor: pointer; border-radius: 4px; min-width: 30px; padding: 2px; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .mobile-tools { display: flex !important; }
            .workspace { top: 110px; } 
            #gjs { right: 0 !important; bottom: 60px !important; }
            .sidebar-panel { position: fixed; right: 0; top: 110px; bottom: 60px; width: 100% !important; z-index: 9999 !important; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
            .sidebar-panel.open { transform: translateX(0); }
        }
        .mobile-tools { display: none; height: 50px; width: 100%; position: fixed; top: 60px; left: 0; z-index: 90; background: #f8fafc; border-bottom: 1px solid #e2e8f0; align-items: center; justify-content: center; gap: 15px; }

        /* UI COMPONENTS */
        .gjs-cv-canvas { width: 100% !important; height: 100% !important; top: 0 !important; left: 0 !important; }
        .gjs-pn-views-container, .gjs-pn-panels, .gjs-pn-views, .gjs-pn-commands { display: none !important; } 
        .trait-btn { width: 100%; background: #4f46e5; color: white; padding: 10px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; transition: background 0.2s; text-align: center; display:flex; align-items:center; justify-content:center; gap:6px; margin-top: 5px; }
        .trait-btn:hover { background: #4338ca; }
        .trait-btn:disabled { opacity: 0.7; cursor: wait; }

        /* WIDGET GRID */
        .widget-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 10px; background: #fff; }
        .block-card { cursor: grab; background: white; border: 1px solid #e5e7eb; border-radius: 6px; padding: 12px 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: all 0.2s; user-select: none; }
        .block-card:hover { border-color: #6366f1; transform: translateY(-2px); }
        .block-label { font-size: 10px; font-weight: 600; text-align: center; color: #374151; }
    </style>
</head>
<body x-data="editorApp()" x-init="window.editorApp = $data">

    <div class="fixed bottom-20 left-5 z-[9999] flex flex-col gap-2 pointer-events-none">
        <template x-for="n in notifications" :key="n.id">
            <div x-show="n.show" x-transition class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border-l-4 bg-white" :class="n.type==='success'?'border-green-500':'border-red-500'">
                <i class="ph text-xl" :class="n.type==='success'?'ph-check-circle text-green-500':'ph-warning-circle text-red-500'"></i>
                <div class="text-xs font-bold text-gray-800" x-text="n.title"></div>
            </div>
        </template>
    </div>

    <header>
        <div class="flex items-center gap-3 flex-1 min-w-0">
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden shrink-0 text-gray-600 bg-gray-100 hover:bg-gray-200 p-2 rounded-lg transition"><i class="ph ph-list text-2xl"></i></button>
            <a href="/admin/pages" class="hidden md:block text-gray-400 hover:text-indigo-600 p-1.5"><i class="ph ph-arrow-left text-xl"></i></a>
            <div class="flex flex-col min-w-0 flex-1">
                <input x-model="page.title" class="bg-transparent font-bold text-sm text-gray-800 outline-none w-full truncate" placeholder="Nama Halaman">
                <span class="text-[10px] text-gray-400 truncate font-mono" x-text="page.slug ? '/'+page.slug : 'Draft Mode'"></span>
            </div>
        </div>
        <div class="hidden md:flex items-center bg-gray-100 rounded-lg p-1 border shadow-sm mx-4">
            <button @click="setDevice('desktop')" :class="device=='desktop'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded"><i class="ph ph-desktop"></i></button>
            <button @click="setDevice('tablet')" :class="device=='tablet'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded"><i class="ph ph-device-tablet"></i></button>
            <button @click="setDevice('mobile')" :class="device=='mobile'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded"><i class="ph ph-device-mobile"></i></button>
        </div>
        <div class="flex items-center gap-2 shrink-0">
            <button @click="showSettings=true" class="flex items-center gap-2 bg-white text-gray-600 px-3 py-2 rounded-lg text-xs font-bold border hover:bg-gray-50"><i class="ph ph-gear"></i> <span class="hidden md:inline">CONFIG</span></button>
            <button @click="savePage" :disabled="loading" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-md transition active:scale-95">
                <span x-text="loading ? 'SAVING...' : 'PUBLISH'"></span>
            </button>
        </div>
    </header>

    <div class="mobile-tools">
        <button @click="setDevice('desktop')" :class="device=='desktop'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-desktop text-lg"></i></button>
        <button @click="setDevice('mobile')" :class="device=='mobile'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-mobile text-lg"></i></button>
    </div>

    <div class="workspace">
        <div id="gjs"></div>
        <div x-show="mobileMenuOpen" class="mobile-backdrop" @click="mobileMenuOpen = false" x-transition.opacity></div>

        <div class="sidebar-panel fixed inset-y-0 left-0 md:static transform duration-300 ease-in-out" :class="mobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'">
            <div class="md:hidden flex items-center justify-between p-4 border-b bg-gray-50">
                <span class="font-bold text-gray-800 text-sm uppercase">Tools</span>
                <button @click="mobileMenuOpen = false"><i class="ph ph-x text-lg"></i></button>
            </div>
            <div class="flex border-b border-gray-200 bg-white shrink-0">
                <button @click="tab='blocks'" :class="tab=='blocks'?'text-indigo-600 border-b-2 border-indigo-600 bg-indigo-50':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-squares-four text-xl"></i></button>
                <button @click="tab='traits'" :class="tab=='traits'?'text-indigo-600 border-b-2 border-indigo-600 bg-indigo-50':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-gear text-xl"></i></button>
                <button @click="tab='styles'" :class="tab=='styles'?'text-indigo-600 border-b-2 border-indigo-600 bg-indigo-50':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-paint-brush text-xl"></i></button>
            </div>
            
            <div class="flex-1 bg-white relative w-full overflow-y-auto custom-scroll">
                <div x-show="tab=='blocks'" class="h-full pb-20">
                    <template x-for="(widgets, category) in groupedWidgets" :key="category">
                        <details class="category-group" open>
                            <summary x-text="category || 'General'"></summary>
                            <div class="widget-grid">
                                <template x-for="w in widgets" :key="w.id">
                                    <div class="block-card" @click="addBlockToCanvas(w)">
                                        <div class="block-icon text-indigo-600 text-xl"><i class="ph ph-cube"></i></div>
                                        <div class="block-label" x-text="w.label"></div>
                                    </div>
                                </template>
                            </div>
                        </details>
                    </template>
                </div>
                <div x-show="tab=='traits'" class="h-full pb-20">
                    <div id="traits-container" class="p-3"></div>
                    <div class="p-4 text-center text-xs text-gray-400 bg-gray-50 border-t">Klik elemen untuk pengaturan.</div>
                </div>
                <div x-show="tab=='styles'" class="h-full pb-20"><div id="selectors-container" class="p-3 border-b bg-gray-50"></div><div id="styles-container" class="p-1"></div></div>
            </div>
        </div>
    </div>

    <div x-show="showIconPicker" x-cloak class="alpine-modal fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="w-full max-w-lg bg-white rounded-xl shadow-2xl flex flex-col max-h-[80vh]" @click.outside="showIconPicker=false">
            <div class="p-4 border-b flex justify-between items-center"><h3 class="font-bold">Pilih Icon</h3><button @click="showIconPicker=false"><i class="ph ph-x"></i></button></div>
            <div class="p-4 space-y-4">
                <div class="flex gap-2"><input x-model="iconSearch" @keyup.enter="searchIcons()" class="flex-1 p-2 border rounded" placeholder="Search icon..."><button @click="searchIcons()" class="px-4 py-2 bg-indigo-600 text-white rounded">Cari</button></div>
                <div class="grid grid-cols-6 gap-2 max-h-60 overflow-y-auto custom-scroll">
                    <template x-for="icon in iconList" :key="icon">
                        <div @click="applyIcon(icon)" class="p-2 border rounded flex justify-center hover:bg-indigo-50 cursor-pointer"><iconify-icon :icon="icon" width="24"></iconify-icon></div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <script>
    function editorApp() {
        return {
            device: 'desktop', tab: 'blocks', mobileMenuOpen: false, showSettings: false, showIconPicker: false, 
            iconSearch: '', loading: false, loadingIcons: false, notifications: [],
            page: { id: 0, slug: '', title: '', product_type: 'physical', config: { price: 0, settings: {} } },
            groupedWidgets: {}, widgetScripts: {}, iconList: [],

            async init() {
                // 1. Load data DULU
                await this.loadWidgets();
                // 2. Baru init GrapesJS
                this.initGrapes();
                
                const slug = new URLSearchParams(window.location.search).get('slug');
                if (slug) await this.loadPageData(slug);
                this.iconList = ['ph:star-fill','ph:heart-fill','ph:check-circle-fill','logos:whatsapp-icon','logos:facebook','logos:instagram-icon'];
            },

            notify(title, type = 'success') { const id = Date.now(); this.notifications.push({ id, title, type, show: true }); setTimeout(() => { this.notifications = this.notifications.filter(n => n.id !== id); }, 3000); },

            async loadWidgets() {
                try {
                    const res = await fetch('/api/widgets');
                    const widgets = await res.json();
                    this.groupedWidgets = {}; this.widgetScripts = {};
                    widgets.forEach(w => {
                        if(w.script && w.id !== 'iconify-icon' && w.id !== 'faq-accordion') this.widgetScripts[w.id] = w.script;
                        const cat = w.category || 'General';
                        if(!this.groupedWidgets[cat]) this.groupedWidgets[cat] = [];
                        this.groupedWidgets[cat].push(w);
                    });
                } catch(e) { this.notify('Gagal load widget', 'error'); }
            },

            initGrapes() {
                window.editor = grapesjs.init({
                    container: '#gjs', height: '100%', fromElement: false, storageManager: false, panels: { defaults: [] }, 
                    allowScripts: 1, 
                    deviceManager: { devices: [{name:'desktop',width:''},{name:'tablet',width:'768px'},{name:'mobile',width:'375px'}] },
                    assetManager: { embedAsBase64: 0, openAssetsOnDrop: 0 },
                    canvas: {
                        scripts: ['https://cdn.tailwindcss.com', 'https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js'],
                        styles: ['https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css'],
                        content: `<style>body{padding:20px;} details{min-height:50px;}</style>`
                    },
                    plugins: ['gjs-blocks-basic', 'grapesjs-plugin-forms', 'grapesjs-navbar', 'grapesjs-tabs', 'grapesjs-blocks-flexbox', 'grapesjs-style-bg', 'grapesjs-component-countdown'],
                    selectorManager: { appendTo: '#selectors-container' },
                    traitManager: { appendTo: '#traits-container' },
                    styleManager: { appendTo: '#styles-container', sectors: [{ name: 'Typography', open: 1, buildProps: ['font-size','font-weight','color','text-align'] },{ name: 'Layout', open: 0, buildProps: ['padding','margin','display','width','height'] },{ name: 'Decor', open: 0, buildProps: ['background-color','border-radius','box-shadow'] }] },
                });

                // ============================================================
                // TRAIT TOMBOL UPLOAD (BASE64)
                // ============================================================
                window.editor.TraitManager.addType('file-upload', {
                    createInput({ trait }) {
                        const div = document.createElement('div');
                        const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.style.display = 'none';
                        const btn = document.createElement('button'); btn.className = 'trait-btn'; btn.innerHTML = '<i class="ph ph-upload-simple"></i> UPLOAD GAMBAR';
                        
                        btn.onclick = () => input.click();
                        input.onchange = (e) => {
                            const file = e.target.files[0]; if(!file) return;
                            const reader = new FileReader();
                            reader.readAsDataURL(file);
                            reader.onloadend = async () => {
                                const base64 = reader.result;
                                const formData = new FormData(); formData.append('file', base64);
                                try {
                                    btn.innerHTML = 'UPLOADING...'; btn.disabled = true;
                                    const res = await fetch('/api/admin/upload-image', { method: 'POST', body: formData });
                                    const json = await res.json();
                                    const url = json.data ? json.data[0].src : (json.url || json.secure_url);
                                    if(url) { trait.target.addAttributes({ src: url }); }
                                } catch(err) { alert('Upload Gagal'); }
                                finally { btn.innerHTML = 'UPLOAD GAMBAR'; btn.disabled = false; }
                            };
                        };
                        div.appendChild(btn); div.appendChild(input); return div;
                    }
                });

                window.editor.DomComponents.addType('image', {
                    model: { defaults: { traits: [{ type: 'text', name: 'src', label: 'URL' }, { type: 'file-upload', name: 'up', label: ' ' }, { type: 'text', name: 'alt' }] } }
                });

                // ICON PICKER TRAIT
                window.editor.TraitManager.addType('icon-btn', {
                    createInput() {
                        const btn = document.createElement('button'); btn.className = 'trait-btn'; btn.innerHTML = 'Cari Icon';
                        btn.onclick = () => window.editorApp.showIconPicker = true;
                        return btn;
                    }
                });
                window.editor.DomComponents.addType('iconify-icon', {
                    isComponent: el => el.tagName === 'ICONIFY-ICON',
                    model: { defaults: { traits: [{ type: 'icon-btn', name: 'p', label: ' ' }, { type: 'text', name: 'icon' }, { type: 'color', name: 'color', changeProp: 1 }] }, init() { this.on('change:color', () => this.addStyle({color: this.get('color')})) } }
                });
            },

            addBlockToCanvas(w) {
                const component = window.editor.addComponents(w.content)[0];
                if(window.innerWidth < 768) this.mobileMenuOpen = false;
            },

            async searchIcons() {
                if(!this.iconSearch) return;
                this.loadingIcons = true;
                try { const res = await fetch(`https://api.iconify.design/search?query=${encodeURIComponent(this.iconSearch)}&limit=30`); if(res.ok) { const data = await res.json(); this.iconList = data.icons || []; } } catch(e) {}
                this.loadingIcons = false;
            },
            applyIcon(icon) {
                const selected = window.editor.getSelected();
                if(selected) {
                    if(selected.is('iconify-icon')) selected.addAttributes({ icon: icon });
                    else selected.append(`<iconify-icon icon="${icon}" width="32"></iconify-icon>`);
                }
                this.showIconPicker = false;
            },

            async loadPageData(slug) {
                try {
                    const res = await fetch(`/api/admin/pages/${slug}`);
                    const data = await res.json();
                    this.page.id = data.id; this.page.slug = data.slug; this.page.title = data.title;
                    if(data.product_config_json) this.page.config = JSON.parse(data.product_config_json);
                    if(window.editor) {
                        window.editor.setComponents(data.html_content || '');
                        window.editor.setStyle(data.css_content || '');
                    }
                } catch(e) {}
            },

            async savePage() {
                this.loading = true;
                try {
                    const html = window.editor.getHtml(); const css = window.editor.getCss();
                    const payload = { id: this.page.id, slug: this.page.slug, title: this.page.title, html: html, css: css, product_config: this.page.config };
                    await fetch('/api/admin/pages', { method: 'POST', body: JSON.stringify(payload), headers: {'Content-Type': 'application/json'} });
                    this.notify('Berhasil Disimpan!');
                } catch (e) { this.notify('Gagal Simpan', 'error'); }
                this.loading = false;
            },

            setDevice(d) { this.device = d; if(window.editor) window.editor.setDevice(d); }
        };
    }
    </script>
</body>
</html>
