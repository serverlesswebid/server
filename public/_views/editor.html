<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LandingBuilder Pro - Fix</title>
    
    <script>
        (function() {
            const originalWarn = console.warn;
            console.warn = function(...args) {
                if (args[0] && typeof args[0] === 'string' && (args[0].includes('cdn.tailwindcss.com') || args[0].includes('production'))) return;
                originalWarn.apply(console, args);
            };
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/grapesjs@0.21.2/dist/css/grapes.min.css">
    <script src="https://unpkg.com/grapesjs@0.21.2/dist/grapes.min.js"></script>
    <script src="https://unpkg.com/grapesjs-blocks-basic@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-plugin-forms@2.0.5"></script> 
    <script src="https://unpkg.com/grapesjs-navbar@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-tabs@1.0.6"></script>
    <script src="https://unpkg.com/grapesjs-custom-code@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-tooltip@0.1.7"></script>
    <script src="https://unpkg.com/grapesjs-blocks-flexbox@0.1.1"></script>
    <script src="https://unpkg.com/grapesjs-plugin-export@1.0.11"></script>
    <script src="https://unpkg.com/grapesjs-typed@1.0.5"></script>
    <script src="https://unpkg.com/grapesjs-style-bg@2.0.1"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #fff; }
        [x-cloak] { display: none !important; }

        header {
            height: 60px; width: 100%; position: fixed; top: 0; left: 0; z-index: 100;
            background: white; border-bottom: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
        }

        .mobile-tools {
            display: none; height: 50px; width: 100%; position: fixed; top: 60px; left: 0; z-index: 90;
            background: #f8fafc; border-bottom: 1px solid #e2e8f0;
            align-items: center; justify-content: center; gap: 15px;
        }

        .workspace { position: absolute; top: 60px; bottom: 0; left: 0; right: 0; background: #f3f4f6; overflow: hidden; display: flex; }
        #gjs { position: relative !important; flex: 1; height: 100% !important; width: auto !important; min-width: 0; overflow: hidden; }

        .sidebar-panel {
            position: relative; width: 320px; height: 100%; background: white; border-left: 1px solid #e2e8f0;
            z-index: 50; display: flex; flex-direction: column; flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .mobile-tools { display: flex; }
            .workspace { top: 110px; } 
            #gjs { right: 0 !important; bottom: 60px !important; }
            .sidebar-panel {
                position: fixed; right: 0; top: 110px; bottom: 60px; width: 100% !important;
                z-index: 9999 !important; transform: translateX(100%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .sidebar-panel.open { transform: translateX(0); }
            .mobile-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; top: 110px; bottom: 60px; display: none; }
            .mobile-overlay.show { display: block; }
        }

        /* HIDE GRAPESJS DEFAULT PANELS */
        .gjs-pn-views-container, .gjs-pn-panels, .gjs-pn-views, .gjs-pn-commands { display: none !important; width: 0 !important; }
        .gjs-cv-canvas { width: 100% !important; height: 100% !important; top: 0 !important; left: 0 !important; }

        /* ULTRA COMPACT WIDGET BUTTONS (3 KOLOM) */
        .gjs-blocks-c { 
            display: grid !important; 
            grid-template-columns: repeat(3, 1fr) !important; 
            gap: 4px !important; 
            padding: 6px !important; 
        }
        .gjs-block { 
            width: 100% !important; 
            min-height: 45px !important; /* Sangat Pendek */
            padding: 4px !important; 
            background: #fff; 
            border: 1px solid #e5e7eb; 
            border-radius: 6px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 2px; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .gjs-block-label { font-size: 7px !important; font-weight: 800; text-transform: uppercase; color: #4b5563; text-align: center; }
        .gjs-block i, .gjs-block iconify-icon { font-size: 14px !important; color: #6366f1; }

        .custom-scroll { overflow-y: auto; height: 100%; -webkit-overflow-scrolling: touch; }
        .gjs-selected { outline: 2px solid #6366f1 !important; outline-offset: -2px; }

        /* TOOLBAR & RESIZER */
        .gjs-toolbar { background-color: #4f46e5 !important; border-radius: 6px !important; display: flex !important; }
        .gjs-toolbar-item { padding: 6px 8px !important; color: white !important; }
        .gjs-resizer-h { width: 22px !important; height: 22px !important; background: #4f46e5 !important; border: 3px solid #fff !important; border-radius: 50% !important; z-index: 10 !important; }
        /* Paksa Color Picker GrapesJS muncul di lapisan paling depan */
        /* 1. Kotak warna di panel Styles (biar tetap kotak mungil, tidak memanjang) */
.gjs-field-color-picker {
    width: 25px !important;
    height: 25px !important;
    flex-shrink: 0 !important; /* Kunci biar tidak gepeng/panjang */
    border: 1px solid #ccc !important;
    border-radius: 4px !important;
    cursor: pointer !important;
    display: inline-block !important;
}

/* 2. Container input warna */
.gjs-field-color {
    display: flex !important;
    align-items: center !important;
    gap: 8px !important;
    overflow: visible !important; /* WAJIB: biar popup tidak terpotong container sidebar */
}

/* 3. POPUP PALET WARNA (Spectrum) - Geser ke kiri */
.sp-container {
    z-index: 999999 !important; /* Jauh di atas sidebar 9999 */
    position: fixed !important; /* Biar posisinya konsisten di layar HP */
    /* Geser ke kiri sebesar 230px (lebar standar palet) agar tidak tertutup sidebar */
    transform: translateX(-235px) !important; 
    background: #ffffff !important;
    border: 1px solid #ddd !important;
    box-shadow: -5px 5px 20px rgba(0,0,0,0.3) !important;
    padding: 8px !important;
}

/* 4. Memastikan input teks kode warna rapi */
.gjs-field-color-input {
    flex-grow: 1 !important;
    height: 28px !important;
}
</style>
</head>
<body x-data="editorApp()">

    <header>
        <div class="flex items-center gap-3 overflow-hidden w-full max-w-[250px]">
            <a href="/admin/pages" class="text-gray-400 hover:text-indigo-600 transition p-1.5 rounded shrink-0"><i class="ph ph-arrow-left text-xl"></i></a>
            <div class="flex-1 min-w-0">
                <input x-model="page.title" class="bg-transparent font-bold text-xs text-gray-800 outline-none w-full truncate" placeholder="Nama Halaman">
                <div class="flex items-center gap-1">
                    <span class="text-[8px] font-black text-gray-300 uppercase shrink-0">Slug:</span>
                    <input x-model="page.slug" class="bg-transparent font-mono text-[9px] text-gray-400 outline-none w-full truncate">
                </div>
            </div>
        </div>

        <div class="hidden md:flex absolute left-1/2 transform -translate-x-1/2 items-center bg-gray-100 rounded-lg p-1 border shadow-sm">
            <button @click="setDevice('desktop')" :class="device=='desktop'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-desktop text-lg"></i></button>
            <button @click="setDevice('tablet')" :class="device=='tablet'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-tablet text-lg"></i></button>
            <button @click="setDevice('mobile')" :class="device=='mobile'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-mobile text-lg"></i></button>
        </div>

        <div class="flex items-center gap-2">
            <button @click="showSettings=true" class="bg-white text-gray-600 px-3 py-2 rounded-lg text-xs font-bold border border-gray-200 hover:bg-gray-50 transition">Config</button>
            <button @click="savePage" :disabled="loading" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg">
                <span x-text="loading ? 'SAVING...' : 'PUBLISH'"></span>
            </button>
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden p-2 rounded-lg border border-gray-200" :class="mobileMenuOpen ? 'bg-indigo-50 text-indigo-600' : 'bg-white'">
                <i class="ph" :class="mobileMenuOpen ? 'ph-x' : 'ph-list'" style="font-size: 24px;"></i>
            </button>
        </div>
    </header>

    <div class="mobile-tools">
        <button @click="setDevice('desktop')" :class="device=='desktop'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-desktop text-lg"></i></button>
        <button @click="setDevice('tablet')" :class="device=='tablet'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-tablet text-lg"></i></button>
        <button @click="setDevice('mobile')" :class="device=='mobile'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-mobile text-lg"></i></button>
        <div class="w-px h-4 bg-gray-300"></div>
        <button @click="cmd('core:undo')" class="text-gray-500"><i class="ph ph-arrow-u-up-left text-lg"></i></button>
        <button @click="cmd('core:redo')" class="text-gray-500"><i class="ph ph-arrow-u-up-right text-lg"></i></button>
    </div>

    <div class="workspace">
        <div id="gjs"></div>
        <div class="mobile-overlay md:hidden" :class="mobileMenuOpen ? 'show' : ''" @click="mobileMenuOpen = false"></div>
        <div class="sidebar-panel" :class="mobileMenuOpen ? 'open' : ''">
            <div class="flex border-b border-gray-200 bg-white shrink-0">
                <button @click="tab='blocks'" :class="tab=='blocks'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-squares-four text-xl"></i></button>
                <button @click="tab='styles'" :class="tab=='styles'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-paint-brush text-xl"></i></button>
                <button @click="tab='traits'" :class="tab=='traits'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-sliders text-xl"></i></button>
                <button @click="tab='layers'" :class="tab=='layers'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-stack text-xl"></i></button>
            </div>
            <div class="flex-1 bg-white custom-scroll relative w-full">
                <div x-show="tab=='blocks'" class="h-full pb-20"><div id="blocks-container" class="p-2"></div></div>
                <div x-show="tab=='styles'" class="h-full pb-20">
                    <div id="selectors-container" class="p-3 bg-gray-50 border-b"></div>
                    <div id="styles-container" class="p-1"></div>
                </div>
                <div x-show="tab=='traits'" class="h-full pb-20"><div id="traits-container" class="p-4"></div></div>
                <div x-show="tab=='layers'" class="h-full pb-20"><div id="layers-container"></div></div>
            </div>
        </div>
    </div>

    <div class="md:hidden fixed bottom-0 left-0 w-full h-[60px] bg-white border-t border-gray-200 flex items-center justify-around z-[300] px-2 shadow-lg">
        <button @click="cmd('core:preview')" class="flex flex-col items-center justify-center w-16 text-gray-500"><i class="ph ph-eye text-2xl"></i><span class="text-[9px] font-bold">View</span></button>
        <button @click="showSettings=true" class="flex flex-col items-center justify-center w-16 text-gray-500"><i class="ph ph-gear-six text-2xl"></i><span class="text-[9px] font-bold">Config</span></button>
        <button @click="savePage" :disabled="loading" class="bg-indigo-600 text-white px-6 py-2 rounded-full shadow-lg text-xs font-bold uppercase">Publish</button>
    </div>

    <div x-show="showSettings" x-cloak class="fixed inset-0 z-[400] bg-slate-900/50 backdrop-blur-sm flex justify-end" @click.self="showSettings = false">
    <div class="w-full md:w-[480px] h-full bg-white shadow-2xl flex flex-col border-l border-gray-200">
        
        <div class="p-5 border-b flex justify-between items-center bg-gray-50">
            <h2 class="font-bold text-gray-800 flex items-center gap-2"><i class="ph ph-faders text-indigo-600 text-xl"></i> Page Settings</h2>
            <button @click="showSettings = false" class="text-gray-400 hover:text-red-500"><i class="ph ph-x text-xl"></i></button>
        </div>

        <div class="flex border-b text-[11px] font-black uppercase bg-white">
            <button @click="settingsTab='commerce'" :class="settingsTab==='commerce'?'border-b-2 border-indigo-600 text-indigo-600 bg-indigo-50':'text-gray-400'" class="flex-1 py-4">Commerce</button>
            <button @click="settingsTab='seo'" :class="settingsTab==='seo'?'border-b-2 border-indigo-600 text-indigo-600 bg-indigo-50':'text-gray-400'" class="flex-1 py-4">SEO</button>
            <button @click="settingsTab='advanced'" :class="settingsTab==='advanced'?'border-b-2 border-indigo-600 text-indigo-600 bg-indigo-50':'text-gray-400'" class="flex-1 py-4">Scripts & Pixel</button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <div x-show="settingsTab === 'commerce'" class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Nama Halaman</label>
                    <input x-model="page.title" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm outline-none focus:border-indigo-500 transition" placeholder="Judul Halaman">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">URL Slug</label>
                    <input x-model="page.slug" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm outline-none focus:border-indigo-500 transition">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Tipe Produk</label>
                    <select x-model="page.product_type" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm">
                        <option value="physical">Physical Product</option>
                        <option value="digital">Digital Product</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Base Price (Rp)</label>
                    <input type="number" x-model="page.config.price" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm outline-none">
                </div>
            </div>

            <div x-show="settingsTab === 'seo'" class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Meta Description</label>
                    <textarea x-model="page.meta.description" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm h-24 outline-none resize-none" placeholder="Deskripsi pencarian Google..."></textarea>
                </div>
                
                <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Favicon URL</label>
                    <div class="flex gap-2 mt-2">
                        <input x-model="page.meta.favicon" class="flex-1 px-4 py-2 bg-white border rounded-lg text-xs outline-none focus:border-indigo-500 transition" placeholder="https://...">
                        <div class="w-10 h-10 bg-white border rounded flex items-center justify-center overflow-hidden shrink-0">
                            <template x-if="page.meta.favicon"><img :src="page.meta.favicon" class="w-6 h-6 object-contain"></template>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Social Share Image (OG URL)</label>
                    <input x-model="page.meta.og_image" class="w-full mt-1 px-4 py-3 bg-gray-50 border rounded-xl text-sm outline-none focus:border-indigo-500" placeholder="https://...">
                </div>
            </div>

            <div x-show="settingsTab === 'advanced'" class="space-y-6">
                <div class="p-4 bg-indigo-50 rounded-2xl border border-indigo-100 space-y-4">
                    <h4 class="text-[10px] font-black text-indigo-600 uppercase tracking-widest">Tracking Analytics</h4>
                    <div>
                        <label class="text-[9px] font-bold text-indigo-400 uppercase">Facebook Pixel ID</label>
                        <input x-model="page.analytics.fb_pixel" class="w-full mt-1 px-4 py-2 bg-white border border-indigo-200 rounded-lg text-sm outline-none" placeholder="Contoh: 123456789">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-indigo-400 uppercase">TikTok Pixel ID</label>
                        <input x-model="page.analytics.tiktok_pixel" class="w-full mt-1 px-4 py-2 bg-white border border-indigo-200 rounded-lg text-sm outline-none" placeholder="Contoh: C123456">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-indigo-400 uppercase">Google Analytics ID</label>
                        <input x-model="page.analytics.ga_id" class="w-full mt-1 px-4 py-2 bg-white border border-indigo-200 rounded-lg text-sm outline-none" placeholder="G-XXXXXXXX">
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Custom Header Script</label>
                        <textarea x-model="page.scripts.header" class="w-full mt-1 px-4 py-3 bg-gray-900 text-indigo-300 font-mono text-[10px] h-28 rounded-xl outline-none" placeholder="<script>...</script>"></textarea>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Custom Footer Script</label>
                        <textarea x-model="page.scripts.footer" class="w-full mt-1 px-4 py-3 bg-gray-900 text-indigo-300 font-mono text-[10px] h-28 rounded-xl outline-none" placeholder="Sebelum </body>"></textarea>
                    </div>
                </div>
            </div>
        </div>
        <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Metode Pembayaran Aktif</label>
            <div class="grid grid-cols-2 gap-2 mt-3">
                <label class="flex items-center gap-2 p-2 bg-white border rounded-lg cursor-pointer hover:border-indigo-500 transition">
                    <input type="checkbox" value="whatsapp" x-model="page.config.active_payments" class="w-4 h-4 rounded text-indigo-600">
                    <span class="text-[11px] font-medium text-gray-700">WhatsApp</span>
                </label>
                <template x-for="p in paymentProviders" :key="p.slug">
                    <label class="flex items-center gap-2 p-2 bg-white border rounded-lg cursor-pointer hover:border-indigo-500 transition">
                        <input type="checkbox" :value="p.slug" x-model="page.config.active_payments" class="w-4 h-4 rounded text-indigo-600">
                        <span class="text-[11px] font-medium text-gray-700" x-text="p.name"></span>
                    </label>
                </template>
            </div>
        </div>
        <div class="p-4 border-t bg-gray-50 flex justify-end gap-3">
            <button @click="showSettings=false" class="px-5 py-2 text-xs font-bold text-gray-500">CANCEL</button>
            <button @click="savePage(); showSettings=false" class="px-8 py-2 bg-indigo-600 text-white text-xs font-black rounded-xl shadow-lg shadow-indigo-200 active:scale-95 transition-all">SIMPAN PERUBAHAN</button>
        </div>
    </div>
</div>

    <div class="fixed bottom-20 left-5 z-[9999] flex flex-col gap-2 pointer-events-none">
        <template x-for="n in notifications" :key="n.id">
            <div x-show="n.show" x-transition class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border-l-4 bg-white min-w-[250px]" :class="n.type==='success'?'border-green-500':'border-red-500'">
                <i class="ph text-xl" :class="n.type==='success'?'ph-check-circle text-green-500':'ph-warning-circle text-red-500'"></i>
                <div><h4 class="text-xs font-bold text-gray-800" x-text="n.title"></h4><p class="text-[10px] text-gray-500" x-text="n.msg"></p></div>
            </div>
        </template>
    </div>

    <div id="iconify-picker-modal" class="fixed inset-0 hidden z-[99999] bg-black/40 flex items-start justify-center p-6 backdrop-blur-sm">
        <div class="bg-white rounded-xl w-full max-w-xl shadow-2xl mt-10 overflow-hidden">
            <div class="flex items-center justify-between p-4 border-b bg-gray-50">
                <input id="iconify-picker-search" placeholder="Cari icon..." class="w-full bg-transparent outline-none text-sm" />
                <button id="iconify-picker-close"><i class="ph ph-x text-lg"></i></button>
            </div>
            <div id="iconify-picker-results" class="p-4 grid grid-cols-6 gap-3 max-h-[300px] overflow-y-auto"></div>
        </div>
    </div>

    <script>
        // --- LOGIKA ICONIFY PICKER ---
        (function(){
            let activeModel = null; const modal = document.getElementById('iconify-picker-modal'); const input = document.getElementById('iconify-picker-search'); const results = document.getElementById('iconify-picker-results');
            window.openIconifyPicker = function(model) { activeModel = model; modal.classList.remove('hidden'); input.value = ''; input.focus(); searchIcons('star'); };
            document.getElementById('iconify-picker-close').onclick = () => modal.classList.add('hidden'); input.oninput = (e) => searchIcons(e.target.value);
            async function searchIcons(q) { if(!q) return; try { const res = await fetch(`https://api.iconify.design/search?query=${q}&limit=18`); const data = await res.json(); results.innerHTML = ''; if(data.icons) { data.icons.forEach(icon => { const btn = document.createElement('button'); btn.className = 'p-2 hover:bg-indigo-50 rounded flex flex-col items-center gap-1'; btn.innerHTML = `<iconify-icon icon="${icon}" width="24"></iconify-icon><span class="text-[9px] text-gray-400 truncate w-full text-center">${icon.split(':')[1]}</span>`; btn.onclick = () => { if(activeModel) activeModel.setAttributes({ icon: icon }); modal.classList.add('hidden'); }; results.appendChild(btn); }); } } catch(e) {} }
        })();

        // --- APP LOGIC (ALPINE JS) ---
        function editorApp() {
            return {
                device: 'desktop', tab: 'blocks', settingsTab: 'commerce', clipboard: null, mobileMenuOpen: false, showSettings: false, loading: false, notifications: [], paymentProviders: [],
                page: { 
                id: 0, 
                slug: '', 
                title: '', 
                product_type: 'physical', 
                slug_payment: 'whatsapp',
                meta: { 
                    description: '', 
                    keywords: '', 
                    og_image: '', 
                    favicon: '' 
                },
                analytics: { 
                    fb_pixel: '', 
                    ga_id: '', 
                    tiktok_pixel: '' 
                },
                scripts: { 
                    header: '', 
                    footer: '' 
                },
