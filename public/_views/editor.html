<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronBuilder - Pro & Stable</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; overflow: hidden; height: 100vh; }
        [x-cloak] { display: none !important; }
        
        /* HEADER ASLI (RESTORED) */
        header { height: 60px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 50; position: fixed; top:0; left:0; right:0; }
        
        /* MAIN LAYOUT */
        .main-layout { display: flex; height: calc(100vh - 60px); margin-top: 60px; }
        
        /* CANVAS AREA */
        .canvas-area { flex: 1; overflow-y: auto; padding: 40px; background-color: #e5e7eb; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; display: flex; justify-content: center; position: relative; }
        
        /* THE CANVAS */
        #editor-canvas { 
            background: white; min-height: 800px; width: 100%; max-width: 1200px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: width 0.3s; 
            padding-bottom: 100px; /* Area drop bawah */
        }
        #editor-canvas.mobile { max-width: 375px; border: 8px solid #333; border-radius: 20px; }
        #editor-canvas.tablet { max-width: 768px; }

        /* SIDEBAR KANAN (PROPERTY & BLOCKS) */
        .sidebar { width: 320px; background: white; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; z-index: 40; }
        
        /* TABS */
        .tab-btn { flex: 1; padding: 12px; text-align: center; border-bottom: 2px solid transparent; font-size: 12px; font-weight: bold; color: #6b7280; transition: all 0.2s; }
        .tab-btn.active { color: #4f46e5; border-bottom-color: #4f46e5; background: #eef2ff; }

        /* WIDGET ITEM */
        .widget-item { 
            padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; background: white; 
            display: flex; align-items: center; gap: 8px; cursor: grab; user-select: none; margin-bottom: 8px;
        }
        .widget-item:hover { border-color: #6366f1; transform: translateY(-2px); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* HIGHLIGHT SELECTION */
        .selected-element { outline: 2px solid #4f46e5 !important; outline-offset: -2px; position: relative; z-index: 10; }
        .hover-element { outline: 1px dashed #6366f1; cursor: pointer; }

        /* FORM INPUTS */
        .prop-group { margin-bottom: 12px; }
        .prop-label { font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .prop-input { width: 100%; border: 1px solid #e5e7eb; border-radius: 4px; padding: 6px; font-size: 12px; outline: none; transition: border 0.2s; }
        .prop-input:focus { border-color: #4f46e5; }
        .prop-row { display: flex; gap: 8px; }
    </style>
</head>
<body x-data="ironApp()">

    <header>
        <div class="flex items-center gap-3 overflow-hidden w-full max-w-[250px]">
            <a href="/admin/pages" class="text-gray-400 hover:text-indigo-600 transition p-1.5 rounded shrink-0"><i class="ph ph-arrow-left text-xl"></i></a>
            <div class="flex-1 min-w-0">
                <input x-model="page.title" class="bg-transparent font-bold text-xs text-gray-800 outline-none w-full truncate" placeholder="Nama Halaman">
                <div class="flex items-center gap-1"><span class="text-[8px] font-black text-gray-300 uppercase shrink-0">Slug:</span><input x-model="page.slug" class="bg-transparent font-mono text-[9px] text-gray-400 outline-none w-full truncate"></div>
            </div>
        </div>
        
        <div class="hidden md:flex absolute left-1/2 transform -translate-x-1/2 items-center bg-gray-100 rounded-lg p-1 border shadow-sm">
            <button @click="device='desktop'" :class="device=='desktop'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-desktop text-lg"></i></button>
            <button @click="device='tablet'" :class="device=='tablet'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-tablet text-lg"></i></button>
            <button @click="device='mobile'" :class="device=='mobile'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-mobile text-lg"></i></button>
        </div>

        <div class="flex items-center gap-2">
            <button @click="showSettings=true" class="bg-white text-gray-600 px-3 py-2 rounded-lg text-xs font-bold border border-gray-200 hover:bg-gray-50 transition">Config</button>
            <button @click="savePage" :disabled="saving" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg flex items-center gap-2">
                <span x-text="saving ? 'SAVING...' : 'PUBLISH'"></span>
            </button>
        </div>
    </header>

    <div class="main-layout">
        <div class="canvas-area" @click.self="deselect()">
            <div id="editor-canvas" :class="device" @click="handleCanvasClick($event)">
                <div id="empty-msg" class="h-full flex flex-col items-center justify-center text-gray-400 pointer-events-none p-20 border-2 border-dashed border-gray-300 rounded-xl m-10">
                    <i class="ph ph-plus-circle text-4xl mb-2"></i>
                    <span>Drop Widget Disini</span>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="flex border-b border-gray-200 bg-white">
                <button @click="activeTab='widgets'" :class="activeTab=='widgets'?'active':''" class="tab-btn"><i class="ph ph-squares-four text-lg"></i> BLOCKS</button>
                <button @click="activeTab='style'" :class="activeTab=='style'?'active':''" class="tab-btn"><i class="ph ph-sliders text-lg"></i> EDIT</button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 custom-scroll">
                
                <div x-show="activeTab === 'widgets'">
                    <div id="widget-container">
                        <div class="text-center py-10 text-gray-400 text-xs animate-pulse">Memuat Widget...</div>
                    </div>
                </div>

                <div x-show="activeTab === 'style'">
                    <div x-show="!selectedEl" class="text-center text-gray-400 text-xs py-10">
                        Klik elemen di canvas untuk mengedit.
                    </div>

                    <div x-show="selectedEl">
                        <div class="bg-indigo-50 p-2 rounded mb-4 text-xs font-bold text-indigo-700 flex justify-between items-center">
                            <span>SELECTED: <span x-text="tagName"></span></span>
                            <button @click="deleteElement" class="text-red-500 hover:bg-red-100 p-1 rounded"><i class="ph ph-trash"></i></button>
                        </div>

                        <div class="prop-group">
                            <label class="prop-label">Isi Teks</label>
                            <textarea x-model="styles.text" @input="applyText" class="prop-input h-20 resize-none"></textarea>
                        </div>

                        <div class="prop-group">
                            <label class="prop-label">Warna Teks</label>
                            <div class="flex gap-2">
                                <input type="color" x-model="styles.color" @input="applyStyle('color', styles.color)" class="h-8 w-10 p-0 border-0">
                                <input type="text" x-model="styles.color" @change="applyStyle('color', styles.color)" class="prop-input uppercase">
                            </div>
                        </div>
                        
                        <div class="prop-row prop-group">
                            <div class="flex-1">
                                <label class="prop-label">Size (px)</label>
                                <input type="text" x-model="styles.fontSize" @change="applyStyle('fontSize', styles.fontSize)" class="prop-input">
                            </div>
                            <div class="flex-1">
                                <label class="prop-label">Weight</label>
                                <select x-model="styles.fontWeight" @change="applyStyle('fontWeight', styles.fontWeight)" class="prop-input">
                                    <option value="normal">Normal</option>
                                    <option value="bold">Bold</option>
                                    <option value="100">Thin</option>
                                    <option value="900">Black</option>
                                </select>
                            </div>
                        </div>

                        <div class="prop-group">
                            <label class="prop-label">Alignment</label>
                            <div class="flex border rounded overflow-hidden">
                                <button @click="applyStyle('textAlign', 'left')" class="flex-1 p-2 hover:bg-gray-100 border-r"><i class="ph ph-text-align-left"></i></button>
                                <button @click="applyStyle('textAlign', 'center')" class="flex-1 p-2 hover:bg-gray-100 border-r"><i class="ph ph-text-align-center"></i></button>
                                <button @click="applyStyle('textAlign', 'right')" class="flex-1 p-2 hover:bg-gray-100"><i class="ph ph-text-align-right"></i></button>
                            </div>
                        </div>

                        <hr class="my-4 border-gray-100">

                        <div class="prop-group">
                            <label class="prop-label">Background</label>
                            <div class="flex gap-2">
                                <input type="color" x-model="styles.backgroundColor" @input="applyStyle('backgroundColor', styles.backgroundColor)" class="h-8 w-10 p-0 border-0">
                                <input type="text" x-model="styles.backgroundColor" @change="applyStyle('backgroundColor', styles.backgroundColor)" class="prop-input uppercase">
                            </div>
                        </div>

                        <div class="prop-group">
                            <label class="prop-label">Padding (Atas/Bawah - Kiri/Kanan)</label>
                            <div class="prop-row">
                                <input type="text" x-model="styles.paddingTop" @change="applyStyle('paddingTop', styles.paddingTop)" class="prop-input" placeholder="Top">
                                <input type="text" x-model="styles.paddingBottom" @change="applyStyle('paddingBottom', styles.paddingBottom)" class="prop-input" placeholder="Bottom">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div x-show="showSettings" x-cloak class="fixed inset-0 z-[100] bg-black/50 backdrop-blur-sm flex justify-end" @click.self="showSettings=false">
        <div class="w-96 bg-white h-full shadow-2xl p-6 flex flex-col">
            <h2 class="font-bold text-lg mb-6 flex items-center gap-2"><i class="ph ph-gear text-indigo-600"></i> Pengaturan Halaman</h2>
            <div class="space-y-4 flex-1">
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Harga Produk</label><input type="number" x-model="page.config.price" class="w-full mt-1 border rounded p-2 text-sm"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">SEO Title</label><input x-model="page.config.settings.seo_title" class="w-full mt-1 border rounded p-2 text-sm"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Pixel ID</label><input x-model="page.config.settings.fb_pixel" class="w-full mt-1 border rounded p-2 text-sm"></div>
            </div>
            <button @click="savePage(); showSettings=false" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold text-sm">SIMPAN CONFIG</button>
        </div>
    </div>

    <div class="fixed bottom-5 left-5 z-[100000] flex flex-col gap-2 pointer-events-none">
        <template x-for="n in notifications" :key="n.id">
            <div x-show="n.show" x-transition class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg shadow-xl border-l-4 bg-white border-green-500">
                <i class="ph ph-check-circle text-2xl text-green-500"></i>
                <div class="text-xs font-bold text-gray-800" x-text="n.title"></div>
            </div>
        </template>
    </div>

    <script>
    function ironApp() {
        return {
            device: 'desktop',
            activeTab: 'widgets',
            showSettings: false,
            saving: false,
            notifications: [],
            
            // --- CORE DATA ---
            page: { id: 0, slug: '', title: '', config: { price: 0, settings: {} } },
            selectedEl: null, // Elemen yang sedang diedit
            tagName: '',
            styles: { text: '', color: '#000000', backgroundColor: '#ffffff', fontSize: '', fontWeight: '', textAlign: '', paddingTop: '', paddingBottom: '' },

            async init() {
                await this.initWidgets();
                const slug = new URLSearchParams(window.location.search).get('slug');
                if(slug) await this.loadPage(slug);
                this.initSortable();
            },

            notify(title) { 
                const id = Date.now(); this.notifications.push({ id, title, show: true }); 
                setTimeout(() => { this.notifications = this.notifications.filter(n => n.id !== id); }, 3000); 
            },

            // --- 1. RENDER WIDGET (VANILLA JS ANTI-ERROR) ---
            async initWidgets() {
                const container = document.getElementById('widget-container');
                try {
                    const res = await fetch('/api/widgets');
                    const widgets = await res.json();
                    container.innerHTML = '';
                    
                    widgets.forEach(w => {
                        const el = document.createElement('div');
                        el.className = 'widget-item';
                        // Simpan HTML mentah di dataset (Aman)
                        el.dataset.html = w.content; 
                        el.dataset.id = w.id;
                        el.innerHTML = `
                            <div class="widget-icon"><i class="ph ph-cube text-lg"></i></div>
                            <div class="flex-1 min-w-0">
                                <div class="text-xs font-bold text-gray-700 truncate">${w.label}</div>
                                <div class="text-[9px] text-gray-400 uppercase">${w.category}</div>
                            </div>
                        `;
                        container.appendChild(el);
                    });
                } catch(e) { container.innerHTML = 'Error loading widgets'; }
            },

            // --- 2. SORTABLE ENGINE ---
            initSortable() {
                const sidebar = document.getElementById('widget-container');
                const canvas = document.getElementById('editor-canvas');

                new Sortable(sidebar, { group: { name: 'shared', pull: 'clone', put: false }, sort: false, animation: 150 });

                new Sortable(canvas, {
                    group: 'shared', animation: 150, ghostClass: 'sortable-ghost',
                    onAdd: (evt) => {
                        const item = evt.item;
                        const rawHtml = item.dataset.html;
                        const wrapper = document.createElement('div');
                        wrapper.className = 'comp-wrapper relative'; // Penanda
                        wrapper.innerHTML = rawHtml;
                        item.replaceWith(wrapper);
                        
                        const empty = document.getElementById('empty-msg');
                        if(empty) empty.remove();
                    }
                });
            },

            // --- 3. LOGIKA SELEKSI (PENGGANTI STYLE MANAGER) ---
            handleCanvasClick(e) {
                // Hentikan seleksi jika klik di luar elemen konten
                if (e.target.id === 'editor-canvas') { this.deselect(); return; }
                
                // Cegah link berpindah halaman
                if (e.target.tagName === 'A') e.preventDefault();

                // Hapus highlight lama
                if (this.selectedEl) this.selectedEl.classList.remove('selected-element');

                // Set elemen baru
                this.selectedEl = e.target;
                this.selectedEl.classList.add('selected-element');
                this.activeTab = 'style'; // Pindah ke tab edit
                
                // Ambil Data Existing
                this.tagName = this.selectedEl.tagName;
                const computed = window.getComputedStyle(this.selectedEl);
                
                // Sync Form
                this.styles.text = this.selectedEl.innerText;
                this.styles.color = this.rgbToHex(computed.color);
                this.styles.backgroundColor = this.rgbToHex(computed.backgroundColor);
                this.styles.fontSize = computed.fontSize;
                this.styles.fontWeight = computed.fontWeight;
                this.styles.textAlign = computed.textAlign;
                this.styles.paddingTop = computed.paddingTop;
                this.styles.paddingBottom = computed.paddingBottom;
            },

            deselect() {
                if (this.selectedEl) this.selectedEl.classList.remove('selected-element');
                this.selectedEl = null;
                this.activeTab = 'widgets';
            },

            deleteElement() {
                if (this.selectedEl) {
                    // Jika elemen ini adalah root wrapper, hapus semuanya. Jika anak, hapus anak.
                    const wrapper = this.selectedEl.closest('.comp-wrapper');
                    if (wrapper && wrapper.contains(this.selectedEl) && wrapper === this.selectedEl) {
                        wrapper.remove();
                    } else {
                        this.selectedEl.remove();
                    }
                    this.deselect();
                }
            },

            // --- 4. STYLE APPLICATOR ---
            applyStyle(prop, val) {
                if (this.selectedEl) {
                    this.selectedEl.style[prop] = val;
                }
            },
            applyText() {
                if (this.selectedEl) {
                    this.selectedEl.innerText = this.styles.text;
                }
            },
            // Helper warna
            rgbToHex(rgb) {
                if (!rgb || rgb === 'rgba(0, 0, 0, 0)') return '#ffffff';
                if (rgb.startsWith('#')) return rgb;
                const sep = rgb.indexOf(",") > -1 ? "," : " ";
                const rgbArr = rgb.substr(4).split(")")[0].split(sep);
                let r = (+rgbArr[0]).toString(16), g = (+rgbArr[1]).toString(16), b = (+rgbArr[2]).toString(16);
                if (r.length == 1) r = "0" + r; if (g.length == 1) g = "0" + g; if (b.length == 1) b = "0" + b;
                return "#" + r + g + b;
            },

            // --- 5. SAVE & LOAD ---
            async loadPage(slug) {
                try {
                    const res = await fetch(`/api/admin/pages/${slug}`);
                    const data = await res.json();
                    this.page.id = data.id; this.page.slug = data.slug; this.page.title = data.title;
                    if(data.product_config_json) this.page.config = typeof data.product_config_json === 'string' ? JSON.parse(data.product_config_json) : data.product_config_json;
                    
                    const canvas = document.getElementById('editor-canvas');
                    if(data.html_content) {
                        // Bersihkan script lama
                        canvas.innerHTML = data.html_content.replace(/<script\b[^>]*>([\s\S]*?)<\/script>/gm, "");
                    }
                } catch(e) {}
            },

            async savePage() {
                this.saving = true;
                const canvas = document.getElementById('editor-canvas');
                const clone = canvas.cloneNode(true);
                
                // Bersihkan class editor
                clone.querySelectorAll('.selected-element').forEach(el => el.classList.remove('selected-element'));
                clone.querySelectorAll('.comp-wrapper').forEach(el => {
                    // Unwrap agar bersih di live? Atau biarkan? Biarkan saja biar struktur terjaga.
                    el.classList.remove('sortable-drag', 'sortable-ghost'); 
                });
                const empty = clone.querySelector('#empty-msg');
                if(empty) empty.remove();

                // INJECT LIVE SCRIPT (Countdown, dll)
                const liveScript = `
                <script>
                document.addEventListener("DOMContentLoaded", function() {
                    // COUNTDOWN
                    document.querySelectorAll('.js-countdown').forEach(function(el) {
                        if(el.dataset.init) return; el.dataset.init="true";
                        var expire = el.getAttribute("data-expire"); if(!expire) return;
                        var update = function() {
                            var now = new Date().getTime(); var dist = new Date(expire).getTime() - now;
                            if(dist < 0) { el.innerHTML = "EXPIRED"; return; }
                            var d = Math.floor(dist/(1000*60*60*24));
                            var h = Math.floor((dist%(1000*60*60*24))/(1000*60*60));
                            var m = Math.floor((dist%(1000*60*60))/(1000*60));
                            var s = Math.floor((dist%(1000*60))/1000);
                            if(el.querySelector(".days")) el.querySelector(".days").innerText = d;
                            if(el.querySelector(".hours")) el.querySelector(".hours").innerText = h;
                            if(el.querySelector(".minutes")) el.querySelector(".minutes").innerText = m;
                            if(el.querySelector(".seconds")) el.querySelector(".seconds").innerText = s;
                        };
                        setInterval(update, 1000); update();
                    });
                    // ACCORDION
                    document.querySelectorAll("details").forEach(function(t) {
                        t.addEventListener("click", function() {
                            if(!t.open) { document.querySelectorAll("details").forEach(function(o){ if(o!==t) o.removeAttribute("open") }) }
                        });
                    });
                });
                <\/script>`;

                try {
                    const payload = {
                        id: this.page.id, slug: this.page.slug, title: this.page.title,
                        html: clone.innerHTML + liveScript,
                        css: '', 
                        product_config: this.page.config
                    };
                    const res = await fetch('/api/admin/pages', { method: 'POST', body: JSON.stringify(payload), headers: {'Content-Type': 'application/json'} });
                    if(res.ok) this.notify('Berhasil Publish!');
                } catch(e) { this.notify('Gagal Simpan'); }
                
                this.saving = false;
            }
        };
    }
    </script>
</body>
</html>
