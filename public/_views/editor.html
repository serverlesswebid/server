<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LandingBuilder Pro - DB Driven</title>
    
    <script>
        (function() {
            const originalWarn = console.warn;
            console.warn = function(...args) {
                if (args[0] && typeof args[0] === 'string' && (args[0].includes('cdn.tailwindcss.com') || args[0].includes('production'))) return;
                originalWarn.apply(console, args);
            };
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/grapesjs@0.21.2/dist/css/grapes.min.css">
    <script src="https://unpkg.com/grapesjs@0.21.2/dist/grapes.min.js"></script>
    <script src="https://unpkg.com/grapesjs-blocks-basic@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-plugin-forms@2.0.5"></script> 
    <script src="https://unpkg.com/grapesjs-navbar@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-tabs@1.0.6"></script>
    <script src="https://unpkg.com/grapesjs-custom-code@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-tooltip@0.1.7"></script>
    <script src="https://unpkg.com/grapesjs-blocks-flexbox@0.1.1"></script>
    <script src="https://unpkg.com/grapesjs-plugin-export@1.0.11"></script>
    <script src="https://unpkg.com/grapesjs-typed@1.0.5"></script>
    <script src="https://unpkg.com/grapesjs-style-bg@2.0.1"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #fff; }
        [x-cloak] { display: none !important; }

        header { height: 60px; width: 100%; position: fixed; top: 0; left: 0; z-index: 100; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .mobile-tools { display: none; height: 50px; width: 100%; position: fixed; top: 60px; left: 0; z-index: 90; background: #f8fafc; border-bottom: 1px solid #e2e8f0; align-items: center; justify-content: center; gap: 15px; }
        .workspace { position: absolute; top: 60px; bottom: 0; left: 0; right: 0; background: #f3f4f6; overflow: hidden; display: flex; }
        #gjs { position: relative !important; flex: 1; height: 100% !important; width: auto !important; min-width: 0; overflow: hidden; }
        .sidebar-panel { position: relative; width: 320px; height: 100%; background: white; border-left: 1px solid #e2e8f0; z-index: 50; display: flex; flex-direction: column; flex-shrink: 0; }
        
        @media (max-width: 768px) {
            .mobile-tools { display: flex; }
            .workspace { top: 110px; } 
            #gjs { right: 0 !important; bottom: 60px !important; }
            .sidebar-panel { position: fixed; right: 0; top: 110px; bottom: 60px; width: 100% !important; z-index: 9999 !important; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
            .sidebar-panel.open { transform: translateX(0); }
            .mobile-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; top: 110px; bottom: 60px; display: none; }
            .mobile-overlay.show { display: block; }
        }

        .gjs-pn-views-container, .gjs-pn-panels, .gjs-pn-views, .gjs-pn-commands { display: none !important; width: 0 !important; }
        .gjs-cv-canvas { width: 100% !important; height: 100% !important; top: 0 !important; left: 0 !important; }
        .gjs-selected { outline: 2px solid #6366f1 !important; outline-offset: -2px; }

        /* Toolbar Besar & Horizontal */
        .gjs-toolbar { background-color: #1f2937 !important; border-radius: 8px !important; border: 1px solid #ffffff33 !important; box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important; display: flex !important; flex-direction: row !important; gap: 8px !important; padding: 6px 12px !important; position: absolute !important; top: -45px !important; left: 0 !important; right: auto !important; width: max-content !important; height: auto !important; z-index: 99999 !important; transform: none !important; }
        .gjs-toolbar-item { color: white !important; width: 35px !important; height: 35px !important; display: flex !important; align-items: center; justify-content: center !important; cursor: pointer !important; transition: 0.2s !important; border-radius: 6px !important; }
        .gjs-toolbar-item:hover { background-color: #4f46e5 !important; transform: scale(1.1); }

        /* Accordion Style */
        details.group > summary { list-style: none; }
        details.group > summary::-webkit-details-marker { display: none; }
        details.group[open] summary ~ * { animation: sweep .3s ease-in-out; }
        @keyframes sweep { 0% {opacity: 0; transform: translateY(-10px)} 100% {opacity: 1; transform: translateY(0)} }
        
        .block-card { cursor: pointer; background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: all 0.2s; user-select: none; }
        .block-card:hover { border-color: #6366f1; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15); transform: translateY(-2px); }
        .block-card:active { transform: scale(0.95); }
        .block-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #4b5563; text-align: center; line-height: 1.2; }
        
        .gjs-field-color-picker { width: 25px !important; height: 25px !important; border: 1px solid #ccc !important; border-radius: 4px !important; }
        .sp-container { z-index: 999999 !important; }
    </style>
    </head>
    <body x-data="editorApp()">

    <header>
        <div class="flex items-center gap-3 overflow-hidden w-full max-w-[250px]">
            <a href="/admin/pages" class="text-gray-400 hover:text-indigo-600 transition p-1.5 rounded shrink-0"><i class="ph ph-arrow-left text-xl"></i></a>
            <div class="flex-1 min-w-0">
                <input x-model="page.title" class="bg-transparent font-bold text-xs text-gray-800 outline-none w-full truncate" placeholder="Nama Halaman">
                <div class="flex items-center gap-1"><span class="text-[8px] font-black text-gray-300 uppercase shrink-0">Slug:</span><input x-model="page.slug" class="bg-transparent font-mono text-[9px] text-gray-400 outline-none w-full truncate"></div>
            </div>
        </div>
        <div class="hidden md:flex absolute left-1/2 transform -translate-x-1/2 items-center bg-gray-100 rounded-lg p-1 border shadow-sm">
            <button @click="setDevice('desktop')" :class="device=='desktop'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-desktop text-lg"></i></button>
            <button @click="setDevice('tablet')" :class="device=='tablet'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-tablet text-lg"></i></button>
            <button @click="setDevice('mobile')" :class="device=='mobile'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-mobile text-lg"></i></button>
        </div>
        <div class="flex items-center gap-2">
            <button @click="showSettings=true" class="bg-white text-gray-600 px-3 py-2 rounded-lg text-xs font-bold border border-gray-200 hover:bg-gray-50 transition">Config</button>
            <button @click="savePage" :disabled="loading" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg"><span x-text="loading ? 'SAVING...' : 'PUBLISH'"></span></button>
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden p-2 rounded-lg border border-gray-200" :class="mobileMenuOpen ? 'bg-indigo-50 text-indigo-600' : 'bg-white'"><i class="ph" :class="mobileMenuOpen ? 'ph-x' : 'ph-list'" style="font-size: 24px;"></i></button>
        </div>
    </header>

    <div class="mobile-tools">
        <button @click="setDevice('desktop')" :class="device=='desktop'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'"><i class="ph ph-desktop text-lg"></i></button>
        <button @click="setDevice('tablet')" :class="device=='tablet'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'"><i class="ph ph-device-tablet text-lg"></i></button>
        <button @click="setDevice('mobile')" :class="device=='mobile'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'"><i class="ph ph-device-mobile text-lg"></i></button>
        <div class="w-px h-4 bg-gray-300"></div>
        <button @click="cmd('core:undo')" class="text-gray-500"><i class="ph ph-arrow-u-up-left text-lg"></i></button>
        <button @click="cmd('core:redo')" class="text-gray-500"><i class="ph ph-arrow-u-up-right text-lg"></i></button>
    </div>

    <div class="workspace">
        <div id="gjs"></div>
        <div class="mobile-overlay md:hidden" :class="mobileMenuOpen ? 'show' : ''" @click="mobileMenuOpen = false"></div>
        <div class="sidebar-panel" :class="mobileMenuOpen ? 'open' : ''">
            <div class="flex border-b border-gray-200 bg-white shrink-0">
                <button @click="tab='blocks'" :class="tab=='blocks'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-squares-four text-xl"></i></button>
                <button @click="tab='styles'" :class="tab=='styles'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-paint-brush text-xl"></i></button>
                <button @click="tab='traits'" :class="tab=='traits'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-sliders text-xl"></i></button>
                <button @click="tab='layers'" :class="tab=='layers'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-stack text-xl"></i></button>
            </div>
            <div class="flex-1 bg-white custom-scroll relative w-full">
                <div x-show="tab=='blocks'" class="h-full pb-20">
                    <div id="blocks-custom-renderer" class="p-2 space-y-2">
                        <div class="text-center py-10 text-gray-400 text-xs animate-pulse">Memuat Widget...</div>
                    </div>
                    <div id="blocks-container" class="hidden"></div> 
                </div>
                <div x-show="tab=='styles'" class="h-full pb-20"><div id="selectors-container" class="p-3 bg-gray-50 border-b"></div><div id="styles-container" class="p-1"></div></div>
                <div x-show="tab=='traits'" class="h-full pb-20"><div id="traits-container" class="p-4"></div></div>
                <div x-show="tab=='layers'" class="h-full pb-20"><div id="layers-container"></div></div>
            </div>
        </div>
    </div>

    <div x-show="showSettings" x-cloak class="fixed inset-0 z-[400] bg-slate-900/50 backdrop-blur-sm flex justify-end" @click.self="showSettings = false">
        <div class="w-full md:w-[480px] h-full bg-white shadow-2xl flex flex-col border-l border-gray-200">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50"><h2 class="font-bold text-gray-800 flex items-center gap-2"><i class="ph ph-faders text-indigo-600 text-xl"></i> Page Settings</h2><button @click="showSettings = false" class="text-gray-400 hover:text-red-500"><i class="ph ph-x text-xl"></i></button></div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Judul</label><input x-model="page.title" class="w-full mt-1 p-2 border rounded"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Harga (Rp)</label><input type="number" x-model="page.config.price" class="w-full mt-1 p-2 border rounded"></div>
            </div>
            <div class="p-4 border-t bg-gray-50 flex justify-end gap-3"><button @click="showSettings=false" class="px-5 py-2 text-xs font-bold text-gray-500">BATAL</button><button @click="savePage(); showSettings=false" class="px-8 py-2 bg-indigo-600 text-white text-xs font-black rounded shadow">SIMPAN</button></div>
        </div>
    </div>

    <div id="iconify-picker-modal" class="fixed inset-0 hidden z-[99999] bg-black/40 flex items-start justify-center p-6 backdrop-blur-sm">
        <div class="bg-white rounded-xl w-full max-w-xl shadow-2xl mt-10 overflow-hidden">
            <div class="flex items-center justify-between p-4 border-b bg-gray-50"><input id="iconify-picker-search" placeholder="Cari icon..." class="w-full bg-transparent outline-none text-sm" /><button id="iconify-picker-close"><i class="ph ph-x text-lg"></i></button></div>
            <div id="iconify-picker-results" class="p-4 grid grid-cols-6 gap-3 max-h-[300px] overflow-y-auto"></div>
        </div>
    </div>

    <script>
    let widgetCache = {};

    // --- ICON PICKER LOGIC (Framework) ---
    (function(){
        let activeModel = null; 
        const modal = document.getElementById('iconify-picker-modal'); 
        const input = document.getElementById('iconify-picker-search'); 
        const results = document.getElementById('iconify-picker-results');
        window.openIconifyPicker = function(model) { activeModel = model; modal.classList.remove('hidden'); input.value = ''; input.focus(); searchIcons('star'); };
        document.getElementById('iconify-picker-close').onclick = () => modal.classList.add('hidden'); 
        input.oninput = (e) => searchIcons(e.target.value);
        async function searchIcons(q) { 
            if(!q) return; 
            try { 
                const res = await fetch(`https://api.iconify.design/search?query=${q}&limit=30`); 
                const data = await res.json(); 
                results.innerHTML = ''; 
                if(data.icons) data.icons.forEach(icon => { 
                    const btn = document.createElement('button'); btn.className = 'p-2 hover:bg-indigo-50 rounded flex flex-col items-center gap-1 transition'; 
                    btn.innerHTML = `<iconify-icon icon="${icon}" width="24"></iconify-icon><span class="text-[9px] text-gray-400 truncate w-full text-center">${icon.split(':')[1]}</span>`; 
                    btn.onclick = () => { if(activeModel) activeModel.setAttributes({ icon: icon }); modal.classList.add('hidden'); }; 
                    results.appendChild(btn); 
                }); 
            } catch(e) {} 
        }
    })();

    function editorApp() {
        return {
            device: 'desktop', tab: 'blocks', mobileMenuOpen: false, showSettings: false, loading: false,
            // META DIHAPUS DARI STATE AGAR TIDAK BIKIN BINGUNG, KARENA DB TIDAK PUNYA KOLOM META
            page: { id: 0, slug: '', title: '', config: { price: 0, active_payments: [] }, product_type: 'physical', analytics: {}, scripts: {} },

            async init() {
                this.initGrapes();
                const slug = new URLSearchParams(window.location.search).get('slug');
                if (slug) await this.loadPageData(slug);
            },

            // --- LOAD DATA (FIXED: NO META) ---
            async loadPageData(slug) {
                try {
                    const res = await fetch(`/api/admin/pages/${slug}`);
                    if(res.ok) {
                        const data = await res.json();
                        // MAPPING MANUAL AGAR AMAN
                        this.page.id = data.id;
                        this.page.slug = data.slug;
                        this.page.title = data.title || '';
                        this.page.product_type = data.product_type || 'physical';
                        
                        // Parse Config
                        if (data.product_config_json) {
                            try {
                                const conf = typeof data.product_config_json === 'string' ? JSON.parse(data.product_config_json) : data.product_config_json;
                                this.page.config = { ...this.page.config, ...conf };
                            } catch(e) {}
                        }

                        // Load to Canvas
                        if (window.editor) {
                            if (data.html_content) window.editor.setComponents(data.html_content);
                            if (data.css_content) window.editor.setStyle(data.css_content);
                        }
                    }
                } catch (e) { alert('Gagal memuat data'); }
            },

            // --- SAVE DATA (FIXED: NO META) ---
            async savePage() {
                this.loading = true;
                try {
                    const payload = {
                        id: this.page.id, 
                        slug: this.page.slug, 
                        title: this.page.title,
                        product_type: this.page.product_type,
                        html: `${window.editor.getHtml()}<script>${window.editor.getJs()}<\/script>`,
                        css: window.editor.getCss(), 
                        product_config: this.page.config
                        // JANGAN KIRIM META, KARENA DB TIDAK PUNYA KOLOM META
                    };
                    await fetch('/api/admin/pages', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                    alert('Berhasil disimpan!');
                } catch (e) { alert('Gagal menyimpan'); }
                this.loading = false;
            },

            setDevice(d) { this.device = d; if (window.editor) window.editor.setDevice(d); },
            cmd(c) { window.editor.runCommand(c); },

            // --- ADD WIDGET TO CANVAS (FROM DB CACHE) ---
            addWidgetToCanvas(id) {
                const widgetData = widgetCache[id];
                if (widgetData) {
                    window.editor.addComponents(widgetData.content);
                    if(window.innerWidth < 768) this.mobileMenuOpen = false;
                } else {
                    console.error('Widget not found:', id);
                }
            },

            initGrapes() {
                const bridgeCSS = `body { font-family: 'Inter', sans-serif; } .editable-carousel { min-height: 200px; background: #eee; }`; 

                window.editor = grapesjs.init({
                    container: '#gjs', height: '100%', storageManager: false, panels: { defaults: [] },
                    assetManager: {
                        uploadText: 'Upload Gambar',
                        uploadFile: async (e) => {
                            const file = e.dataTransfer ? e.dataTransfer.files[0] : e.target.files[0];
                            if(!file) return;
                            const toBase64 = f => new Promise((r,j)=>{const x=new FileReader();x.onload=()=>r(x.result);x.readAsDataURL(f)});
                            try {
                                const b64 = await toBase64(file);
                                const res = await fetch('/api/admin/upload-image', { method: 'POST', body: JSON.stringify({ image: b64, filename: file.name }) });
                                const d = await res.json();
                                if(d.data) window.editor.AssetManager.add(d.data);
                            } catch(err) { alert('Upload gagal'); }
                        }
                    },
                    canvas: {
                        scripts: ['https://cdn.tailwindcss.com', 'https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js'],
                        styles: ['https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css'],
                        content: `<style>${bridgeCSS}</style>`
                    },
                    plugins: ['gjs-blocks-basic', 'grapesjs-plugin-forms', 'grapesjs-navbar', 'grapesjs-custom-code', 'grapesjs-blocks-flexbox', 'grapesjs-style-bg'],
                    deviceManager: { devices: [{ id: 'desktop', width: '' }, { id: 'tablet', width: '768px' }, { id: 'mobile', width: '375px' }] },
                    blockManager: { appendTo: '#blocks-container' },
                    layerManager: { appendTo: '#layers-container' },
                    selectorManager: { appendTo: '#selectors-container' },
                    traitManager: { appendTo: '#traits-container' },
                    styleManager: { appendTo: '#styles-container', sectors: [{name: 'Typography', open:1, buildProps:['font-size', 'color', 'text-align']}, {name: 'Layout', buildProps:['width', 'padding', 'margin', 'display']}] }
                });

                const domc = window.editor.DomComponents;
                const bm = window.editor.BlockManager;
                const cmds = window.editor.Commands;

                // --- 1. HARDCODED FRAMEWORK COMPONENTS (SESUAI INSTRUKSI) ---
                
                // Link Basic
                domc.addType('link', { model: { defaults: { traits: ['href', 'target'] } } });
                
                // Iconify System (Framework Core - Hardcode)
                domc.addType('iconify-icon', { 
                    model: { 
                        defaults: { 
                            tagName: 'iconify-icon', 
                            attributes: { icon: 'ph:star-fill', width: '24' }, 
                            traits: [{ type: 'button', text: 'Ganti Icon', command: (ed, t) => window.openIconifyPicker(t.target) }] 
                        } 
                    } 
                });

                // Global Commands
                cmds.add('set-img-src', { run(ed) { ed.runCommand('open-assets', { target: ed.getSelected(), onSelect() { const asset = ed.AssetManager.getSelection()[0]; if(asset) { ed.getSelected().addAttributes({'img-src': asset.getSrc()}); ed.getSelected().view.el.querySelector('img').src = asset.getSrc(); } ed.Modal.close(); } }) } });
                cmds.add('open-icon-picker', { run(ed) { window.openIconifyPicker(ed.getSelected()); } });

                // --- 2. DYNAMIC DB COMPONENT LOADER ---
                // Mengambil komponen Logic (Countdown, dll) & Content dari Database
                fetch('/api/widgets')
                    .then(res => res.json())
                    .then(widgets => {
                        const renderer = document.getElementById('blocks-custom-renderer');
                        renderer.innerHTML = ''; 
                        const groups = {};

                        widgets.forEach(w => {
                            // A. REGISTER COMPONENT TYPE (LOGIC)
                            // Jika ada 'attributes' atau 'script', daftarkan sebagai Type baru
                            // Pengecualian: iconify-icon (sudah dihardcode)
                            if (w.attributes && w.attributes !== 'null' && w.id !== 'iconify-icon') {
                                try {
                                    const defaults = typeof w.attributes === 'string' ? JSON.parse(w.attributes) : w.attributes;
                                    if(w.script) defaults.script = new Function(w.script);
                                    
                                    // Ambil tipe dari data-gjs-type di content HTML, atau gunakan ID
                                    const typeMatch = w.content.match(/data-gjs-type=["']([^"']+)["']/);
                                    const typeName = (typeMatch && typeMatch[1]) ? typeMatch[1] : w.id;
                                    
                                    domc.addType(typeName, { model: { defaults } });
                                } catch(e) { console.error('Error register logic', w.id); }
                            }

                            // B. BUILD SIDEBAR MENU (CONTENT WIDGETS ONLY)
                            if (w.category !== 'System') {
                                widgetCache[w.id] = w;
                                if (!groups[w.category]) groups[w.category] = [];
                                groups[w.category].push(w);
                            }
                        });

                        // C. RENDER SIDEBAR UI (Accordion)
                        Object.keys(groups).sort().forEach(catName => {
                            const details = document.createElement('details');
                            details.className = 'group border border-gray-200 rounded-lg bg-white overflow-hidden mb-2';
                            details.open = true;
                            const summary = document.createElement('summary');
                            summary.className = 'p-3 bg-gray-50 text-xs font-bold text-gray-700 cursor-pointer flex justify-between items-center hover:bg-gray-100 select-none';
                            summary.innerHTML = `<span>${catName}</span> <i class="ph ph-caret-down group-open:rotate-180 transition"></i>`;
                            const contentDiv = document.createElement('div');
                            contentDiv.className = 'grid grid-cols-3 gap-2 p-2 bg-white';

                            groups[catName].forEach(w => {
                                const btn = document.createElement('div');
                                btn.className = 'block-card';
                                btn.title = w.label;
                                btn.setAttribute('x-on:click', `addWidgetToCanvas('${w.id}')`);
                                btn.innerHTML = `<div class="text-indigo-600 mb-1"><i class="ph ph-cube text-xl"></i></div><div class="block-label">${w.label}</div>`;
                                contentDiv.appendChild(btn);
                            });
                            details.appendChild(summary);
                            details.appendChild(contentDiv);
                            renderer.appendChild(details);
                        });
                        console.log('✅ All Widgets (Including Logic) Loaded from DB');
                    })
                    .catch(e => console.error('Load Error', e));

                // TOOLBAR
                editor.on('component:selected', (c) => {
                    c.set('toolbar', [
                        { attributes: { class: 'fa' }, command: 'tlb-move', label: '<i class="ph ph-arrows-out-cardinal text-lg"></i>' },
                        { attributes: { class: 'fa' }, command: e => e.runCommand('core:component-exit'), label: '<i class="ph ph-arrow-fat-up text-lg"></i>' },
                        { attributes: { class: 'fa' }, command: e => { e.runCommand('core:copy'); e.getSelected().remove(); }, label: '<i class="ph ph-scissors text-lg text-yellow-300"></i>' },
                        { attributes: { class: 'fa' }, command: e => e.runCommand('core:copy'), label: '<i class="ph ph-copy text-lg text-blue-300"></i>' },
                        { attributes: { class: 'fa' }, command: e => e.runCommand('core:paste'), label: '<i class="ph ph-clipboard-text text-lg text-green-300"></i>' },
                        { attributes: { class: 'fa' }, command: 'tlb-delete', label: '<i class="ph ph-trash text-lg text-red-400"></i>' }
                    ]);
                });
            }
        };
    }
    </script>
    </body>
</html>
