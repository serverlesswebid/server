<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LandingBuilder Pro - Serverless Edition</title>
    
    <script>
        (function() {
            const originalWarn = console.warn;
            console.warn = function(...args) {
                if (args[0] && typeof args[0] === 'string' && (args[0].includes('cdn.tailwindcss.com') || args[0].includes('production'))) return;
                originalWarn.apply(console, args);
            };
            window.onerror = function(msg, url, line) {
                // Filter error remeh temeh
                if(msg.includes('ResizeObserver')) return;
                console.error("Global Error:", msg, "at", line);
            };
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/grapesjs@0.21.2/dist/css/grapes.min.css">
    <script src="https://unpkg.com/grapesjs@0.21.2/dist/grapes.min.js"></script>
    <script src="https://unpkg.com/grapesjs-blocks-basic@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-plugin-forms@2.0.5"></script> 
    <script src="https://unpkg.com/grapesjs-navbar@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-blocks-flexbox@0.1.1"></script>
    <script src="https://unpkg.com/grapesjs-style-bg@2.0.1"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #fff; }
        [x-cloak] { display: none !important; }

        header {
            height: 60px; width: 100%; position: fixed; top: 0; left: 0; z-index: 100;
            background: white; border-bottom: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
        }

        .mobile-tools {
            display: none; height: 50px; width: 100%; position: fixed; top: 60px; left: 0; z-index: 90;
            background: #f8fafc; border-bottom: 1px solid #e2e8f0;
            align-items: center; justify-content: center; gap: 15px;
        }

        .workspace { position: absolute; top: 60px; bottom: 0; left: 0; right: 0; background: #f3f4f6; overflow: hidden; display: flex; }
        #gjs { position: relative !important; flex: 1; height: 100% !important; width: auto !important; min-width: 0; overflow: hidden; }

        .sidebar-panel {
            position: relative; width: 320px; height: 100%; background: white; border-left: 1px solid #e2e8f0;
            z-index: 50; display: flex; flex-direction: column; flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 768px) {
            .mobile-tools { display: flex; }
            .workspace { top: 110px; } 
            #gjs { right: 0 !important; bottom: 60px !important; }
            .sidebar-panel {
                position: fixed; right: 0; top: 110px; bottom: 0; width: 85% !important; max-width: 320px;
                z-index: 9999 !important; transform: translateX(100%);
                box-shadow: -5px 0 20px rgba(0,0,0,0.1);
            }
            .sidebar-panel.open { transform: translateX(0); }
            .mobile-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; top: 110px; bottom: 0; display: none; }
            .mobile-overlay.show { display: block; }
        }

        /* GRAPESJS OVERRIDES */
        .gjs-pn-views-container, .gjs-pn-panels, .gjs-pn-views, .gjs-pn-commands { display: none !important; width: 0 !important; }
        .gjs-cv-canvas { width: 100% !important; height: 100% !important; top: 0 !important; left: 0 !important; }
        .gjs-blocks-c { display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; padding: 10px !important; }
        .gjs-block { width: 100% !important; min-height: 80px !important; padding: 10px !important; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; transition: 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .gjs-block:hover { border-color: #6366f1; box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.1); }
        .gjs-block-label { font-size: 10px !important; font-weight: 600; text-transform: uppercase; color: #4b5563; text-align: center; margin-top: 5px; }
        .gjs-block i, .gjs-block iconify-icon { font-size: 24px !important; color: #6366f1; margin-bottom: 2px; }
        .custom-scroll { overflow-y: auto; height: 100%; -webkit-overflow-scrolling: touch; }
        .gjs-selected { outline: 2px solid #6366f1 !important; outline-offset: -2px; }
        .trait-custom-btn { width: 100%; padding: 8px 12px; background-color: #4f46e5; color: white; border: none; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .trait-custom-btn:hover { background-color: #4338ca; }
        .trait-custom-btn:disabled { background-color: #9ca3af; cursor: not-allowed; }
        .gjs-toolbar { background-color: #1f2937 !important; border-radius: 6px !important; border: 1px solid #ffffff33 !important; box-shadow: 0 4px 10px rgba(0,0,0,0.3) !important; top: 10px !important; left: auto !important; right: 10px !important; width: auto !important; display: flex !important; gap: 5px !important; padding: 5px !important; }
        .gjs-toolbar-item { color: white !important; width: 30px !important; height: 30px !important; display: flex !important; align-items: center; justify-content: center !important; cursor: pointer !important; border-radius: 4px; }
        .gjs-toolbar-item:hover { background: rgba(255,255,255,0.2); }
        .gjs-field-color-picker { width: 100%; height: 30px; border: 1px solid #e5e7eb; border-radius: 4px; overflow: hidden; cursor: pointer; }
        .sp-container { z-index: 999999 !important; border: 1px solid #e5e7eb; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>

<body x-data="editorApp()">

    <header>
        <div class="flex items-center gap-3 overflow-hidden w-full max-w-[350px]">
            <a href="/admin/pages" class="text-gray-400 hover:text-indigo-600 transition p-1.5 rounded shrink-0" title="Kembali ke Dashboard">
                <i class="ph ph-arrow-left text-xl"></i>
            </a>
            <div class="flex-1 min-w-0 border-r border-gray-200 pr-3">
                <input x-model="page.title" class="bg-transparent font-bold text-sm text-gray-800 outline-none w-full truncate placeholder-gray-400" placeholder="Nama Halaman">
                <div class="flex items-center gap-1 mt-0.5">
                    <span class="text-[9px] font-black text-gray-400 uppercase shrink-0 tracking-wider">SLUG:</span>
                    <input x-model="page.slug" class="bg-transparent font-mono text-[10px] text-indigo-500 outline-none w-full truncate" placeholder="slug-halaman">
                </div>
            </div>
        </div>

        <div class="hidden md:flex absolute left-1/2 transform -translate-x-1/2 items-center bg-gray-100 rounded-lg p-1 border border-gray-200 shadow-sm">
            <button @click="setDevice('desktop')" :class="device=='desktop'?'bg-white shadow text-indigo-600':'text-gray-400 hover:text-gray-600'" class="p-1.5 px-3 rounded-md transition"><i class="ph ph-desktop text-lg"></i></button>
            <button @click="setDevice('tablet')" :class="device=='tablet'?'bg-white shadow text-indigo-600':'text-gray-400 hover:text-gray-600'" class="p-1.5 px-3 rounded-md transition"><i class="ph ph-device-tablet text-lg"></i></button>
            <button @click="setDevice('mobile')" :class="device=='mobile'?'bg-white shadow text-indigo-600':'text-gray-400 hover:text-gray-600'" class="p-1.5 px-3 rounded-md transition"><i class="ph ph-device-mobile text-lg"></i></button>
        </div>

        <div class="flex items-center gap-2">
            <button @click="showSettings=true" class="hidden md:flex items-center gap-2 bg-white text-gray-600 px-3 py-2 rounded-lg text-xs font-bold border border-gray-200 hover:bg-gray-50 transition">
                <i class="ph ph-gear text-lg"></i> CONFIG
            </button>
            <button @click="savePage" :disabled="loading" class="flex items-center gap-2 bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg hover:bg-indigo-700 transition disabled:opacity-50">
                <i class="ph" :class="loading ? 'ph-spinner animate-spin' : 'ph-floppy-disk'"></i>
                <span x-text="loading ? 'SAVING...' : 'PUBLISH'"></span>
            </button>
            <button @click="toggleMobileMenu" class="md:hidden p-2 rounded-lg border border-gray-200 transition" :class="mobileMenuOpen ? 'bg-indigo-50 text-indigo-600' : 'bg-white text-gray-600'">
                <i class="ph" :class="mobileMenuOpen ? 'ph-x' : 'ph-list'" style="font-size: 24px;"></i>
            </button>
        </div>
    </header>

    <div class="mobile-tools">
        <button @click="setDevice('desktop')" :class="device=='desktop'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-desktop text-lg"></i></button>
        <button @click="setDevice('tablet')" :class="device=='tablet'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-tablet text-lg"></i></button>
        <button @click="setDevice('mobile')" :class="device=='mobile'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-mobile text-lg"></i></button>
        <div class="w-px h-4 bg-gray-300 mx-2"></div>
        <button @click="cmd('core:undo')" class="text-gray-500 hover:text-gray-800"><i class="ph ph-arrow-u-up-left text-lg"></i></button>
        <button @click="cmd('core:redo')" class="text-gray-500 hover:text-gray-800"><i class="ph ph-arrow-u-up-right text-lg"></i></button>
        <div class="w-px h-4 bg-gray-300 mx-2"></div>
        <button @click="showSettings=true" class="text-gray-500 hover:text-indigo-600"><i class="ph ph-gear text-lg"></i></button>
    </div>

    <div class="workspace">
        <div id="gjs"></div>
        <div class="mobile-overlay md:hidden" :class="mobileMenuOpen ? 'show' : ''" @click="mobileMenuOpen = false"></div>
        <div class="sidebar-panel" :class="mobileMenuOpen ? 'open' : ''">
            <div class="flex border-b border-gray-200 bg-white shrink-0">
                <button @click="tab='blocks'" :class="tab=='blocks'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400 hover:text-gray-600'" class="flex-1 p-3 transition flex flex-col items-center gap-1">
                    <i class="ph ph-squares-four text-xl"></i><span class="text-[9px] font-bold">ADD</span>
                </button>
                <button @click="tab='styles'" :class="tab=='styles'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400 hover:text-gray-600'" class="flex-1 p-3 transition flex flex-col items-center gap-1">
                    <i class="ph ph-paint-brush text-xl"></i><span class="text-[9px] font-bold">STYLE</span>
                </button>
                <button @click="tab='traits'" :class="tab=='traits'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400 hover:text-gray-600'" class="flex-1 p-3 transition flex flex-col items-center gap-1">
                    <i class="ph ph-sliders text-xl"></i><span class="text-[9px] font-bold">SETTING</span>
                </button>
                <button @click="tab='layers'" :class="tab=='layers'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400 hover:text-gray-600'" class="flex-1 p-3 transition flex flex-col items-center gap-1">
                    <i class="ph ph-stack text-xl"></i><span class="text-[9px] font-bold">LAYERS</span>
                </button>
            </div>
            
            <div class="flex-1 bg-white custom-scroll relative w-full overflow-y-auto">
                <div x-show="tab=='blocks'" class="h-full pb-20">
                    <div class="p-3 text-xs font-bold text-gray-400 uppercase tracking-wider text-center border-b mb-2">Drag or Click to Add</div>
                    <div id="blocks-container"></div>
                </div>
                <div x-show="tab=='styles'" class="h-full pb-20">
                    <div id="selectors-container" class="p-3 bg-gray-50 border-b sticky top-0 z-10"></div>
                    <div id="styles-container" class="p-1"></div>
                </div>
                <div x-show="tab=='traits'" class="h-full pb-20">
                    <div class="p-3 text-xs font-bold text-gray-400 uppercase tracking-wider text-center border-b">Component Settings</div>
                    <div id="traits-container" class="p-4"></div>
                </div>
                <div x-show="tab=='layers'" class="h-full pb-20">
                    <div id="layers-container"></div>
                </div>
            </div>
        </div>
    </div>

    <div x-show="showSettings" x-cloak class="fixed inset-0 z-[400] bg-slate-900/50 backdrop-blur-sm flex justify-end transition-opacity" @click.self="showSettings = false">
        <div class="w-full md:w-[480px] h-full bg-white shadow-2xl flex flex-col border-l border-gray-200 transform transition-transform duration-300" 
             x-transition:enter="translate-x-full" x-transition:enter-end="translate-x-0" x-transition:leave="translate-x-0" x-transition:leave-end="translate-x-full">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50">
                <h2 class="font-bold text-gray-800 flex items-center gap-2 text-lg"><i class="ph ph-faders text-indigo-600"></i> Page Configuration</h2>
                <button @click="showSettings = false" class="text-gray-400 hover:text-red-500"><i class="ph ph-x text-xl"></i></button>
            </div>
            <div class="flex border-b text-[11px] font-black uppercase bg-white sticky top-0 z-10">
                <button @click="settingsTab='commerce'" :class="settingsTab==='commerce'?'border-b-2 border-indigo-600 text-indigo-600 bg-indigo-50':'text-gray-400'" class="flex-1 py-4 hover:bg-gray-50">Commerce</button>
                <button @click="settingsTab='seo'" :class="settingsTab==='seo'?'border-b-2 border-indigo-600 text-indigo-600 bg-indigo-50':'text-gray-400'" class="flex-1 py-4 hover:bg-gray-50">SEO & Social</button>
                <button @click="settingsTab='advanced'" :class="settingsTab==='advanced'?'border-b-2 border-indigo-600 text-indigo-600 bg-indigo-50':'text-gray-400'" class="flex-1 py-4 hover:bg-gray-50">Scripts</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div x-show="settingsTab === 'commerce'" class="space-y-5 animate-fade-in">
                    <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">Judul Halaman (Internal)</label><input x-model="page.title" class="w-full px-4 py-2.5 bg-gray-50 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></div>
                    <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">URL Slug</label><div class="flex"><span class="inline-flex items-center px-3 rounded-l-lg border border-r-0 border-gray-300 bg-gray-100 text-gray-500 text-xs">/</span><input x-model="page.slug" class="w-full px-4 py-2.5 bg-gray-50 border rounded-r-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none font-mono text-indigo-600"></div></div>
                    <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">Harga Produk (IDR)</label><input type="number" x-model="page.config.price" class="w-full px-4 py-2.5 bg-gray-50 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none"><p class="text-[10px] text-gray-400 mt-1">Kosongkan atau isi 0 jika tidak ada pembayaran.</p></div>
                    <div class="p-4 bg-yellow-50 rounded-xl border border-yellow-200"><div class="flex items-center justify-between mb-2"><label class="text-xs font-bold text-yellow-800 uppercase">Order Bump</label><input type="checkbox" x-model="page.config.order_bump.active" class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500"></div><div x-show="page.config.order_bump.active" class="space-y-3 mt-3 border-t border-yellow-200 pt-3"><input x-model="page.config.order_bump.title" placeholder="Judul Penawaran Tambahan" class="w-full px-3 py-2 bg-white border border-yellow-300 rounded text-sm outline-none"><input type="number" x-model="page.config.order_bump.price" placeholder="Harga Tambahan" class="w-full px-3 py-2 bg-white border border-yellow-300 rounded text-sm outline-none"><textarea x-model="page.config.order_bump.desc" placeholder="Deskripsi singkat..." class="w-full px-3 py-2 bg-white border border-yellow-300 rounded text-sm outline-none resize-none h-16"></textarea></div></div>
                </div>
                <div x-show="settingsTab === 'seo'" class="space-y-5 animate-fade-in">
                     <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">Meta Title</label><input x-model="page.config.settings.seo_title" class="w-full px-4 py-2.5 bg-gray-50 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></div>
                     <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">Meta Description</label><textarea x-model="page.config.settings.seo_desc" class="w-full px-4 py-2.5 bg-gray-50 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none h-24 resize-none"></textarea></div>
                     <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">Favicon URL</label><div class="flex gap-2"><input x-model="page.config.settings.favicon" class="flex-1 px-4 py-2.5 bg-gray-50 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none"><img :src="page.config.settings.favicon || 'https://via.placeholder.com/32'" class="w-10 h-10 rounded border bg-gray-100 object-contain"></div></div>
                </div>
                <div x-show="settingsTab === 'advanced'" class="space-y-5 animate-fade-in">
                    <div class="p-3 bg-blue-50 text-blue-700 text-xs rounded-lg border border-blue-100"><i class="ph ph-info"></i> Masukkan kode tracking (Pixel, GTM) di sini.</div>
                     <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">Custom Head Script</label><textarea x-model="page.config.settings.custom_head" class="w-full px-4 py-2.5 bg-gray-900 text-green-400 border rounded-lg font-mono text-xs outline-none h-40 resize-none"></textarea></div>
                     <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">Custom Body Script</label><textarea x-model="page.config.settings.custom_body" class="w-full px-4 py-2.5 bg-gray-900 text-green-400 border rounded-lg font-mono text-xs outline-none h-40 resize-none"></textarea></div>
                </div>
            </div>
            <div class="p-4 border-t bg-gray-50 flex justify-end gap-3">
                <button @click="showSettings=false" class="px-5 py-2.5 text-xs font-bold text-gray-600 hover:text-gray-900">BATAL</button>
                <button @click="savePage(); showSettings=false" class="px-8 py-2.5 bg-indigo-600 text-white text-xs font-black rounded-lg shadow-lg hover:bg-indigo-700 transition">SIMPAN PERUBAHAN</button>
            </div>
        </div>
    </div>

    <div id="iconify-picker-modal" class="fixed inset-0 hidden z-[99999] bg-black/60 flex items-start justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-xl w-full max-w-2xl shadow-2xl mt-10 overflow-hidden flex flex-col max-h-[80vh]">
            <div class="flex items-center justify-between p-4 border-b bg-gray-50">
                <div class="flex-1 relative">
                    <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="iconify-picker-search" placeholder="Cari icon (contoh: arrow, user, star)..." class="w-full pl-9 pr-4 py-2 bg-white border border-gray-300 rounded-lg outline-none focus:border-indigo-500 text-sm" />
                </div>
                <button id="iconify-picker-close" class="ml-4 p-2 text-gray-400 hover:text-red-500"><i class="ph ph-x text-xl"></i></button>
            </div>
            <div id="iconify-picker-results" class="p-4 grid grid-cols-6 sm:grid-cols-8 gap-2 overflow-y-auto custom-scroll bg-gray-50 min-h-[300px]"></div>
            <div class="p-3 bg-white border-t text-xs text-center text-gray-400">Powered by <a href="https://iconify.design" target="_blank" class="text-indigo-500 hover:underline">Iconify</a></div>
        </div>
    </div>

    <div class="fixed bottom-5 left-5 z-[100000] flex flex-col gap-2 pointer-events-none">
        <template x-for="n in notifications" :key="n.id">
            <div x-show="n.show" x-transition:enter="transform ease-out duration-300 transition" x-transition:enter-start="translate-y-2 opacity-0" x-transition:enter-end="translate-y-0 opacity-100" x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg shadow-xl border-l-4 bg-white min-w-[280px]" :class="n.type==='success'?'border-green-500':'border-red-500'">
                <i class="ph text-2xl" :class="n.type==='success'?'ph-check-circle text-green-500':'ph-warning-circle text-red-500'"></i>
                <div><h4 class="text-xs font-bold text-gray-800 uppercase" x-text="n.title"></h4><p class="text-[11px] text-gray-500 font-medium leading-tight" x-text="n.msg"></p></div>
            </div>
        </template>
    </div>

    <script>
    let appBuilderCache = {};

    // --- UTILS ---
    function safeJSONParse(input) {
        if (!input) return {};
        if (typeof input === 'object') return input; // SUDAH OBJECT, JANGAN DIPARSE LAGI
        try { return JSON.parse(input); } 
        catch (e) { console.warn("JSON Parse Error:", e, input); return {}; }
    }

    // --- ICON PICKER ---
    (function(){
        let activeModel = null; const modal = document.getElementById('iconify-picker-modal'); const input = document.getElementById('iconify-picker-search'); const results = document.getElementById('iconify-picker-results');
        window.openIconifyPicker = function(model) { activeModel = model; modal.classList.remove('hidden'); input.value = ''; input.focus(); searchIcons('star'); };
        document.getElementById('iconify-picker-close').onclick = () => modal.classList.add('hidden'); modal.onclick = (e) => { if(e.target === modal) modal.classList.add('hidden'); };
        input.oninput = debounce((e) => searchIcons(e.target.value), 500);
        async function searchIcons(q) { 
            if(!q) return; results.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400"><i class="ph ph-spinner animate-spin text-2xl"></i><br>Mencari...</div>';
            try { const res = await fetch(`https://api.iconify.design/search?query=${q}&limit=64`); const data = await res.json(); results.innerHTML = ''; 
                if(data.icons && data.icons.length > 0) { data.icons.forEach(icon => { const btn = document.createElement('button'); btn.className = 'p-2 hover:bg-white hover:shadow-md hover:ring-1 hover:ring-indigo-500 rounded-lg flex flex-col items-center gap-2 transition group'; btn.innerHTML = `<iconify-icon icon="${icon}" width="28" class="text-gray-600 group-hover:text-indigo-600"></iconify-icon><span class="text-[9px] text-gray-400 truncate w-full text-center group-hover:text-indigo-500">${icon.split(':')[1]}</span>`; btn.onclick = () => { if(activeModel) { activeModel.setAttributes({ icon: icon }); const el = activeModel.getEl(); if(el) el.setAttribute('icon', icon); } modal.classList.add('hidden'); }; results.appendChild(btn); }); } else { results.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400">Tidak ditemukan.</div>'; }
            } catch(e) { results.innerHTML = '<div class="col-span-full text-center py-10 text-red-400">Error fetch iconify.</div>'; } 
        }
        function debounce(func, timeout = 300){ let timer; return (...args) => { clearTimeout(timer); timer = setTimeout(() => { func.apply(this, args); }, timeout); }; }
    })();

    // --- APP ---
    function editorApp() {
        return {
            device: 'desktop', tab: 'blocks', settingsTab: 'commerce', mobileMenuOpen: false, showSettings: false, loading: false, notifications: [],
            page: { id: 0, slug: '', title: '', product_type: 'physical', config: { price: 0, order_bump: { active: false, title: '', price: 0, desc: '' }, settings: { seo_title: '', seo_desc: '', favicon: '', custom_head: '', custom_body: '' } } },

            async init() {
                try {
                    console.log("🚀 Initializing Editor...");
                    this.initGrapes();
                    await this.loadWidgets();
                    const slug = new URLSearchParams(window.location.search).get('slug');
                    if (slug) await this.loadPageData(slug);
                } catch (e) { console.error("Fatal Init Error:", e); this.notify('System Error', 'Gagal memuat editor. Cek console.', 'error'); }
            },

            notify(title, msg, type = 'success') { const id = Date.now(); this.notifications.push({ id, title, msg, type, show: true }); setTimeout(() => { this.notifications = this.notifications.filter(n => n.id !== id); }, 4000); },
            setDevice(d) { this.device = d; if (window.editor) window.editor.setDevice(d); this.mobileMenuOpen = false; },
            toggleMobileMenu() { this.mobileMenuOpen = !this.mobileMenuOpen; },
            cmd(c) { window.editor.runCommand(c); },

            async loadWidgets() {
                const domc = window.editor.DomComponents; const bm = window.editor.BlockManager;
                try {
                    const res = await fetch('/api/widgets');
                    if (!res.ok) throw new Error(`API Widget Error: ${res.status}`);
                    const widgets = await res.json();
                    if (!Array.isArray(widgets)) throw new Error("Format data widget salah");
                    console.log(`📦 Loaded ${widgets.length} widgets`);

                    widgets.forEach(w => {
                        appBuilderCache[w.id] = w;
                        // PATCH 1: GUNAKAN safeJSONParse
                        let dbConfig = safeJSONParse(w.attributes);

                        let compDefaults = {
                            ...dbConfig,
                            tagName: dbConfig.tagName || 'div',
                            attributes: { ...(dbConfig.attributes || {}), 'data-widget-type': w.id },
                            traits: dbConfig.traits || []
                        };

                        let viewDef = {};
                        // PATCH 2: CEK SCRIPT EKSISTENSI
                        if (w.script && typeof w.script === 'string' && w.script.trim().length > 0) {
                            try {
                                const scriptFn = new Function(w.script);
                                viewDef = { onRender() { try { scriptFn.call(this.el); } catch(e) { console.warn(`Widget Script Error [${w.id}]:`, e); } } };
                                compDefaults.script = scriptFn;
                            } catch(e) { console.error("Invalid Script in DB:", w.id, e); }
                        }

                        domc.addType(w.id, { model: { defaults: compDefaults }, view: viewDef });
                        if (w.category !== 'System') { 
                            if (!bm.get(w.id)) { bm.add(w.id, { label: w.label, category: w.category, content: { type: w.id, content: w.content }, select: true, activate: true }); }
                        }
                    });
                } catch (e) { console.error("Widget Load Failed:", e); this.notify('Warning', 'Gagal memuat widget library.', 'error'); }
            },

            async loadPageData(slug) {
                this.loading = true;
                try {
                    const res = await fetch(`/api/admin/pages/${slug}`);
                    if (!res.ok) throw new Error("Gagal mengambil data halaman");
                    const data = await res.json();
                    this.page.id = data.id; this.page.slug = data.slug; this.page.title = data.title || '';
                    if (data.product_config_json) { 
                        const conf = typeof data.product_config_json === 'string' ? safeJSONParse(data.product_config_json) : data.product_config_json; 
                        this.page.config.price = conf.price || 0;
                        if(conf.order_bump) this.page.config.order_bump = { ...this.page.config.order_bump, ...conf.order_bump };
                        if(conf.settings) this.page.config.settings = { ...this.page.config.settings, ...conf.settings };
                    }
                    if (window.editor) {
                        window.editor.setComponents(data.html_content || ''); 
                        window.editor.setStyle(data.css_content || '');
                        setTimeout(() => { window.editor.runCommand('core:component-exit'); }, 500);
                    }
                    this.notify('Ready', `Halaman "${data.title}" dimuat.`);
                } catch (e) { this.notify('Error', e.message, 'error'); }
                this.loading = false;
            },

            async savePage() {
                if(!this.page.slug) return this.notify('Validasi', 'Slug halaman tidak boleh kosong', 'error');
                this.loading = true;
                try {
                    const html = window.editor.getHtml(); const css = window.editor.getCss(); 
                    const payload = { id: this.page.id, slug: this.page.slug, title: this.page.title, html: html, css: css, product_config: this.page.config, product_type: this.page.product_type };
                    const res = await fetch('/api/admin/pages', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                    if(res.ok) { this.notify('Sukses', 'Halaman berhasil disimpan!'); } else { const err = await res.json(); throw new Error(err.message || 'Save failed'); }
                } catch (e) { this.notify('Gagal', e.message, 'error'); }
                this.loading = false;
            },

            initGrapes() {
                // PATCH 3: SAFE STRING CONCATENATION FOR TAILWIND INJECTION
                const tailwindScript = `<script src="https://cdn.tailwindcss.com"><\/script><script>tailwind.config = { theme: { extend: { animation: { marquee: 'marquee 25s linear infinite' }, keyframes: { marquee: { '0%': { transform: 'translateX(0%)' }, '100%': { transform: 'translateX(-100%)' } } } } } }<\/script><style>body { font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100vh; background-color: #ffffff; margin: 0; padding-top: 1px; } div:empty { min-height: 50px; outline: 1px dashed #ccc; }</style>`;

                window.editor = grapesjs.init({
                    container: '#gjs', height: '100%', width: 'auto', storageManager: false, showOffsets: 1, noticeOnUnload: 0, panels: { defaults: [] }, allowScripts: 1,
                    assetManager: { 
                        uploadText: 'Drop gambar di sini', autoAdd: 1,
                        uploadFile: async (e) => {
                            const files = e.dataTransfer ? e.dataTransfer.files : e.target.files;
                            for (let i = 0; i < files.length; i++) {
                                const file = files[i]; const reader = new FileReader(); reader.readAsDataURL(file);
                                reader.onloadend = async () => {
                                    const fd = new FormData(); fd.append('file', reader.result); fd.append('filename', file.name);
                                    try {
                                        const res = await fetch('/api/admin/upload-image', { method: 'POST', body: fd }); const json = await res.json();
                                        let finalData = null; if (json.data && Array.isArray(json.data)) finalData = json.data[0]; else if (json.secure_url) finalData = { src: json.secure_url, width: json.width, height: json.height };
                                        if(finalData) window.editor.AssetManager.add(finalData); else alert('Gagal parse response Cloudinary');
                                    } catch(err) { console.error(err); alert('Upload Gagal: ' + err.message); }
                                };
                            }
                        }
                    },
                    canvas: { scripts: ['https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js'], styles: ['https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css'], content: tailwindScript },
                    plugins: ['gjs-blocks-basic', 'grapesjs-plugin-forms', 'grapesjs-navbar', 'grapesjs-blocks-flexbox', 'grapesjs-style-bg'],
                    deviceManager: { devices: [ { id: 'desktop', width: '' }, { id: 'tablet', width: '768px' }, { id: 'mobile', width: '375px' } ] },
                    blockManager: { appendTo: '#blocks-container' },
                    styleManager: { appendTo: '#styles-container', sectors: [{name: 'Dimension', buildProps: ['width','height','padding','margin']},{name:'Typography', buildProps:['font-size','color','text-align']},{name:'Decorations', buildProps:['background-color','border-radius','border','box-shadow']}] },
                    traitManager: { appendTo: '#traits-container' }, layerManager: { appendTo: '#layers-container' }, selectorManager: { appendTo: '#selectors-container' }
                });

                const domc = window.editor.DomComponents; const cmds = window.editor.Commands; const tm = window.editor.TraitManager;

                tm.addType('file-upload', {
                    createInput({ trait }) {
                        const div = document.createElement('div'); div.style.width = '100%';
                        const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.style.display = 'none';
                        const btn = document.createElement('button'); btn.className = 'trait-custom-btn'; btn.innerHTML = '<i class="ph ph-upload-simple"></i> UPLOAD';
                        btn.onclick = () => input.click();
                        input.onchange = () => {
                            const file = input.files[0]; if(!file) return;
                            const reader = new FileReader(); reader.readAsDataURL(file);
                            reader.onloadend = async () => {
                                const originalText = btn.innerHTML; btn.innerHTML = 'UPLOADING...'; btn.disabled = true;
                                const formData = new FormData(); formData.append('file', reader.result); formData.append('filename', file.name);
                                try {
                                    const res = await fetch('/api/admin/upload-image', { method: 'POST', body: formData }); const json = await res.json();
                                    const url = json.data ? json.data[0].src : (json.url || json.secure_url);
                                    if(url) { trait.setValue(url); trait.target.addAttributes({ [trait.get('name')]: url }); if(trait.target.get('tagName') === 'img') { trait.target.set('src', url); } } else { alert('Gagal mendapatkan URL gambar'); }
                                } catch(err) { alert('Upload Gagal: ' + err.message); } finally { btn.innerHTML = originalText; btn.disabled = false; }
                            };
                        };
                        div.appendChild(btn); div.appendChild(input); return div;
                    }
                });

                tm.addType('icon-picker', { noLabel: true, createInput({ trait }) { const btn = document.createElement('button'); btn.className = 'trait-custom-btn w-full bg-gray-800 hover:bg-gray-900'; btn.innerHTML = '<i class="ph ph-star"></i> PILIH ICON'; btn.onclick = () => { window.openIconifyPicker(trait.target); }; return btn; } });
                cmds.add('open-icon-picker', { run(editor, sender, opts) { const selected = editor.getSelected(); if (selected && window.openIconifyPicker) { window.openIconifyPicker(selected); } else { alert('Pilih komponen icon terlebih dahulu'); } } });
                domc.addType('image', { model: { defaults: { traits: [ { type: 'text', name: 'src', label: 'URL Sumber' }, { type: 'file-upload', name: 'src', label: 'Upload Baru' }, { type: 'text', name: 'alt', label: 'Alt Text' } ] } } });

                window.editor.on('component:selected', () => { this.mobileMenuOpen = false; });
                window.editor.on('block:drag:stop', (component) => { this.mobileMenuOpen = false; });
                window.editor.on('component:selected', (c) => { 
                    const currentToolbar = c.get('toolbar') || [];
                    if(currentToolbar.some(i => i.command === 'tlb-move')) return;
                    c.set('toolbar', [
                        { attributes: { class: 'fa fa-arrows', title: 'Geser' }, command: 'tlb-move', label: '<i class="ph ph-arrows-out-cardinal"></i>' },
                        { attributes: { class: 'fa fa-arrow-up', title: 'Parent' }, command: (e) => e.runCommand('core:component-exit'), label: '<i class="ph ph-arrow-fat-up"></i>' },
                        { attributes: { class: 'fa fa-clone', title: 'Duplicate' }, command: 'tlb-clone', label: '<i class="ph ph-copy"></i>' },
                        { attributes: { class: 'fa fa-trash', title: 'Delete' }, command: 'tlb-delete', label: '<i class="ph ph-trash text-red-400"></i>' }
                    ]);
                });
            }
        };
    }
    </script>
</body>
