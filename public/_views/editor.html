<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LandingBuilder - Pro Mobile Editor</title>
    
    <script>
        (function() {
            const originalWarn = console.warn;
            console.warn = function(...args) {
                const msg = args[0];
                if (typeof msg === 'string' && (msg.includes('cdn.tailwindcss.com') || msg.includes('production'))) return;
                originalWarn.apply(console, args);
            };
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/grapesjs@0.21.2/dist/css/grapes.min.css">
    <script src="https://unpkg.com/grapesjs@0.21.2/dist/grapes.min.js"></script>
    <script src="https://unpkg.com/grapesjs-blocks-basic@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-plugin-forms@2.0.5"></script> 
    <script src="https://unpkg.com/grapesjs-navbar@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-tabs@1.0.6"></script>
    <script src="https://unpkg.com/grapesjs-custom-code@1.0.1"></script>
    <script src="https://unpkg.com/grapesjs-tooltip@0.1.7"></script>
    <script src="https://unpkg.com/grapesjs-blocks-flexbox@0.1.1"></script>
    <script src="https://unpkg.com/grapesjs-plugin-export@1.0.11"></script>
    <script src="https://unpkg.com/grapesjs-typed@1.0.5"></script>
    <script src="https://unpkg.com/grapesjs-style-bg@2.0.1"></script>

    <style>
        /* 1. RESET & CORE LAYOUT */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #fff; }
        [x-cloak] { display: none !important; }

        /* 2. HEADER & NAVIGATION */
        header {
            height: 60px; width: 100%; position: fixed; top: 0; left: 0; z-index: 100;
            background: white; border-bottom: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
        }

        /* 3. MOBILE TOOLS BAR */
        .mobile-tools {
            display: none; height: 50px; width: 100%; position: fixed; top: 60px; left: 0; z-index: 90;
            background: #f8fafc; border-bottom: 1px solid #e2e8f0;
            align-items: center; justify-content: center; gap: 15px;
        }

        /* 4. WORKSPACE */
        .workspace { position: absolute; top: 60px; bottom: 0; left: 0; right: 0; background: #f3f4f6; overflow: hidden; display: flex; }
        #gjs { position: relative !important; flex: 1; height: 100% !important; width: auto !important; min-width: 0; overflow: hidden; }

        /* 5. SIDEBAR */
        .sidebar-panel {
            position: relative; width: 320px; height: 100%; background: white; border-left: 1px solid #e2e8f0;
            z-index: 50; display: flex; flex-direction: column; flex-shrink: 0;
        }

        /* 6. RESPONSIVE MOBILE FIXES */
        @media (max-width: 768px) {
            .mobile-tools { display: flex; }
            .workspace { top: 110px; } 
            #gjs { right: 0 !important; bottom: 60px !important; }
            .sidebar-panel {
                position: fixed; right: 0; top: 110px; bottom: 60px; width: 100% !important;
                z-index: 9999 !important; transform: translateX(100%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .sidebar-panel.open { transform: translateX(0); }
            .mobile-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; top: 110px; bottom: 60px; display: none; }
            .mobile-overlay.show { display: block; }
        }

        /* 7. UI CLEANUP & BLOCKS */
        .gjs-pn-views-container, .gjs-pn-panels, .gjs-pn-views, .gjs-pn-commands { display: none !important; width: 0 !important; }
        .gjs-cv-canvas { width: 100% !important; height: 100% !important; top: 0 !important; left: 0 !important; }
        .gjs-blocks-c { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 12px; }
        .gjs-block { 
            width: 100% !important; min-height: 90px !important; padding: 12px 8px !important; background: #fff; 
            border: 1px solid #e5e7eb; border-radius: 12px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 6px; cursor: pointer; transition: 0.2s;
        }
        .gjs-block:active { transform: scale(0.95); background: #f5f3ff; }
        .custom-scroll { overflow-y: auto; height: 100%; -webkit-overflow-scrolling: touch; }
        .gjs-selected { outline: 2px solid #6366f1 !important; outline-offset: -2px; }

        /* 8. TOOLTIP & RESIZER */
        .gjs-toolbar { background-color: #4f46e5 !important; border-radius: 8px !important; display: flex !important; }
        .gjs-toolbar-item { padding: 8px 10px !important; color: white !important; }
        .gjs-resizer-h { width: 20px !important; height: 20px !important; background: #4f46e5 !important; border: 3px solid #fff !important; border-radius: 50% !important; z-index: 10 !important; }

        /* 9. CUSTOM ELEMENTS & Z-INDEX */
        .sp-container { z-index: 9999999 !important; background: white; border: 1px solid #cbd5e1; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 8px; }
        .trait-upload-btn { width: 100%; background: #4f46e5; color: white; padding: 10px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 5px; text-transform: uppercase; }
        .trait-upload-btn:hover { background: #4338ca; }
        
        .input-field { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 13px; outline: none; }
        .label-field { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #6b7280; margin-bottom: 4px; letter-spacing: 0.5px; }
        .hidden { display: none !important; }
    </style>
</head>
<body x-data="editorApp()">

    <div class="fixed bottom-20 left-5 z-[9999] flex flex-col gap-2 pointer-events-none">
        <template x-for="n in notifications" :key="n.id">
            <div x-show="n.show" x-transition class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border-l-4 bg-white min-w-[250px]" :class="n.type==='success'?'border-green-500':'border-red-500'">
                <i class="ph text-xl" :class="n.type==='success'?'ph-check-circle text-green-500':'ph-warning-circle text-red-500'"></i>
                <div><h4 class="text-xs font-bold text-gray-800" x-text="n.title"></h4><p class="text-[10px] text-gray-500" x-text="n.msg"></p></div>
            </div>
        </template>
    </div>

    <header>
        <div class="flex items-center gap-3 overflow-hidden w-full max-w-[250px]">
            <a href="/admin/pages" class="text-gray-400 hover:text-indigo-600 transition p-1.5 rounded shrink-0"><i class="ph ph-arrow-left text-xl"></i></a>
            <div class="flex-1 min-w-0">
                <input x-model="page.title" class="bg-transparent font-bold text-xs text-gray-800 outline-none w-full truncate" placeholder="Nama Halaman">
                <div class="flex items-center gap-1">
                    <span class="text-[8px] font-black text-gray-300 uppercase tracking-tighter shrink-0">Slug:</span>
                    <input x-model="page.slug" class="bg-transparent font-mono text-[9px] text-gray-400 outline-none w-full truncate" placeholder="slug-halaman">
                </div>
            </div>
        </div>

        <div class="hidden md:flex absolute left-1/2 transform -translate-x-1/2 items-center bg-gray-100 rounded-lg p-1 border shadow-sm">
            <button @click="setDevice('desktop')" :class="device=='desktop'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-desktop text-lg"></i></button>
            <button @click="setDevice('tablet')" :class="device=='tablet'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-tablet text-lg"></i></button>
            <button @click="setDevice('mobile')" :class="device=='mobile'?'bg-white shadow text-indigo-600':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-mobile text-lg"></i></button>
        </div>

        <div class="flex items-center gap-2">
            <div class="hidden md:flex items-center gap-2">
                <button @click="showSettings=true" class="bg-white text-gray-600 px-3 py-2 rounded-lg text-xs font-bold border border-gray-200 hover:bg-gray-50 transition">Config</button>
                <button @click="savePage" :disabled="loading" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition">
                    <span x-text="loading ? 'SAVING...' : 'PUBLISH'"></span>
                </button>
            </div>
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden p-2 rounded-lg border border-gray-200 text-gray-700 bg-white">
                <i class="ph" :class="mobileMenuOpen ? 'ph-x' : 'ph-list'" style="font-size: 24px;"></i>
            </button>
        </div>
    </header>

    <div class="mobile-tools">
        <button @click="setDevice('desktop')" :class="device=='desktop'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-desktop text-lg"></i></button>
        <button @click="setDevice('tablet')" :class="device=='tablet'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-tablet text-lg"></i></button>
        <button @click="setDevice('mobile')" :class="device=='mobile'?'text-indigo-600 bg-white shadow-sm':'text-gray-400'" class="p-1.5 rounded transition"><i class="ph ph-device-mobile text-lg"></i></button>
        <div class="w-px h-4 bg-gray-300"></div>
        <button @click="cmd('core:undo')" class="text-gray-500"><i class="ph ph-arrow-u-up-left text-lg"></i></button>
        <button @click="cmd('core:redo')" class="text-gray-500"><i class="ph ph-arrow-u-up-right text-lg"></i></button>
    </div>

    <div class="workspace">
        <div id="gjs"></div>
        <div class="mobile-overlay md:hidden" :class="mobileMenuOpen ? 'show' : ''" @click="mobileMenuOpen = false"></div>
        <div class="sidebar-panel" :class="mobileMenuOpen ? 'open' : ''">
            <div class="flex border-b border-gray-200 bg-white shrink-0">
                <button @click="tab='blocks'" :class="tab=='blocks'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-squares-four text-xl"></i></button>
                <button @click="tab='traits'" :class="tab=='traits'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-gear text-xl"></i></button>
                <button @click="tab='styles'" :class="tab=='styles'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-paint-brush text-xl"></i></button>
                <button @click="tab='layers'" :class="tab=='layers'?'text-indigo-600 bg-indigo-50 border-b-2 border-indigo-600':'text-gray-400'" class="flex-1 p-3 transition"><i class="ph ph-stack text-xl"></i></button>
            </div>
            <div class="flex-1 bg-white custom-scroll relative w-full overflow-y-auto">
                <div x-show="tab=='blocks'" class="h-full pb-20">
                    <template x-for="(widgets, category) in groupedWidgets" :key="category">
                        <details class="category-group" open>
                            <summary class="list-none cursor-pointer bg-gray-50 p-3 text-[10px] font-black uppercase text-gray-500 border-b" x-text="category || 'General'"></summary>
                            <div class="widget-grid">
                                <template x-for="w in widgets" :key="w.id">
                                    <div class="block-card" @click="addBlockToCanvas(w)">
                                        <div class="text-indigo-600 text-xl"><i class="ph ph-cube"></i></div>
                                        <div class="text-[10px] font-bold text-gray-700 text-center" x-text="w.label"></div>
                                    </div>
                                </template>
                            </div>
                        </details>
                    </template>
                </div>
                <div x-show="tab=='traits'" class="h-full pb-20"><div id="traits-container" class="p-4"></div></div>
                <div x-show="tab=='styles'" class="h-full pb-20"><div id="selectors-container" class="p-3 border-b bg-gray-50"></div><div id="styles-container" class="p-1"></div></div>
                <div x-show="tab=='layers'" class="h-full pb-20"><div id="layers-container"></div></div>
            </div>
        </div>
    </div>

    <div class="md:hidden fixed bottom-0 left-0 w-full h-[60px] bg-white border-t border-gray-200 flex items-center justify-around z-[300] px-2 shadow-lg">
        <button @click="cmd('core:preview')" class="flex flex-col items-center justify-center w-16 text-gray-500">
            <i class="ph ph-eye text-2xl"></i><span class="text-[9px] font-bold">View</span>
        </button>
        <button @click="showSettings=true" class="flex flex-col items-center justify-center w-16 text-gray-500">
            <i class="ph ph-gear-six text-2xl"></i><span class="text-[9px] font-bold">Config</span>
        </button>
        <button @click="savePage" :disabled="loading" class="flex items-center justify-center gap-2 bg-indigo-600 text-white px-6 py-2 rounded-full shadow-lg">
            <i x-show="!loading" class="ph ph-paper-plane-right-fill text-xl"></i>
            <span x-show="loading" class="ph ph-spinner animate-spin text-xl"></span>
            <span class="font-bold text-xs uppercase">Publish</span>
        </button>
    </div>

    <div x-show="showSettings" x-cloak class="fixed inset-0 z-[400] bg-slate-900/50 backdrop-blur-sm flex justify-end" @click.self="showSettings = false">
        <div class="w-full md:w-[480px] h-full bg-white shadow-2xl flex flex-col border-l">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50">
                <h2 class="font-bold text-gray-800 flex items-center gap-2"><i class="ph ph-faders text-indigo-600 text-xl"></i> Page Settings</h2>
                <button @click="showSettings = false" class="text-gray-400 hover:text-red-500"><i class="ph ph-x text-xl"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div class="space-y-4">
                    <div><label class="label-field">Nama Halaman</label><input x-model="page.title" class="input-field"></div>
                    <div><label class="label-field">URL Slug</label><input x-model="page.slug" class="input-field"></div>
                    <div><label class="label-field">Harga (IDR)</label><input x-model="page.config.price" type="number" class="input-field"></div>
                    <div><label class="label-field">Pixel ID</label><input x-model="page.config.settings.fb_pixel" class="input-field"></div>
                </div>
            </div>
            <div class="p-4 border-t bg-gray-50 text-right">
                <button @click="savePage(); showSettings=false" class="px-8 py-2 bg-indigo-600 text-white text-xs font-black rounded-xl shadow-lg uppercase">Simpan</button>
            </div>
        </div>
    </div>

    <div id="iconify-picker-modal" class="fixed inset-0 hidden z-[99999] bg-black/40 flex items-start justify-center p-6 backdrop-blur-sm">
        <div class="bg-white rounded-xl w-full max-w-xl shadow-2xl overflow-hidden mt-10">
            <div class="flex items-center justify-between p-4 border-b bg-gray-50">
                <input id="iconify-picker-search" placeholder="Search icon..." class="w-full bg-transparent outline-none text-sm" />
                <button id="iconify-picker-close"><i class="ph ph-x text-lg"></i></button>
            </div>
            <div id="iconify-picker-results" class="p-4 grid grid-cols-6 gap-3 max-h-[300px] overflow-y-auto"></div>
        </div>
    </div>

    <script>
(function(){
    let activeModel = null; const modal = document.getElementById('iconify-picker-modal'); const input = document.getElementById('iconify-picker-search'); const results = document.getElementById('iconify-picker-results');
    window.openIconifyPicker = function(model) { activeModel = model; modal.classList.remove('hidden'); input.value = ''; input.focus(); searchIcons('star'); };
    document.getElementById('iconify-picker-close').onclick = () => modal.classList.add('hidden'); input.oninput = (e) => searchIcons(e.target.value);
    async function searchIcons(q) { if(!q) return; const res = await fetch(`https://api.iconify.design/search?query=${q}&limit=24`); const data = await res.json(); results.innerHTML = ''; if(data.icons) { data.icons.forEach(icon => { const btn = document.createElement('button'); btn.className = 'p-2 hover:bg-indigo-50 rounded flex flex-col items-center gap-1'; btn.innerHTML = `<iconify-icon icon="${icon}" width="24"></iconify-icon><span class="text-[9px] text-gray-400 truncate w-full text-center">${icon.split(':')[1]}</span>`; btn.onclick = () => { if(activeModel) activeModel.setAttributes({ icon: icon }); modal.classList.add('hidden'); }; results.appendChild(btn); }); } }
})();

function editorApp() {
    return {
        device: 'desktop', tab: 'blocks', clipboard: null, mobileMenuOpen: false, showSettings: false, loading: false, notifications: [],
        page: { id: 0, slug: '', title: '', config: { price: 0, settings: {} } },
        groupedWidgets: {}, widgetScripts: {},

        async init() {
            await this.loadWidgets();
            this.initGrapes();
            const slug = new URLSearchParams(window.location.search).get('slug');
            if (slug) await this.loadPageData(slug);
        },

        async loadWidgets() {
            try {
                const res = await fetch('/api/widgets');
                const widgets = await res.json();
                widgets.forEach(w => {
                    if(w.script) this.widgetScripts[w.id] = w.script;
                    const cat = w.category || 'General';
                    if(!this.groupedWidgets[cat]) this.groupedWidgets[cat] = [];
                    this.groupedWidgets[cat].push(w);
                });
            } catch(e) {}
        },

        async loadPageData(slug) {
            this.loading = true;
            try {
                const res = await fetch(`/api/admin/pages/${slug}`);
                const data = await res.json();
                if (data) {
                    this.page.id = data.id || 0; this.page.slug = data.slug || slug; this.page.title = data.title || '';
                    if (data.product_config_json) this.page.config = JSON.parse(data.product_config_json);
                    if (window.editor) {
                        window.editor.setComponents(data.html_content || '');
                        window.editor.setStyle(data.css_content || '');
                    }
                }
            } catch (e) {}
            this.loading = false;
        },

        async savePage() {
            this.loading = true;
            try {
                const html = window.editor.getHtml(); const css = window.editor.getCss();
                const payload = { id: this.page.id, slug: this.page.slug, title: this.page.title, html: html, css: css, product_config: this.page.config };
                const res = await fetch('/api/admin/pages', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                this.notify(res.ok ? 'Sukses' : 'Error', res.ok ? 'Tersimpan' : 'Gagal');
            } catch (e) { this.notify('Error', 'Koneksi bermasalah'); }
            this.loading = false;
        },

        notify(title, msg, type = 'success') { 
            const id = Date.now(); this.notifications.push({ id, title, msg, type, show: true }); 
            setTimeout(() => { this.notifications = this.notifications.filter(n => n.id !== id); }, 3000); 
        },

        setDevice(d) { this.device = d; if (window.editor) window.editor.setDevice(d); },
        cmd(c) { window.editor.runCommand(c); },

        initGrapes() {
            window.editor = grapesjs.init({
                container: '#gjs', height: '100%', storageManager: false, panels: { defaults: [] }, allowScripts: 1,
                deviceManager: { devices: [{ id: 'desktop', width: '' }, { id: 'tablet', width: '768px' }, { id: 'mobile', width: '375px' }] },
                assetManager: { embedAsBase64: 0, openAssetsOnDrop: 0 },
                canvas: {
                    scripts: ['https://cdn.tailwindcss.com', 'https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js'],
                    styles: ['https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css'],
                    content: `<style>body{padding:20px;} .hidden{display:none!important;}</style>`
                },
                plugins: ['gjs-blocks-basic', 'grapesjs-plugin-forms', 'grapesjs-navbar', 'grapesjs-tabs', 'grapesjs-custom-code', 'grapesjs-tooltip', 'grapesjs-blocks-flexbox', 'grapesjs-style-bg', 'grapesjs-component-countdown'],
                selectorManager: { appendTo: '#selectors-container' },
                traitManager: { appendTo: '#traits-container' },
                styleManager: { appendTo: '#styles-container', sectors: [{ name: 'Typography', buildProps:['font-size','font-weight','color','text-align'] }, { name: 'Decor', buildProps:['background-color','border-radius'] }] }
            });

            // --- 1. TRAIT UPLOAD IMAGE (BASE64) ---
            window.editor.TraitManager.addType('file-upload', {
                createInput({ trait }) {
                    const div = document.createElement('div');
                    const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.style.display = 'none';
                    const btn = document.createElement('button'); btn.className = 'trait-upload-btn'; btn.innerHTML = 'UPLOAD GAMBAR';
                    btn.onclick = () => input.click();
                    input.onchange = () => {
                        const file = input.files[0]; if(!file) return;
                        const reader = new FileReader(); reader.readAsDataURL(file);
                        reader.onloadend = async () => {
                            btn.innerHTML = 'UPLOADING...'; btn.disabled = true;
                            const formData = new FormData(); formData.append('file', reader.result);
                            try {
                                const res = await fetch('/api/admin/upload-image', { method: 'POST', body: formData });
                                const json = await res.json();
                                const url = json.data ? json.data[0].src : (json.url || json.secure_url);
                                if(url) trait.target.addAttributes({ src: url });
                            } catch(err) { alert('Upload Gagal'); }
                            finally { btn.innerHTML = 'UPLOAD GAMBAR'; btn.disabled = false; }
                        };
                    };
                    div.appendChild(btn); div.appendChild(input); return div;
                }
            });

            window.editor.DomComponents.addType('image', { 
                model: { defaults: { traits: [{ type: 'text', name: 'src', label: 'URL' }, { type: 'file-upload', name: 'up', label: ' ' }, { type: 'text', name: 'alt' }] } } 
            });

            // --- 2. COUNTDOWN SMART (EDITABLE) ---
            window.editor.DomComponents.addType('countdown-smart', {
                model: {
                    defaults: {
                        attributes: { 'data-widget-type': 'countdown-smart', 'expire': '2025-12-31 23:59', 'msg': 'Selesai' },
                        traits: [{ type: 'text', name: 'expire', label: 'Expire (YYYY-MM-DD HH:mm)' }, { type: 'text', name: 'msg', label: 'Pesan Selesai' }],
                        script: function() {
                            const el = this;
                            const timer = () => {
                                const diff = new Date(el.getAttribute('expire') || '2025-12-31 23:59').getTime() - new Date().getTime();
                                const msgEl = el.querySelector('.js-expired-msg'); const wrap = el.querySelector('.js-wrap');
                                if (diff <= 0) {
                                    if(msgEl) { msgEl.innerText = el.getAttribute('msg') || 'Selesai'; msgEl.classList.remove('hidden'); }
                                    if(wrap) wrap.classList.add('hidden'); return;
                                }
                                const d = Math.floor(diff / 864e5), h = Math.floor((diff % 864e5) / 36e5), m = Math.floor((diff % 36e5) / 6e4), s = Math.floor((diff % 6e4) / 1e3);
                                const upd = (c, v) => { const n = el.querySelector('.'+c); if(n) n.innerText = v.toString().padStart(2,'0'); };
                                upd('js-d', d); upd('js-h', h); upd('js-m', m); upd('js-s', s);
                                if(msgEl) msgEl.classList.add('hidden'); if(wrap) wrap.classList.remove('hidden');
                            };
                            setInterval(timer, 1000); timer();
                        }
                    }
                }
            });

            // --- 3. TRAIT ICON PICKER ---
            window.editor.TraitManager.addType('icon-picker-btn', {
                createInput({ trait }) {
                    const btn = document.createElement('button'); btn.className = 'trait-upload-btn'; btn.innerHTML = 'CARI ICON';
                    btn.onclick = () => window.openIconifyPicker(trait.target);
                    return btn;
                }
            });

            window.editor.DomComponents.addType('iconify-icon', {
                model: { defaults: { tagName: 'iconify-icon', traits: [{ type: 'icon-picker-btn', name: 'p', label: ' ' }, { type: 'text', name: 'icon' }, { type: 'color', name: 'color', changeProp: 1 }] }, init() { this.on('change:color', () => this.addStyle({color: this.get('color')})) } }
            });

            // --- 4. LOAD DYNAMIC WIDGETS ---
            if(this.widgetScripts) {
                Object.keys(this.widgetScripts).forEach(id => {
                    if(id !== 'countdown-smart' && id !== 'iconify-icon') {
                        window.editor.DomComponents.addType(id, {
                            model: { defaults: { attributes: { 'data-widget-type': id }, script: this.widgetScripts[id] } }
                        });
                    }
                });
            }

            // AUTO SELECT TAB
            window.editor.on('component:selected', () => { this.tab = 'traits'; });
        },

        addBlockToCanvas(w) { 
            window.editor.addComponents({ type: w.id, content: w.content }); 
            if(window.innerWidth < 768) this.mobileMenuOpen = false; 
        }
    }; 
}
    </script>
