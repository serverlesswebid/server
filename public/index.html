<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to BlinkSite</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f8fafc;
            color: #1e293b;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="max-w-lg mx-auto bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
        <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
        </div>
        
        <h1 class="text-3xl font-black text-gray-900 mb-2">BlinkSite Ready!</h1>
        <p class="text-gray-500 mb-8 leading-relaxed">
            Situs ini telah berhasil diinstal. Namun, belum ada landing page yang diatur sebagai halaman utama.
        </p>

        <div class="space-y-3">
            <a href="/login" class="block w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition shadow-lg shadow-blue-500/30">
                Login ke Admin
            </a>
            <p class="text-xs text-gray-400 mt-4">
                Masuk ke Admin Panel &rarr; Settings &rarr; Set Homepage Slug untuk mengganti tampilan ini.
            </p>
        </div>
    </div>

    <footer class="mt-12 text-gray-400 text-sm">
        &copy; 2026 BlinkSite Engine. Powered by Cloudflare Workers.
    </footer>

</body>
</html>
